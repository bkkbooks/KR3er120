body:
  text: 卷二心下痞門心下痞論五常政大論云土平曰備化備化之紀其養肉其病痞陰所至為積飲痞隔夫痞者心下滿而不痛者是也太陰者濕土也主壅塞乃土來心下為痞滿也傷寒下之太早亦為痞乃因寒傷其榮榮者血也心主血邪入於本故為心下痞仲景立瀉心湯數方皆用黃連以瀉心下之土邪其效如響應桴故活人書云審知是痞先用桔梗枳殼湯非用此專治痞也蓋因見錯下必成痞證是邪氣將陷而欲過胸中故先用以截散其邪氣使不至於痞先之一字預用之意也若已成痞而用之則失之晚矣不惟不能消痞而反傷胸中至髙之正氣則當以仲景痞藥治之經云察其邪氣所在而調之正謂此也非止傷寒如此至於酒積雜病下之太過亦作痞滿蓋下多則亡陰亡陰者謂脾胃水穀之陰亡也故胸中之氣因虛而下陷於心之分野故致心下痞宜升胃氣以血藥治之若全用氣藥導之則其痞益甚甚而復下氣愈下降必變為中滿鼓脹皆非其治也又有虛實之殊如實痞大便祕厚朴枳實主之虛痞大便利者芍藥陳皮治之如飲食所傷而為痞滿者常內消導其胸中窒塞上逆兀兀欲吐者則宜吐之所謂在上者因而越之也凡治痞者宜詳審焉大消痞丸治一切心下痞悶及積年久不愈者黃連去須炒六錢黃芩六錢薑黃白朮各一兩人參二錢炙甘草一錢縮砂仁一錢枳實麩炒黃色五錢半夏湯泡四錢乾生薑一錢橘皮二錢炒麴一錢一方澤瀉二錢厚朴三錢豬苓一錢半上件為細末湯浸蒸餅為丸如桐子大每服五十丸至七十丸白湯食後下枳實消痞丸治心下虛痞惡食懶倦開胃進食枳實黃連各五錢乾生薑一錢半夏麴三錢厚朴炙四錢人參三錢炙甘草二錢白朮二錢白茯苓二錢麥蘗𬹃二錢上件為細末湯浸蒸餅為丸如桐子大每服三十丸溫水送下不拘時候量虛實加減黃連消痞丸治心下痞滿壅滯不散煩熱喘促不安黃連去須炒一兩枳實炒七錢橘皮五錢乾生薑二錢半夏九錢黃芩炒黃色二兩茯苓三錢白朮三錢炙甘草三錢薑黃一錢澤瀉一錢豬苓去皮半兩上件為細末湯浸蒸餅為丸如桐子大每服五十丸溫水送下食遠木香化滯湯治因憂氣結中脘腹皮裏徹痛心下痞滿不思飲食食之不散常常痞氣柴胡四錢橘皮三錢甘草炙三錢半夏一兩生薑二錢當歸尾二錢草豆蔻仁五錢益智三錢紅花半錢枳實麩皮炒二錢上件㕮咀如麻豆大每服五錢水二盞煎至一盞去滓大溫服食遠忌酒濕𬹃人參順氣飲子治心下痞胸中不利苦葶藶酒浸炒人參各三錢甘草炙羌活柴胡獨活各三錢黃芩三錢半炒半酒製縮砂仁白豆蔻仁茵陳酒製炒各一錢乾葛一錢青皮石膏厚朴炒半夏洗各半錢當歸七分上件同為細末湯浸蒸餅為丸和勻篩子內擦如米大每服一二錢臨臥少用白湯送下小黃丸化痰止涎除濕和胃治胸中不利黃芩一兩乾薑一錢半白朮五錢半夏五錢湯洗薑製澤瀉二錢黃耆三錢陳皮去白三錢青皮三錢去白上為細末湯浸蒸餅為丸如緑豆大每服三十至五十丸溫水送下食遠黃芩利膈丸除胸中熱利膈上痰生黃芩炒黃芩各一兩南星三錢半夏半兩黃連五錢枳殼三錢白朮二錢陳皮三錢澤瀉五錢白礬半錢上件為細末湯浸蒸餅為丸如桐子大每服三十丸至五十丸溫水送下食遠忌酒濕𬹃通氣防風湯清利頭目寬快胸膈夫胸中若不利者悉出於表黃耆三錢甘草炙四錢人參五錢葛根一錢半防風一錢蔓荊子半錢上件㕮咀如麻豆大分作二服每服水一盞半煎至一盞去滓臨臥溫服以夾衣服覆面目勿語須臾汗出為效必至服藥三四日少語如服藥畢亦少語言一日極效中滿腹脹門中滿腹脹論六元正紀大論云太陰所至為中滿云云太陰所至為蓄滿云云諸濕腫滿皆屬脾土論云脾乃陰中之太陰同濕土之化脾濕有餘腹滿食不化天為陽為熱主運化也地為陰為濕主長養也無陽則陰不能生化故云臟寒生滿病調經篇云因飲食勞倦損傷脾胃始受熱中末傳寒中皆由脾胃之氣虛弱不能運化精微而致水穀聚而不散而成脹滿經云腹滿䐜脹支膈胠脅下厥上冒過在太陰陽明乃寒濕欎遏也脈經所謂胃中寒則脹滿者是也針經三卷雜病第八腹滿大便不利上走胸溢咽息喝喝然取足少陰又云脹取三陽三陽者足太陽寒水為脹與通評虛實論説腹暴滿按之不下取太陽經絡胃之募也正同取者瀉也經云經滿者瀉之於內者是也宜以辛熱散之以苦瀉之淡滲利之使上下分消其濕正如開鬼門潔淨府溫衣繆刺其處是先瀉其血絡後調其真經氣血平陽布神清此治之正也或曰諸腹脹大皆屬於熱者何也此乃病機總辭假令外傷風寒有餘之邪自表傳裏寒變為熱而作胃實腹滿仲景以大承氣湯治之亦有膏粱之人濕熱欎於內而成脹滿者此熱脹之謂也大抵寒脹多而熱脹少治之者宜詳辨治中滿分消丸治中滿熱脹鼓脹氣脹黃芩刮黃色銼炒半兩或一兩一方夏用一兩黃連去須揀淨銼炒一兩薑黃白朮人參甘草豬苓去皮各一兩茯苓去皮縮砂仁各三錢枳實炒黃色五錢半夏洗七次五錢厚朴薑製一兩乾生薑知母銼炒各四錢澤瀉三錢陳皮三錢上件除茯苓澤瀉生薑各另為末外共為細末調和白湯浸蒸餅為丸如桐子大每服一百丸焙熱以熟白湯下食遠服量病大小加減中滿分消湯治中滿寒脹寒疝大小便不通陰躁足不收四肢厥逆食入反出下虛中滿腹中寒心下痞下焦躁寒沉厥奔豚不收黃耆五分黃蘗二分草豆蔻吳茱萸厚朴各五分木香二分益智三分半夏三分人參柴胡各二分茯苓三分澤瀉黃連各二分麻黃不去節二分蓽澄茄二分川烏頭當歸各二分青皮二分生薑二錢乾薑二分升麻三分上件銼如麻豆大旋稱都作一服水二盞煎至一盞去滓稍熱服食前大忌房勞飲酒濕𬹃冷物廣荗潰堅湯治中滿腹脹內有積塊堅硬如石其形如杯大令人坐臥不能大小便澀滯止喘氣促面色痿黃通身虛腫厚朴薑製當歸尾草豆蔻仁煨黃芩去皮益智仁各半錢黃連生甘草廣荗煨柴胡去蘆麴炒澤瀉各三分升麻吳茱萸湯泡青皮去穰陳皮各二分紅花一分半夏七分如虛渴加葛根二分上件㕮咀如麻豆大都作一服水二盞先浸藥少時煎至一盞去滓稍熱服忌酒濕𬹃二服之後中滿減半止有積塊未潰再服半夏厚朴湯半夏厚朴湯厚朴八分半夏一錢吳茱萸一分肉桂三分桃仁七個紅花半分蘇木半分京三稜四分草豆蔻蒼朮白茯各三分澤瀉三分豬苓四分乾生薑一分升麻四分柴胡三分木香二分青皮二分橘皮三分生黃芩三分黃連一分生甘草三分昆布少許炒麴六分當歸尾四分如渴加葛根三分上件銼如麻豆大旋稱都作一服水先拌藥次用水三盞煎至一盞去渣稍熱服之忌如前服此藥二服之後前證又減一半卻於前藥中加減服之木香化滯散破滯氣治心腹滿悶白豆蔻橘皮桔梗大腹子白茯苓去皮各半錢縮砂仁人參青皮檳榔木香薑黃各二錢白朮二錢炙甘草四分白檀五分藿香五分上件為細末每服三錢水一盞半煎至一盞稍熱服沸湯點服亦得食前忌生冷硬物五積門五積論黃帝針經百病始生第二云其成積者蓋厥氣生足悗悗生脛寒脛寒則血脈凝澀凝澀則寒氣上入於腸胃入於腸胃則䐜脹䐜脹則腸外之汁沫迫聚不得散日以成積卒然多飲食則腸滿起居不節用力過度則脈絡傷陽絡傷則血外溢血外溢則衄血陰絡傷則血內溢血內溢則後血腸胃之絡傷則血溢於腸外有寒汁沫與血相搏則并和凝聚不得散而成積矣或外中於寒內傷於憂怒則氣上逆氣上逆則六輸不通溫氣不行凝血蘊裹不散津液凝澀著而不去而成積矣又曰生於陰者蓋憂思傷心重寒傷肺忿怒傷肝醉以入房汗出當風傷脾用力過度若入房汗出浴則傷腎此內外三部之所生病者也故難經中説五積各有其名如肝之積名曰肥氣在左脅下如覆杯臍左有動氣按之牢若痛者是也無者非也餘積皆然治之當察其所痛以知其應有餘不足可補則補可瀉則瀉無逆天時詳臟腑之髙下如寒者熱之結者散之客者除之留者行之堅者削之消之按之摩之醎以軟之苦以瀉之全其氣藥補之隨其所利而行之節飲食慎起居和其中外可使畢已不然遽以大毒之劑攻之積不能除反傷正氣終難治也醫者不可不慎肝之積肥氣丸治積在左脅下如覆杯有頭足久不愈令人發咳逆痎瘧連歲不已厚朴半兩黃連七錢柴胡二兩椒炒出汗四錢巴豆霜五分川烏頭切去皮一錢二分乾薑炮半錢皂角去皮弦子煨一錢半白茯苓去皮一錢半廣荗炮二錢半人參去蘆二錢半甘草炙三錢昆布二錢半上件除茯苓皂角巴豆霜外為極細末另碾茯苓皂角為細末和勻另碾巴豆霜旋旋入末和勻煉蜜為丸如桐子大初服二丸一日加一丸二日加二丸漸漸加至大便微溏再從兩丸加服周而復始積減大半勿服在後積藥依此法服此春夏藥秋冬另有加減法在各條下秋冬加厚朴半兩通草一兩減黃連一錢半若治風癇於一料中加人參茯神菖蒲各三錢黃連只依春夏用七錢雖秋冬不減淡醋湯送下空心心之積伏梁丸起臍上大如臂上至心下久不愈令人煩心黃連去須一兩半厚朴去皮薑製半兩人參去蘆五分黃芩刮黃色三錢桂去皮一錢乾薑炮半錢巴豆霜五分川烏頭炮製去皮半錢紅豆二分菖蒲半錢茯神去皮木一錢丹參炒一錢上件除巴豆霜外為細末另研巴豆霜旋旋入末煉蜜為丸如桐子大初服二丸一日加一丸二日加二丸漸加至大便溏再從兩丸加服淡黃連湯送下食遠周而復始積減大半勿服秋冬加厚朴半兩通前稱一兩減黃連半兩即用一兩黃芩全不用脾之積痞氣丸在胃脘覆大如盤久不愈令人四肢不收發黃疸飲食不為肌膚厚朴去皮四錢半黃連去須八錢吳茱萸洗三錢黃芩二錢白茯苓去皮一錢另為末澤瀉一錢另為末川烏頭炮製去皮半錢人參去蘆一錢茵陳酒製炒一錢半巴豆霜四分乾薑炮一錢半白朮二錢縮砂仁去皮一錢半桂去皮四分川椒炒半錢上件除巴豆霜另研茯苓另為末旋入外同為細末煉蜜為丸如桐子大初服二丸一日加一丸二日加二丸漸加至大便溏再從二丸加服淡甘草湯送下食前周而復始積減大半勿服秋冬加厚朴五錢半通草一兩減黃連一錢減黃芩一錢黃疸并積大能退一料中加巴豆霜一分附子炮一錢砒石少許肺之積息賁丸治右脅下覆大如杯久不已令人灑淅寒熱喘咳發肺壅厚朴薑制八錢黃連去頭炒一兩三錢乾薑炮一錢半桂去皮一錢巴豆霜四分白茯苓去皮一錢半另末川烏頭炮製去皮一錢人參去蘆二錢川椒炒去汗一錢半桔梗一錢紫菀去苗一錢半白豆蔻一錢陳皮一錢青皮半錢京三稜炮一錢天門冬一錢上件除茯苓巴豆霜為末旋入外為末煉蜜為丸如桐子大初服二丸一日加一丸二日加二丸漸加至大便溏再從二丸加服煎淡生薑湯下食遠周而復始積減大半止服秋冬加厚朴半兩通前稱一兩三錢減黃連七錢只用六錢腎之積賁豚丸發於小腹上至心下若豚狀或下或上無時久不已令人喘逆骨痿少氣又治男子內結七疝女人瘕聚帶下厚朴薑製七錢黃連去須炒五錢白茯苓去皮二錢另末川烏頭炮半錢澤瀉二錢苦楝酒煮三錢玄胡一錢半全蝎一錢附子去皮一錢巴豆霜四分菖蒲二錢獨活一錢丁香半錢肉桂去皮二分上除巴豆霜茯苓另為末旋入外為細末煉蜜為丸如桐子丸初服二丸一日加一丸二日加二丸漸加至大便溏再從二丸加服淡鹽湯送下食前周而復始病減大半勿服秋冬加厚朴半兩通用一兩二錢如積勢堅大先服前藥不減於一料中加燒存性牡蠣三錢㿗疝帶下病勿加加減痞氣丸孟秋合治脾之積黃芩酒製三分黃連酒製三分厚朴一錢半夏半錢益智三分吳茱萸二分紅花半分青皮二分當歸尾二分茯苓二分澤瀉二分麴炒二分廣荗二分昆布二分橘皮去白二分熟地黃二分人參二分附子二分葛根二分甘草炙二分巴豆霜二分上件為細末蒸餅為丸如桐子大初服二丸一日加一丸二日加二丸漸加至大便溏再從二丸加服煎淡甘草湯送下食前加減息賁丸仲夏合其積為病寒熱喘咳氣上奔脈澀失精亡血氣滯則短氣血凝泣則寒熱則氣分寒血分熱治法宜益元氣泄陰火破滯氣削其堅也川烏頭一錢乾薑一錢半人參二錢厚朴八分黃連一兩三錢紫菀一錢巴豆霜四分桂枝三錢陳皮一錢半青皮七分川椒炒去汗一錢半紅花少許茯苓一錢半桔梗一錢白豆蔻一錢京三稜一錢半天門冬去心一錢半上件為細末湯浸蒸餅為丸如桐子大初服二丸一日加一丸二日加二丸加至大便微溏利為度再從二丸加服煎生薑湯送下食前忌酒濕𬹃五辛大料物之類及生冷硬物治積要法許學士云大抵治積或以所惡者攻之以所善者誘之則易愈如硇砂水銀治肉積神麴麥蘗治酒積水蛭虻蟲治血積木香檳榔治氣積牽牛甘遂治水積雄黃膩粉治涎積礞石巴豆治食積各從其類也若用群隊之藥分其勢則難取效究是認得分明是何積更兼見何證然後增加佐使之藥不爾反有所損要在臨時通變也心胃及腹中諸痛門心胃及腹中諸痛論黃帝針經經脈第一云胃病者腹䐜脹胃脘當心而痛上支兩脅膈咽不通飲食不下取三里也又云足太陰脾之脈其支者復從胃別上膈注心中是動則病舌本強食則嘔胃脘痛腹脹善噫心下急痛舉痛論云五臟卒痛何氣使然曰經脈流行不止環周不休寒氣入經稽遲泣而不行客於脈外則血少客於脈中則氣不通故卒然而痛得炅則痛立止因重感於寒則痛久矣夫心胃痛及腹中諸痛皆因勞役過甚飲食失節中氣不足寒邪乘虛而入客之故卒然而作大痛經言得炅則止炅者熱也以熱治寒治之正也然腹痛有部分臟位有髙下治之者亦宜分之如厥心痛者乃寒邪客於心包絡也前人以良薑菖蒲大辛熱之味末之酒醋調服其痛立止此折之耳真心痛者寒邪傷其君也手足清至節甚則旦發夕死脘痛者太陰也理中建中草豆蔻丸之類主之腹臍痛者少陰也四逆湯薑附禦寒湯之類主之少腹痛者厥陰也正陽散回陽丹當歸四逆之類主之雜證而痛者苦楝湯酒煮當歸丸丁香楝實丸之類主之是隨高下治也更循各臟部分穴腧而灸刺之如厥心痛者痛如錐針刺其心甚者脾心痛也取之然谷太溪餘臟皆然如腹中不和而痛者以甘草芍藥湯主之如傷寒誤下傳太陰腹滿時痛者桂枝加芍藥湯主之痛甚者桂枝加大黃主之夏月肌熱惡熱脈洪實而痛者黃芩芍藥湯主之又有諸蟲痛者如心腹痛作痛腫聚往來上下行痛有休止腹熱善渴涎出面色乍青乍白乍赤嘔吐清水者蛟蛔也以手緊按而堅持之無令得移以針刺之久持之蟲不動乃出針也或局方中化蟲丸及諸取蟲之藥量虛實用不可一例而治草豆蔻丸治勞役致脾胃虛弱而心火乘之不能滋榮心肺上焦元氣衰敗因遇冬天腎與膀胱寒水大旺子能令母實助肺金大旺相輔而來尅心乘脾故胃脘當心而痛此復其仇也故經云大勝必大復理之常也故皮毛血脈分肉之間元氣已絶於外又以大寒大燥二氣并乘之其人苦惡風寒耳鳴及腰背相引胸中而痛鼻息不通不聞香臭額寒腦痛目時眩為寒水反乘脾土痰唾沃沫飲食反出腹中常痛心胃作痛脅下縮急有時而痛腹不能努大便多瀉而少祕下氣不絶或腹中鳴胸中氣亂心煩不安而成霍亂之意膈咽不通極則有聲鼻中氣短遇寒滋甚或居曖處方過口吸風寒則復作四肢厥逆身體沉重不能轉側頭不可以回顧小便數而欠此脾虛之至極也草豆蔻一錢四分𬹃煨燒熟去皮稱用益智八分吳茱萸八分湯洗去苦焙乾稱陳皮八分殭蠶八分熟甘草三分生甘草三分桃仁去皮尖七分青皮六分澤瀉一分黃耆八分半夏湯洗七次一錢大麥蘗炒黃一錢半麴末四分薑黃四分當歸身六分人參四分柴胡去苗四分或二分詳脅下痛多少加之上十八味除桃仁另研如泥外為極細末同研湯浸蒸餅為丸如桐子大每服二十丸熱白湯送下旋斟酌多少服之薑附禦寒湯治中氣不足遇冬天寒氣客於脾胃之間相引兩脅縮急而痛善嚏鼻中流濁涕不止不聞香臭咳嗽腦痛上熱如火下寒如冰頭時作陳痛或暴痛兩目中流火視物䀮䀮然或耳鳴耳聾客晴明惡陰寒夜不得安臥胸中痰涎膈咽不通飲食失味口中沃沫牙齒動搖不能嚼物腰臍間及尻腎膝足胻冷陰汗自出行步失力風痹麻木小便數氣短喘喝少氣不足以息卒遺失無度婦人白帶陰戶中大痛上牽心而痛黧黑失色男子控睪而痛牽心腹隱隱而痛面如赭色食少大小便不調煩心霍亂逆氣裏急而腹皮白或黑下氣腹中腸鳴膝下筋急及腰背肩胛大痛此陰盛陽虛之證也乾薑炮一錢二分半夏湯洗五分柴胡去苗一錢防風去蘆半錢羌活一錢藁本去土八分人參去蘆半錢白葵花五朵去心萼甘草炙八分升麻七分郁李仁湯浸去皮尖半錢當歸身六分酒製桃仁湯浸去皮尖半錢與郁李仁研如泥入正藥黑附子炮去皮臍四錢上件㕮咀都作一服水五大盞煎至三盞入黃耆一錢橘皮五分草豆蔻一錢再煎至二盞再入酒製黃蘗三分酒製黃連三分枳殼三分酒地黃二分此四味銼碎預一日先用新水多半盞浸一宿煎至一盞半又華陰細辛一分貫芎二分蔓荊子二分亦預先一日用新水各另浸將前正藥去滓入此三味再上火同煎至一盞去渣空心熱服之待少時以美膳壓之忌肉湯宜食肉不助經絡中火邪也又能治齧唇舌根強硬其效如神如無以上證但有白帶下臍下寒男子二丸冷痛相引心腹背痛手心或寒兩尺脈弦細按之不鼓小便遺失或數而欠大便多燥澀不通或大便軟溺色變或短氣不足以息額寒鼻不聞香臭鼻端紅腫善嚏多悲愁不樂健忘多怒寢汗憎風小便滑數後滴瀝臍下冷疼風寒汗出腰背強腰痛或裏急或腹皮白或腹黑色或鼻流清涕及目中淚下不止精神不足亦宜服之及腎與膀胱經中寒肺氣寒元氣不足者皆宜服之於月生月滿時隔三五日吃一服如病急不拘時候麻黃豆蔻丸治客寒犯胃心胃大痛不可忍季秋合麻黃不去節三錢草豆蔻五錢益智仁八分炒麴二錢升麻半錢半夏半錢湯洗麥蘗𬹃半錢縮砂仁半錢黃耆半錢白朮半錢橘皮柴胡炙甘草吳茱萸當歸身各五分青皮二分木香二分厚朴二分蓽澄茄四分紅花三分蘇木三分上為細末湯浸蒸餅為丸如桐子大每服五十丸細嚼溫水送下如寒腹痛不嚼白湯送下益智和中丸治心胃腹中大痛煩躁冷汗自出草豆蔻四錢益智仁二錢二分縮砂仁七分甘草炙二錢半黃耆人參當歸身乾生薑麥門冬神麴末橘皮各半錢桂枝一錢半桂花一錢麥蘗𬹃炒三錢黃連二分生地黃二分薑黃五分木香二分上件同為細末湯浸蒸餅為丸如桐子大每服三十丸溫水送下細嚼亦得益智調中湯治因服寒藥過多致脾胃虛弱胃脘痛白豆蔻三分益智仁三分縮砂仁甘草各二分薑黃三分厚朴三分陳皮五分澤瀉三分黃耆七分乾薑三分人參二分上件為粗末都作一服水一盞半煎至一盞去滓溫服食前如胃脘當心而痛氣欲絶者胃中虛之至極俗呼為心痛服草豆蔻丸二三十丸若痛頻作胃中元氣虛甚則將理二三日不得食熱當食溫爛細嚼細咽痛必不作一二日自和矣若食熱稠粥其痛必幾死言畢不得食食後不得言欲食時口鼻不得當風食罷亦然忌生冷硬物果木之類及麩粉麴食須忌長遠免致後患
