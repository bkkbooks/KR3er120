body:
  text: 卷七大便結燥門大便結燥論金匱真言論云北方黑色入通腎開竅於二陰藏精於腎又云腎主大便大便難者取足少陰夫腎主五液津液潤則大便如常若飢飽勞役損傷胃氣及食辛熱味厚之物而助火邪伏於血中耗散真陰津液虧少故大便結燥然結燥之病不一有熱燥有風燥有陽結有陰結又有年老氣虛津液不足而結者治法云腎惡燥急食辛以潤之結者散之如少陰不得大便以辛潤之太陰不得大便以苦瀉之陽結者散之陰結者溫之仲景云小便利大便硬不可攻下以脾約丸潤之食傷太陰腹滿食不化腹響然不能大便者以藥瀉之大抵津液耗少而燥者以辛潤之有物而結者當下之若不究其源一概用巴豆牽牛之類下之損其津液燥結愈甚有復下復結極則以至引導於下而不能通者遂成不救之證可不慎哉潤腸丸治脾胃中伏火大便秘澀或乾燥秘塞不通全不思食乃風結秘血結秘皆令閉塞也以潤燥和血疏風自然通麻子仁桃仁去皮尖各一兩羌活半兩當歸尾煨大黃各半兩上件除麻仁桃仁別研如泥外搗羅為末五上火煉蜜丸如桐子大每服三五十丸空心白湯送下如病人不大便為大便不通而滋其邪盛者急加酒製大黃以利之如血燥而大便燥乾者加桃仁酒製大黃如風結燥大便不行者加麻子仁大黃如風澀而大便不行者加皂角仁大黃秦艽以利之如脈澀覺身有氣澀而大便不通者加郁李仁大黃以除之氣燥如寒陰之病為寒結閉而大便不通者以局方中半硫丸或加煎附子乾薑湯冰冷與之其病雖陰寒之證常當服陽藥補之若大便不通者亦當十服中與一服藥微通其大便不令閉結乃治之大法若病人雖是陰證或是陰寒之證其病顯燥脈實堅亦於陽藥中加少苦寒之藥以去熱燥燥止勿加如陰燥欲坐井中者其二腎脈必按之虛或沉細而遲此易為辨耳知有客邪之病亦從權加藥以去之當歸潤燥湯升麻二錢當歸一錢熟地黃一錢生地黃二錢甘草大黃桃仁麻仁各一錢紅花少許上件除桃仁麻仁另研如泥外銼如麻豆大作一服水二大盞入桃仁麻仁煎至一盞去滓空心宿食消盡熱服之導滯通幽湯治大便難幽門不通上衝吸門不開噎塞不便燥閉氣不得下治在幽門以辛潤之當歸升麻桃仁泥各一錢生地黃五分紅花一分熟地黃五分炙甘草一分上件作一服水二盞煎至一盞去滓調檳榔細末半錢稍熱服活血潤燥丸治大便風秘不通常燥結當歸一錢防風三錢羌活一兩大黃一兩濕紙裹煨桃仁二兩湯泡去皮尖麻仁二兩半二味另研入藥皂角仁燒存性去皮一兩半其性得濕則滑濕滑則燥結自除用之勿誤上除麻仁桃仁另研外為細末卻同拌勻煉蜜去沫為丸如梧子大每服五十丸三兩服後大便日久不能結燥也以瓷器內盛紙封之無令見風升陽瀉濕湯治膈咽不通逆氣裏急大便不行青皮二分甘草四分槐子二分黃耆一錢黃蘗三分升麻七分生地黃三分熟地黃三分當歸四分桃仁二錢蒼朮半錢上件㕮咀如麻豆大作一服另研桃仁泥子一處同煎水二大盞煎至一盞去滓稍熱服食前麻黃白朮散治大便不通三日一遍小便黃赤渾身腫面上及腹尤甚其色黃麻木身重如山沉困無力四肢痿軟不能舉動喘促唾清水吐噦痰唾白沫如膠時躁熱發欲去衣須臾而過振寒項額有時如冰額寒尤甚頭旋眼黑目中溜火冷淚鼻不聞香臭少腹急痛當臍有動氣按之堅硬而痛麻黃不去節半兩桂枝三分杏仁四個吳茱萸草豆蔻各半錢厚朴三分炒麹半錢升麻二分柴胡三分白朮三分蒼朮三分生甘草一錢澤瀉四分茯苓四分橘紅二分青皮一分黃連一分酒製黃皮二分酒製黃耆三分人參三分炙甘草一分豬苓三分上㕮咀分作兩服水二大盞半先煎麻黃令沸去沫再入諸藥同煎至一盞去滓稍熱服食遠此證宿有風濕熱伏於榮血之中其木火乘於陽道為上盛元氣短少上喘為陰火傷其氣四肢痿在腎水之間乃所勝之病今正遇冬寒得時乘其肝木又實其母肺金尅火凌木是大勝必大復其證善恐欠多嚏鼻中如有物不聞香臭目視䀮䀮多悲健忘小腹急痛通身黃腹大脹面目腫尤甚食不下痰唾涕有血目眥瘍大便不通只兩服皆已痔漏門痔漏論生氣通天論云因於飽食筋脈橫解腸澼為痔夫大腸者庚也主津本性燥清肅殺之氣本位主收其所司行津以從足陽明旺則生化萬物者也足陽明為中州之土若陽衰亦殞殺萬物故曰萬物生於土而歸於土者是也以手陽明大腸司其化焉既在西方本位為之害蜚司殺之府因飽食行房忍泄前陰之氣歸於大腸木乘火勢而侮燥金故火就燥也大便必秘其疾甚者當以苦寒瀉火以辛溫和血潤燥疏風止痛是其治也秦艽白朮丸治痔疾并痔漏有膿血大便燥硬而作疼痛不可忍秦艽一兩去蘆當歸尾半兩酒製桃仁一兩湯浸去尖另研細地榆三錢枳實麩炒半兩皂角仁一兩燒存性去皮澤瀉半兩白朮半兩痔漏之病乃風熱濕燥為之也以秦艽當歸尾辛溫和血潤燥疏風止痛桃仁潤血以皂角仁除風燥以地榆破血以枳實之苦寒補腎以下泄胃實以澤瀉之淡滲使氣歸於前陰以補清燥受胃之濕邪也白朮之苦甘以苦補燥氣之不足其甘味瀉火而益元氣也故曰甘寒瀉火乃假枳實之寒也古人用藥為下焦如瀆又曰在下者引而竭之多為大便秘澀以大黃推去之其津血益不足以當歸和血及油潤之劑則大便自然軟利矣宜作銼湯以與之是下焦有熱以急治之之法也以地榆惡人而壞胃故宿食消盡空心作丸服之上同為細末和桃仁泥子研勻煎熱湯白𬹃糊為丸如雞頭仁大令藥光滑焙乾每服百丸白湯送下空心宿食消盡服之待少時以美膳壓之忌生冷硬物冷水菜之類并濕𬹃酒及五辣辛熱大料物之類犯之則藥無驗矣數服而愈腸風痔漏者總辭也分之則異若破者為之痔漏大便大澀必作大痛此由風熱乘食飽不通氣逼大腸而作也受病者燥氣也為病者胃熱也胃刑大腸則化燥火以乘燥熱之實勝風附熱而來是濕熱風燥四氣而合故大腸頭成塊者濕也作大痛者風也作大便燥結者主病兼受火邪也去此四者其西方肺主諸氣其體收下亦助病邪須當破氣藥兼之治法全矣以銼湯與之其效如神速秦艽蒼朮湯主之秦艽蒼朮湯秦艽一錢去苗澤瀉三分蒼朮七分防風三分大黃少許雖大便過澀亦不可多用桃仁湯浸去皮尖一錢另研細皂角仁燒存性去皮一錢另研細調下當歸尾三分酒製黃蘗去皮酒製五分若大腸頭沉重者濕勝也更加之若天氣火熱盛病人燥熱者喜冷以急加之檳榔梭身一分細末調服之上件除檳榔桃仁皂角仁三味外㕮咀如麻豆大慎勿作末都作一服水五盞煎至一盞二分去滓入檳榔等三味再上火煎至一盞空心候宿食消盡熱服之待少時以美膳壓之不犯胃氣也服藥日忌生冷硬物冷菜之類及酒濕𬹃大料物乾薑之類犯之其藥無效如有白膿加白葵花五朵去萼青皮半錢不去白入正藥中同煎又用木香三分為細末同檳榔等三味再上火同煎依上法服餌古人治此疾多以歲月除之此藥一服而愈若病大者再服而愈七聖丸治大腸疼痛不可忍叔和云積氣生於脾臟旁大腸疼痛陣難當漸交稍瀉三焦是莫謾多方立紀綱羌活一兩檳榔木香川芎桂去皮以上各半兩大黃八錢煨郁李仁湯浸去皮另研一兩半上件除郁李仁另入外為極細末煉蜜為丸如桐子大量病人虛實臨時斟酌丸數白湯送下取大便微利一服而愈切忌多利大便大便大行其痛滋甚秦艽防風湯治痔漏每日大便時發疼痛如無疼痛非痔漏也此藥主之秦艽防風當歸身白朮以上各一錢半黃蘗五分橘皮三分炙甘草六分紅花少許桃仁三十個煨大黃三分升麻二分柴胡二分澤瀉六分上件銼如麻豆大都作一服水三大盞煎至一盞去滓稍熱空心服之避風寒忌房事酒濕𬹃大辛熱物及當風寒處大便當歸郁李仁湯治痔漏大便硬努大腸下垂多血苦痛不能任皂角仁一錢另為細末煎成調服郁李仁一錢麻子仁一錢半秦艽一錢半蒼朮半錢當歸尾半錢澤瀉三分煨大黃三分生地黃半錢枳實七分上件㕮咀水三大盞煎至一盞去滓空心宿食消盡服之忌風寒處大小便秦艽羌活湯治痔漏成塊下垂疙瘩不任其癢升麻半錢柴胡半錢黃耆一錢炙甘草半錢防風七分藁本二分細辛少許紅花少許羌活一錢二分秦艽一錢麻黃半錢上件銼如麻豆大都作一服水二盞煎至一盞去滓空心服之忌禁如前紅花桃仁湯治痔疾經年因飽食筋橫解腸澼為壽當去其筋脈橫解破血絡是也治法當補北方瀉中央生地黃一錢當歸尾半錢桃仁十個紅花半分漢防己半錢黃蘗一錢半豬苓半錢澤瀉八分防風半錢麻黃不去根二分蒼朮六分上件銼如麻豆大都作一服水三大盞煎至一盞去滓食前熱服之忌禁如前秦艽當歸湯治痔漏大便燥結疼痛秦艽一錢當歸尾半錢桃仁二十個紅花少許枳實一錢煨大黃四錢澤瀉半錢白朮半錢皂角仁半錢上件銼如麻豆大都作一服水三大盞煎至一盞去滓稍熱服食前瀉痢腸澼門瀉痢腸澼論太陰陽明論云飲食不節起居不時陰受之陰受之則入五臟入五臟則䐜滿閉塞下為飧泄久為腸澼也又云春傷於風夏生飧泄又云濕勝則濡瀉夫脾胃者同濕土之化主腐熟水穀胃氣和平飲食入胃精氣則輸於脾上歸於肺行於百脈而成榮衛也若飲食一傷起居不時損其胃氣而上升精華之氣即下降是為飧泄久則太陰傳少陰而為腸澼假令傷寒飲食䐜滿而傳飧泄者宜溫熱之劑以消導之傷濕熱之物而成膿血者宜苦寒之劑以疏之風邪下陷者升舉之濕氣內勝者分利之裏急者下之後重者調之腹痛者和之洞瀉腸鳴無力不及拈衣其脈弦細而弱者溫之收之膿血稠粘數至圊而不能便其脈洪大而有力者寒之下之大抵治病救其所因細察何氣所勝取相尅之藥平之隨其所利而利之以平為期此治之大法也如泄而脈大腸澼下血脈弦絕澀者皆難治滑大柔和者易治故叔和云下痢微小得延生脈大洪浮無差日正謂此也癸卯歲冬十月小雪薄冰天冷應時白樞判家一老僕面塵脫色神氣特弱病脫肛日久服藥未驗近日復下赤白膿痢作裏急後重白多赤少不任其苦先師料曰此非肉食膏粱必多蔬食或飲食不節天氣應時衣蓋猶薄寒侵形體乃寒滑氣泄不固故形下脫也當以澀去其脫而除其滑微酸之質固氣上收去其下脫以大熱之劑除寒補陽以補氣之藥升陽益氣是的對其證訶子皮散治腸胃虛寒泄瀉水穀不化腸鳴腹痛脫肛或作膿血日夜無度粟殼去蒂蓋蜜炒半錢訶子去核七分煨乾薑炮六分橘皮半錢本草十劑云澀可去脫以粟殼之酸微澀上收固氣去脫主用為君也以訶子皮之微酸上收固血治其形脫橘皮微苦溫益真氣升陽為之使以乾薑大辛熱之劑除寒為臣上件為細末分作二服每服水二盞煎至一盞和滓熱服空心再服全愈除濕熱和血湯治腸澼下血另作一派其血唧出有力而遠射四散如篩仲春中旬下二行腹中大作痛乃陽明氣衝熱毒所作當升陽去濕熱和血脈是其治也生地黃半錢牡丹皮半錢白芍藥一錢半生甘草半錢熟甘草半錢黃耆一錢升麻七分當歸身三分蒼朮秦艽橘皮肉桂熟地黃各三分上件㕮咀都作一服水四盞煎至一盞去滓空心宿食消盡服之稍熱立效升麻補胃湯治宿有陽明血證五月間大熱因吃杏腸澼下血唧遠去四下散漫如篩腰沉沉然腹中不痛血色紫黑病名曰濕毒腸澼是陽明少陽經血證也升麻羌活各一錢獨活防風各一錢柴胡半錢葛根三分肉桂少許牡丹皮熟地黃生地黃各半錢白芍藥一錢半當歸身三分黃耆一錢炙甘草半錢上件㕮咀如麻豆大分作二服水二大盞煎至一盞去滓稍熱服食前槐花散治腸澼下血濕毒下血槐花六分青皮六分當歸身一錢荊芥穗六分升麻一錢熟地黃六分川芎四分白朮六分上件為細末每服二錢或三錢米飲清調下食前忌酒濕𬹃生冷物益智和中湯治腸澼下血或色深者紫黑腹中痛腹皮惡寒右三部脈中指下得俱弦按之無力關脈弦甚緊肌表陽明分涼腹皮熱而喜熱物熨之內寒明矣升麻一錢葛根半錢白芍藥一錢半炙甘草一錢桂枝四分益智仁半錢當歸身一錢黃耆一錢牡丹皮半錢柴胡半錢半夏半錢乾薑少許肉桂一分上件為粗末都作一服水三大盞煎至一盞去滓溫服一服食前和中益胃湯治太陰陽明腹痛大便常泄若不泄卻秘而難見在後傳作濕熱毒下鮮紅血腹中微痛脅下急縮脈緩而洪弦中之乍得按之空虛熟地黃三分當歸身酒製三分升麻半錢蘇木一分藁本二分炙甘草三分柴胡半錢益智二分上件都作一服水三盞煎至一盞去滓空心溫服一服而愈茯苓湯治因傷冷飯水泄一夜約走十行變作白痢次日其痢赤白腹中㽲痛減食熱躁四肢困倦無力以動茯苓六分澤瀉一錢當歸身四分蒼朮二分生薑二錢肉桂五分豬苓六分炙甘草半錢升麻二錢芍藥一錢半黃芩三分生用柴胡二分上件㕮咀分作二服每服水二大盞煎至一盞去滓稍熱服食前黃耆補胃湯治一日大便三四次溏而不多有時作泄腹中鳴小便黃黃耆三分炙甘草二錢升麻六分橘皮三分當歸身三分益智仁三分柴胡三分紅花少許上件㕮咀分作二服水二大盞煎至一盞去滓稍熱服食前升麻除濕湯自上而下者引而去之升麻半錢柴胡半錢羌活半錢蒼朮一錢炙甘草三分神麹半錢豬苓半錢陳皮三分大麥蘗𬹃三分防風半錢澤瀉半錢上件都作一服水二盞煎至一盞早飯後稍熱服如胃寒腸鳴加益智仁半錢半夏半錢生薑棗同煎非腸鳴不得用人參益胃湯治頭悶勞動則微痛不喜飲食四肢怠墮躁熱短氣口不知味腸鳴大便微溏黃色身體昏悶覺渴不喜冷物黃耆二分甘草二分黃芩三分陳皮半錢柴胡三分紅花少許當歸尾二分升麻半錢白朮三分半夏三分人參三分益智二分蒼朮一錢半上都作一服水二盞煎至一盞去滓稍熱服食前升麻補胃湯治因內傷服牽牛大黃食藥致瀉痢五七行腹中大痛升麻半錢柴胡半錢當歸身一分半夏三分乾薑二分甘草七分黃耆半錢草豆蔻半錢紅花少許上件都作一服水二盞煎至一盞去滓早飯後稍熱服扶脾丸治脾胃虛寒腹中痛溏瀉無度飲食不化白朮二錢茯苓二錢橘皮一錢大麥蘗四錢半炙甘草二錢肉桂半錢半夏二錢乾生薑半錢訶子皮二錢紅豆一錢乾薑一錢炒麹四錢藿香一錢烏梅二錢上件為細末荷葉燒飯為丸如桐子大每服五十丸食前溫水送下烏梅肉丸治腸風下血別無餘證但登廁便見亦非內痔服之立效真殭蠶一兩烏梅肉燒乾一兩上為末薄糊丸如雞頭肉大每服百丸食前多用白湯送下日三服
