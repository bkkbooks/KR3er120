body:
  text: 卷一藥象門標本陰陽論天陽無圓氣上外升生浮晝動輕燥六腑地陰有方血下內降殺沉夜靜重濕五臟夫治病者當知標本以身論之則外為標內為本陽為標陰為本故六腑屬陽為標五臟屬陰為本此臟腑之標本也又五臟六腑在內為本各臟腑之經絡在外為標此臟腑經絡之標本也更人身之臟腑陰陽氣血經絡各有標本也以病論之先受病為本後傳流病為標凡治病者必先治其本後治其標若先治其標後治其本邪氣滋甚其病益畜若先治其本後治其標雖病有十數證皆去矣謂如先生輕病後滋生重病亦先治輕病後治重病如是則邪氣乃伏蓋先治本故也若有中滿無問標本先治中滿謂其急也若中滿後有大小便不利亦無問標本先利大小便次治中滿謂尤急也除大小便不利及中滿三者之外皆治其本不可不慎也從前來者為實邪從後來者為虛邪此子能令母實母能令子虛是也治法云虛則補其母實則瀉其子假令肝受心火之邪是從前來者為實邪當瀉其子火也然非直瀉其火十二經中各有金水木火土當木之分瀉其火也故標本論云本而標之先治其本後治其標即肝受火邪先於肝經五穴中瀉滎心行間穴是也後治其標者於心經五穴內瀉滎火少府穴是也以藥論之入肝經藥為之引用瀉心火藥為君是治實邪之病也假令肝受腎邪是從後來者為虛邪虛則補其母故標本論云標而本之先治其標後治其本即肝受水邪當先於腎經湧泉穴中補木是先治其標後於肝經曲泉穴中瀉水是後治其本此先治其標者推其至理亦是先治其本也以藥論之入腎經藥為引用補肝經藥為君是也用藥法象天有陰陽風寒暑濕燥火三陰三陽上奉之溫涼寒熱四氣是也溫熱者天之陽也涼寒者天之陰也此乃天之陰陽也地有陰陽金水木火土生長化收藏下應之辛甘淡酸苦醎五味是也皆象於地辛甘淡者地之陽也酸苦醎者地之陰也此乃地之陰陽也味之薄者為陰中之陽味薄則通酸苦醎平是也味之厚者為陰中之陰味厚則泄酸苦醎寒是也氣之厚者為陽中之陽氣厚則發熱辛甘溫熱是也氣之薄者為陽中之陰氣薄則發泄辛甘淡平寒涼是也輕清成象味薄者茶之類本乎天者親上重濁成形味厚者大黃之類本乎地者親下氣味辛甘發散為陽酸苦湧泄為陰清陽發腠理清之清者也清陽實四肢清之濁者也濁陰歸六腑濁之濁者也濁陰走五臟濁之清者也藥性要旨苦藥平升微寒平亦升甘辛藥平降甘寒瀉火苦寒瀉濕熱苦甘寒瀉血熱藥象圖說用藥升降浮沉補瀉法肝膽味辛補酸瀉氣溫補涼瀉肝膽之經前後寒熱不同逆順互換入求責法心小腸味醎補甘瀉氣熱補寒瀉三焦命門補瀉同脾胃味甘補苦瀉氣溫涼寒熱補瀉各從其宜逆從互換入求責法肺大腸味酸補辛瀉氣涼補溫瀉腎膀胱味苦補醎瀉氣寒補熱瀉五臟更相平也一臟不平所勝平之此之謂也故云安穀則昌絕穀則亡水去則榮散穀消則衛亡榮散衛亡神無所居又仲景云水入於經其血乃成穀入於胃脈道乃行故血不可不養衛不可不溫血溫衛和榮衛將行常有天命矣五方之正氣味制方用藥附東方甲風乙木其氣溫其味甘在人以膽肝應之南方丙熱丁火其氣熱其味辛在人以心小腸三焦包絡應之中央戊濕其本氣平其兼氣溫涼寒熱在人以胃應之己土其本味醎其兼味辛甘酸苦在人以脾應之西方庚燥辛金其氣涼其味酸在人以大腸肺應之北方壬寒癸水其氣寒其味苦在人以膀胱腎應之人乃萬物中一也獨陽不生獨陰不長須稟兩儀之氣而生化也聖人垂世立教不能渾說必當分析以至理而言則陰陽相符不相離其實一也呼則因陽出吸則隨陰入天以陽生陰長地以陽殺陰藏此上說止明補瀉用藥君之一也故曰主病者為君用藥之機會要明輕清成象重濁成形本乎天者親上本乎地者親下則各從其類也清中清者清肺以助其天真清中濁者榮華腠理濁中清者榮養於神濁中濁者堅強骨髓故至真要大論云五味陰陽之用辛甘發散為陽酸苦湧泄為陰淡味滲泄為陽醎味湧泄為陰六者或收或散或緩或急或燥或潤或軟或堅各以所利而行之調其氣使之平也帝曰非調氣而得者治之奈何有毒無毒何先何後願聞其道曰有毒無毒所治為主適大小為制也云云君一臣二制之小也君一臣三佐五制之中也君一臣三佐九制之大也寒者熱之熱者寒之微者逆之甚者從之堅者削之客者除之勞者溫之結者散之留者行之燥者潤之急者緩之散者收之損者溫之逸者行之驚者平之上之下之摩之浴之薄者劫之開之發之適事為故各安其氣必清必靜則病氣衰去歸其所宗此治之本體也帝曰反治何謂岐伯曰熱因熱用寒因寒用塞用塞用通因通用必伏其所主而先其所因其始則同其終則異可使破積可之今人目盲藥象氣味主治法度豬苓甘平除濕此諸淡滲藥大燥亡津液無濕證勿服燈草通草甘平通陰竅澀不利利小水除水腫癃閉與琥珀同滑石甘寒滑治前陰竅澀不利性沉重能泄氣上令下行故曰滑則利竅不可同淡滲諸藥用同葵菜甘寒滑能利大便小便目病人不可服諸熱病後服之令人目盲蒼朮甘溫主治與白朮同若除上濕發汗功最大若補中焦除濕力小於白朮白芍藥酸微寒補中焦之藥得炙甘草為輔治腹中疼之聖藥也如夏中熱腹疼少加黃芩其病立止若病人春夏秋三時腹疼亦少加黃芩若惡寒腹疼只少加肉桂一錢白芍藥三錢炙甘草一錢半此三味為治寒腹疼此仲景神品藥也如深秋腹疼更加桂二錢如冬月大寒腹中冷痛加桂作二錢半水二盞煎服肉桂大辛熱補下焦熱火不足治沉寒之病及自汗春夏二時為禁藥也當歸辛甘溫能和血補血用尾破血身和血先使溫水洗去土酒製過或焙或曬乾方可用入藥血病須用熟地黃苦寒酒灑久蒸如烏金假酒力則微溫大補血衰之人須用之藥善黑鬂髮大忌食蘿蔔生地黃苦寒涼血補血補腎水真陰不足此藥大寒宜斟酌用之多服恐損人胃氣川芎辛溫補血治血虛頭痛之聖藥也如妊娠婦人胎動數月加當歸二味各一錢半或二錢水煎服之神驗橘皮微苦溫能益氣加青皮減半去氣滯推陳致新若補脾胃不去白若理胸中補肺氣去白用紅厚朴辛溫紫色厚者佳能除腹脹若元氣虛弱雖腹脹宜斟酌用之如寒服不可用多是大熱藥中兼用結者散之神藥誤服脫元氣切禁柴胡微苦平除虛勞寒熱解肌熱去早晨潮熱此少陽厥陰行經之藥也婦人產前產後須用之藥善除本經頭痛若本經病非他藥能止也治心下痞胸脅疼神藥也升麻苦平微寒此足陽明胃足太陰脾行經藥也若補其脾非此藥為引用行其本經不能補此二經并得蔥白香白芷之類亦能走手陽明太陰非此四經不可用也能解肌肉間熱此手足陽明經傷風之的藥也葛根甘平治脾胃虛弱而渴除胃熱善解酒毒通行足陽明經之藥枳殼甘寒治脾胃痞塞泄肺氣檳榔辛溫治後重如神性如鐵石之沉重能墜諸藥至於下極槐實微苦寒利胸中氣消膈上疾半夏辛苦熱治寒痰及形寒飲冷傷肺而咳大和胃氣除胃寒進食治太陰經痰厥頭疼非此藥不能除也天南星苦平治形寒飲冷傷肺風寒痰嗽佛耳草酸熱治寒嗽及痰涎除肺中寒大升肺氣少用款冬花為之使過食損目草豆蔻大辛熱治風寒客於胃口善去脾寒及客寒心疼胃疼如神益智仁大辛熱治脾胃中寒邪和中益氣治多唾當於補中藥內兼用之不可多服吳茱萸辛苦大熱治寒在咽嗌噎塞胸膈不利經言膈咽不能食不下令人口開目瞪寒邪所隔氣不得上下此病不已令人寒中腹滿䐜脹下泄寒氣如神諸藥不能代也牡丹皮甘寒治腸胃積血及衄血吐血必用之藥味也羌活苦甘平微溫治肢節疼痛為君通利諸節如神手足太陽風藥也加川芎治足太陽少陰頭痛藥也獨活苦甘平微溫足少陰腎經行經藥也若與細辛同用治少陰經疼如神一名獨搖草得風不搖無風自搖動防風辛溫療風通用瀉肺實如神散頭目中滯氣除上焦風邪之仙藥也誤服瀉人上焦元氣藁本大辛溫氣力雄壯此太陽經風藥也治寒邪結欎於本經治頭疼腦痛大寒犯腦痛齒亦痛之藥亦治風通用氣力雄壯也細辛大辛溫治少陰頭疼如神當少用之獨活為使為主用藥也蔓荊子辛溫大輕清治太陽經頭疼頭昏悶除目暗散風邪之藥也若胃氣虛之人不可服恐生痰疾石膏大寒甘辛治足陽明經中熱發熱惡熱燥熱日晡潮熱自汗小便澀赤大渴引飲身體肌肉壯熱苦頭痛之藥白虎湯是也善治本經頭痛若無以上證勿多服多有脾胃虛勞形體病證初得之時與此有餘證同醫者不識而誤與之不可勝救也香白芷大辛溫治手陽明經頭疼中風寒熱解利之藥也以四味升麻湯加之通行手足陽明經也黃蘗大苦寒又辛寒治腎水膀胱不足諸痿厥腳膝無力於黃耆湯中少加用之使兩足膝中氣力如湧出痿即去矣蜜炒為細末治口瘡如神癱瘓必用之藥也知母大辛寒又苦寒瀉足陽明經火熱聖藥也大寒益腎水膀胱用之如神桃仁辛甘潤治大便血結血秘血燥通潤大便七宣丸中用專治血結破血郁李仁甘潤治大便氣結燥澀滯不通七聖丸中用專治氣燥大麻子仁辛甘潤治風燥大便不通皂角子仁辛燥潤其性得濕則滑亦治風在腸中為燥結不通杏仁甘潤辛潤除肺中燥治氣燥在胸膈白豆蔻仁大辛溫蕩散肺中滯氣縮砂仁辛溫治脾胃氣結滯不散木香辛苦溫除肺中滯氣若療中下焦氣結滯須用檳榔為使麥門冬微苦寒治肺中伏火脈氣欲絕加五味子人參三味同煎服為之生脈散補肺中元氣不足須用之藥黑附子大辛熱其性走而不守亦能除胃中寒甚以白朮為佐謂之朮附湯除寒濕之聖藥也溫藥中少加之通行諸經引用藥也治經閉川烏大辛熱療風痹血痹寒痹半身不遂行經藥也玄參微苦寒治足少陰腎經之君藥也治本經須用山梔子微苦寒治心煩懊憹欲眠而不得眠心神顛倒欲絕血滯小便不利威靈仙苦溫主諸風濕冷宣通五臟去腹內瘕滯腰膝冷痛天麻甘平治風痰眩運頭痛薄荷葉辛苦療賊風傷寒發汗主清利頭目破血利關節治中風失音小兒風痰新病差人不可服之令虛汗不止秦艽苦辛微溫療風濕痹寒熱邪氣下利小水治五種黃病解酒毒黍粘子辛平主明目補中除風出癰疽瘡頭治咽膈不利桔梗辛苦微溫治咽喉痛利肺氣麻黃苦微溫若去節發太陽少陰經汗不去節止太陽少陰經汗荊芥穗辛溫清利頭目乾薑大辛熱治沉寒痼冷腎中無陽脈氣欲絕黑附子為使多用水同煎二物薑附湯是也亦治中焦有寒蜀椒辛溫大熱主咳逆上氣散風邪溫中明目下乳汁茴香辛平主諸瘻霍亂治腳氣補命門不足并腎勞疝氣止膀胱及陰痛開胃下食助陽道理小腸氣丁香辛溫溫脾胃止霍亂消痃癖氣脹反胃腹內冷痛紅花辛溫主產後血運口噤腹內惡血藿香甘微溫助脾胃治嘔吐療風水毒腫去惡氣霍亂心痛乾生薑辛大溫主傷寒頭痛鼻塞上氣止嘔吐治痰嗽與生者并相同與半夏等分主治心下急痛良薑辛大熱主暴冷胃中冷逆霍亂腹痛解酒毒玄胡索辛溫主破血止少腹痛產後諸疾婦人月事不調青皮辛溫主胸膈氣滯下食破積蓬莪荗苦辛溫除積聚當歸甘辛溫主癥癖破惡血婦人產後惡物上衝去諸瘡瘍療金瘡惡血溫中潤燥止痛阿膠甘平微溫主心腹痛內崩補虛安胎堅筋骨和血脈益氣止痢訶黎勒苦溫主心腹脹滿不下飲食消痰下氣通利津液破胸膈結氣治久痢療腸風瀉血生甘草甘微寒補脾胃不足能大瀉心火須用之烏梅酸溫主下氣除熱煩滿安心調中治痢止渴以鹽為白梅亦入除痰藥中用桑白皮甘寒主傷中五勞六極羸瘦補虛益氣枳實苦微寒除寒熱破結實消痰癖治心下痞逆氣脅痛犀角苦酸微寒主傷寒溫病頭病解大熱散風毒安心神止煩悶鎮肝消痰明目治中風失音小兒麩豆風熱驚癇京三稜苦平主老癖痛癥瘕結塊婦人血脈不調心腹刺痛破瘀血消氣脹木通甘平主小便不利導小腸中熱茵陳蒿苦平微寒治風濕熱邪結於內地榆苦甘酸微寒治月經不止小兒疳痢療諸瘡止膿血衍義云性沉寒入下焦治血熱痢疾香豉苦寒主傷寒頭痛寒熱脾氣煩躁滿悶連翹苦寒治寒熱鼠瘻瘰癧癰疽諸惡瘡腫瘤結熱蟲毒去白蟲主通利五淋除心臟客熱排膿止痛地骨皮苦寒根大寒子微寒治表有風熱實邪自汗牡蠣酸平微寒主傷寒寒熱溫瘧女子帶下赤白止汗止心痛氣結澀大小腸治心脅痞七方大小緩急奇偶複大君一臣三佐九制之大也又云遠而奇偶制其大服也大則數少少則二之腎肝位遠服湯散不厭頻而多小君一臣二制之小也又云近而奇偶制其小服也小則數多多則九之心肺位近服湯散不惡頻而多緩補上治上制以緩緩則氣味薄又云治主以緩緩則治其本急補下治下制以急急則氣味厚又云治客以急急則治其標奇君一臣二奇之制也又云君二臣三奇之制也陽數奇偶君二臣四偶之制也又云君二臣六偶之制也陰數偶複奇之不去則偶之是為重方也七方乃互為體用十劑宣通補泄輕重滑澀燥濕宣可以去壅薑橘之屬是也通可以去滯木通防己之屬是也補可以去弱人參羊肉之屬是也泄可以去閉葶藶大黃之屬是也輕可以去實麻黃葛根之屬是也重可以去怯磁石鐵漿之屬是也滑可以去著冬葵子榆白皮之屬是也澀可以去脫牡蠣龍骨之屬是也燥可以去濕桑白皮赤小豆之屬是也濕可以去枯白石英紫石英之屬是也只如此體皆有所屬所用藥者審而詳之則靡所失矣陶隱居云藥有宣通補泄輕重滑澀燥濕此十種詳之惟寒熱二種何獨見遺如寒可以去熱大黃朴硝之屬是也熱可以去寒附子官桂之屬是也今特補此二種以盡厥旨察病輕重凡欲療病先察其源先候病機五臟本虛六腑未竭血脈未亂精神未散服藥必活若病已成可得半愈病勢已過命將難全自非明醫聽聲察色至於診脈孰能知未病之病乎飲食勞倦門飲食所傷論陰陽應象論云水穀之寒熱感則害人六腑痹論云陰氣者靜則神藏躁則消亡飲食自倍腸胃乃傷此乃混言之也分之為二飲也食也飲者水也無形之氣也因而大飲則氣逆形寒飲冷則傷肺病則為喘咳為腫滿為水瀉輕則當發汗利小便使上下分消其濕解酲湯五苓散生薑半夏枳實白朮之類是也如重而蓄積為滿者芫花大戟甘遂牽牛之屬利下之此其治也食者物也有形之血也如生氣通天論云因飽而食筋脈橫解腸澼為痔或嘔吐或痞滿或下利腸澼當分寒熱輕重而治之輕則內消重則除下如傷寒物者半夏神麹乾薑三稜廣朮巴豆之類主之如傷熱物者枳實白朮青皮陳皮麥蘗黃連大黃之類主之亦有宜吐者陰陽應象論云在上者因而越之瓜蒂散主之然而不可過劑過劑則反傷腸胃蓋先因飲食自傷又加之以藥過故腸胃復傷而氣不能化食愈難消矣漸至羸困故五常政大論云大毒治病十去其六小毒治病十去其七凡毒治病不可過之此聖人之深戒也勞倦所傷論調經篇云陰虛生內熱岐伯云有所勞倦形氣衰少穀氣不盛上焦不行下脘不通而胃氣熱熱氣熏胸中故內熱舉痛論云勞則氣耗勞則喘且汗出內外皆越故氣耗矣夫喜怒不節起居不時有所勞倦皆損其氣氣衰則火旺火旺則乘其脾土脾主四肢故困倦無氣以動懶於語言動作喘乏表熱自汗心煩不安當病之時宜安心靜坐以養其氣以甘寒瀉其火熱以酸味收其散氣以甘溫補其中氣經言勞者溫之損者溫之者是也金匱要略云平人脈大為勞脈極虛亦為勞者矣夫勞之為病其脈浮大手足煩熱春夏劇秋冬差脈大者熱邪也極虛者氣損也春夏劇者時助邪也秋冬差者時勝邪也以黃耆建中湯治之此亦溫之之意也夫上古聖人飲食有節起居有常不妄作勞形與神倶百歲乃去此謂治未病也今時之人去聖人久遠則不然飲食失節起居失宜妄作勞役形氣俱傷故病而後藥之是治其已病也推其百病之源皆因飲食勞倦而胃氣元氣散解不能滋榮百脈灌溉臟腑衛護周身之所致也故蒼天之氣貴清靜陽氣惡煩勞噫飲食喜怒之間寒暑起居之時可不慎歟調中益氣湯治因飢飽勞役損傷脾胃元氣不足其脈弦或洪緩而沉按之無力中之下時得一澀其證身體沉重四肢倦懶百節煩疼胸滿短氣膈咽不通心煩不安耳鳴耳聾目有瘀肉熱壅如火視物昏花口中沃沫飲食失味怠惰嗜臥忽肥忽瘦溺色變或清利而數或上飲下便或夏月飧泄腹中虛痛不思飲食黃耆一錢人參去蘆半錢炙甘草半錢陳皮二分五味子七個芍藥三分白朮三分當歸五分升麻二分柴胡二分內經云勞則氣耗熱則傷氣以黃耆甘草之甘瀉其熱邪為主以白芍藥五味子之酸能收耗散之氣又經云勞者溫之損者溫之以人參甘溫補氣不足當歸辛溫補血不足為臣以白朮陳皮苦甘溫除胃中客熱以養胃氣為佐升麻柴胡苦平味之薄者陰中之陽為脾胃之氣下溜上氣不足故從陰引陽以補之又行陽明少陽二經為使也上件㕮咀作一服水二盞煎至一盞去滓溫食前服所謂病在四肢血脈空腹而在旦者也如時顯躁熱是下元陰火蒸蒸然發也加生地黃二分如無變證勿加下皆仿此如大便虛坐不得或大便了而不了腹中常逼迫皆血虛血澀也如咳嗽加五味子一十粒腹中氣不轉運者更加陳皮三分木香二分身體沉重雖小便數多加茯苓二錢蒼朮一錢澤瀉半錢黃蘗三分是從權而去濕也不可常用兼足太陰已病其脈亦終於心中故濕熱相合而生煩亂也如胃氣不和加湯洗薑製半夏五分痰厥頭疼非半夏不能除亦宜加之此足太陰脾經之邪所作也如夏月須加白芍藥三分以補肺氣不足如春夏腹疼尤宜加芍藥惡熱燥渴而腹疼者更加白芍藥半錢生黃芩二分惡寒腹疼加中桂二錢去黃芩謂之桂枝芍藥湯如冬月腹疼不可用芍藥以太寒故也只加乾薑二分或加半夏四分薑製如秋冬胃脈四道為衝脈所逆并脅下少陽脈二道而反上行病名曰厥逆其證氣上行而喘促息有音而不得臥用吳茱萸半錢或一錢湯洗去苦觀厥氣多少而用之此病隨四時為寒溫涼熱如夏月有此證為大熱也宜以下三味為丸治之黃連酒拌濕焙乾黃蘗酒製知母酒製上件為細末熟水為丸如梧子大每服一百丸空心多飲熱湯送下不令胃中停蓄恐犯胃氣服畢少時便以美膳壓之使速至下元以瀉衝脈之邪也大體治飲食勞倦所得之病乃七損證也宜以溫平甘多辛少之藥治之內經云勞者溫之損者溫之是其常治也如四時見寒熱病或酒過多或食辛熱之物而作病或居大寒大熱處而益其病或食冰水大寒物而作病皆當臨時制宜加大寒大熱之藥以權治之不可以為得效而常用之蓋為形氣不足隨其助而便發也故黃帝針經有云從下上者引而去之上氣不足推而揚之上氣者心肺也上焦元氣也陽病有陰宜從陰引陽也故以入腎肝下焦之藥引入甘多辛少之味升發陽氣而得上行以補心肺上焦元氣使飲食入胃脾精之氣自然上行陽道輸精於皮毛經絡欲使真氣上行先實其心肺又從而去邪於腠理皮毛故經云視前痛者常先取之以繆刺瀉營氣之壅其經絡而痛者為血凝而不流故先去之而後治其他病也寬中進食丸草豆蔻仁五錢縮砂仁一錢半半夏麹七錢麥蘗麹炒黃一兩枳實四錢麩炒神麹炒黃五錢炙甘草一錢半乾生薑一錢陳皮三錢木香半錢白朮二錢白茯苓二錢豬苓去黑皮一錢澤瀉二錢人參一錢青皮一錢上件為末湯浸蒸餅為丸如梧桐子大每服三十丸溫水送下食前和中丸補胃進食乾薑三錢乾生木瓜三錢炙甘草二錢陳皮四錢人參二錢白朮三錢益智仁二錢上件為末用湯浸蒸餅丸如梧桐子大每服三五十丸溫水食前下論酒客病并治法論酒大熱有毒氣味俱陽乃無形之物也若傷之則止當發散汗出即愈矣此最妙法也其次莫如利小便二者乃上下分消其濕何酒病之有今之酒病者往往服酒癥丸大熱之藥下之又用牽牛大黃下之是無形元氣受病反下有形陰血乖誤甚矣酒性大熱已傷元氣而復重瀉之況亦損腎水真陰及有形陰血俱為不足如此則陰血愈虛真水愈弱陽毒之熱大旺反增其陰火是謂元氣消亡其神何依折人長命雖不然則虛損之病成矣金匱要略云酒疸下之久久為黑疸慎不可犯此誠不若令上下分消其濕當以葛花解酲湯主之葛花解酲湯白豆蔻半兩砂仁半兩乾生薑二錢葛花半兩白茯苓一錢半木香半錢陳皮去白一錢半青皮去白三錢豬苓去黑皮一錢半人參去蘆一錢半白朮二錢澤瀉二錢神麹炒黃二錢上為極細末秤和勻每服二錢匕白湯調下但得微汗酒病去矣此蓋不得已而用豈可恃賴日月飲酒此方氣味辛辣偶因酒病服之則不能損元氣何者敵酒病故也勿頻服之損人天年半夏枳朮丸治傷冷物心腹痞滿嘔噦不止半夏一兩湯洗七次枳實麩炒一兩乾生薑一兩白朮二兩上件為末荷葉燒飯為丸如梧桐子大每服五十丸溫水下食後木香枳朮丸破寒滯氣消寒飲食開胃進食木香一兩半枳實一兩白朮二兩乾薑三錢陳皮一兩炒麹一錢人參三錢上為末荷葉燒飯為丸如梧子大每服五十丸溫水送下食前三稜消積丸治傷生冷硬物不能消化心腹滿悶不快京三稜炮廣荗炮各七錢青皮五錢陳皮五錢丁皮益智各三錢炒麹七錢巴豆和皮米炒黑焦去米三錢上件為末醋糊丸每服十五至二十丸溫薑湯食前下量虛實加減如大便利止後服內外傷辨用茴香五錢橘皮枳朮丸治老幼元氣虛弱飲食不消臟腑不調心下痞滿不快陳皮二兩枳實麩炒一兩白朮一兩上件為末荷葉燒飯為丸每服五十丸食後溫水下木香檳榔丸消食破滯氣木香檳榔各三錢青皮陳皮各五錢麥蘗𬹃枳實各七錢白朮五錢厚朴五錢上件為末湯浸蒸餅為丸如梧子大每服五七十丸溫水食後下枳實導滯丸治傷濕熱之物不得施化而作痞病悶亂不安枳實炒去穰五錢黃芩黃連去須各五錢茯苓去皮澤瀉各二錢白朮炒麹各五錢大黃一兩上件為末湯浸蒸餅為丸如梧子大每服五十丸至七八十丸食遠溫水送下量虛實加減更衣止後服若有宿食而煩者仲景以梔子大黃湯主之氣口三盛則食傷太陰填塞悶亂極則心胃大疼兀兀欲吐得吐則已俗呼食迷風是也經云上部有脈下部無脈其人當吐不吐者死宜瓜蒂散之類吐之經云其髙者因而越之此之謂也苽蒂散苽蒂三錢赤小豆三錢上為末每服一錢匕溫水半小盞調下以吐為度如食傷之太重者備急丸主之皆急劑也經云其下者引而竭之此之謂也一名獨行丸東垣老人解云盛食填塞於胸中為之窒塞兩寸脈當主事反兩尺脈不見其理安在胸中有食故以吐出之食者物之形物者坤土也是足太陰之號也胸中者肺也為物所填肺者手太陰金也金主殺伐也與坤土俱在於上而王於天金能尅木故肝木生發之氣伏於地下此謂之木欎也吐去上焦陰土之物木得舒暢則欎結去矣食塞於上脈絕於下若不明天地之道無由達此至理水火者陰陽之徵兆天地之別名也故曰獨陽不生獨陰不長天地之用在於地下則萬物生長矣地之用在於天則萬物收藏矣此乃天地交而萬物通也此天地相根之道也故陽火之根本於地下陰水之源本於天上故曰水出髙源故人五臟主有形之物物者陰也陰水也右三部脈主之偏見於寸口食塞其上是絕五臟之源源絕則水不流兩尺竭絕此其理也交泰丸升陽氣瀉陰火調榮氣進飲食助精神寬腹中除怠惰嗜臥四肢不收沉困懶倦知母四錢半炒半酒製春夏用秋冬去之黃連去須七錢秋冬減一錢半厚朴去皮炒三錢秋冬加七錢小椒炒去汗并閉目子枝一錢半川烏頭炒去皮四錢半吳茱萸湯洗七次五錢巴豆霜五分苦楝酒煮三錢人參去蘆一錢砂仁三錢柴胡一錢半肉桂去皮一錢白茯苓去皮三錢皂角水洗煨去皮弦子六錢紫菀去苗六錢乾薑炮製三分白朮一錢半上件除巴豆霜另研餘藥同為細末煉蜜為丸如梧桐子大每服三五十丸溫水送下食前內傷宜禁內傷者戊火已衰不能制物寒藥太多固非所宜加以溫劑似為當矣然有熱物傷者當從權以寒藥治之隨時之宜不可不知也凡小兒內傷尤不用快利食藥及牽牛瀉水之藥蓋內中多有出癍疹者癍疹者火之屬大禁利小便損津液津液損則血不生瘡家亦然戒之戒之煩躁發熱門煩躁發熱論黃帝針經五亂篇云氣亂於心則煩心密嘿俯首靜伏云云氣在於心者取手少陰心主之咳嗽煩冤者是腎氣之逆也煩冤者取足少陰又云煩冤者取足太陰仲景分之為二煩也躁也蓋火入於肺為煩入於腎為躁躁煩俱在於上腎子通於肺母大抵煩躁者皆心火為之心者君火也火旺則金鑠水虧惟火獨存故肺腎合而為煩躁焉又脾經絡於心中心經起於脾中二經相接由熱生煩夫煩者擾擾心亂兀兀欲吐怔忡不安躁者無時而熱冷汗自出少時則止經言陰躁者是也仲景以梔子色赤而味苦入心而治煩以鹽豉色黑而味醎入腎而治躁名梔子鹽豉湯乃神品之藥也若有宿食而煩者梔子大黃湯主之又有虛熱實熱火欎而熱者如不能食而熱自汗氣短者虛也以甘寒之劑瀉熱補氣經言治熱以寒溫而行之也如能食而熱口舌乾燥大便難者以辛苦大寒之劑下之瀉熱補水經云陽盛陰虛下之則愈如陰覆其陽火熱不得伸宜汗之經云體若燔炭汗出而散者是也凡治熱者當細分之不可概論朱砂安神丸治心中煩亂怔忡兀兀欲吐胸中氣亂而熱有如懊憹之狀皆膈上血中伏火蒸蒸而不安宜用權衡法以鎮陰火之浮行以養上焦元氣朱砂五錢另研水飛陰乾秤黃連去須揀淨酒製秤六錢炙甘草五錢五分生地黃二錢五分當歸去蘆二錢五分內經云熱淫所勝治以甘寒以苦瀉之以黃連之苦寒去心煩除濕熱為君以甘草生地黃之甘寒瀉火補氣滋生陰血為臣以當歸補血不足朱砂納浮溜之火而安神明也上四味為細末另研朱砂水飛如塵陰乾為衣湯浸蒸餅為丸如黍米大每服十五丸津唾嚥下食後黃連安神丸治心煩懊憹反覆心亂怔忡上熱胸中氣亂心下痞悶食入反出朱砂四錢黃連五錢生甘草二錢半上為細末湯浸蒸餅丸如黍米大每服一十丸食後時時津唾嚥下內經云心肺位近故近而奇偶制其小服此緩治之理也當歸補血湯治肌熱躁熱目赤面紅煩渴引飲晝夜不息其脈浮大而虛重按全無通評虛實論云脈虛血虛脈實血實又云血虛發熱證象白虎唯脈不長實為辨也若誤服白虎湯必死此病得之飢困勞役黃耆一兩當歸二錢酒製上㕮咀都作一服水二盞煎至一盞去滓稍熱服之空心食前柴胡升麻湯治男子婦人四肢發困熱筋骨熱表熱如火燎於肌膚捫之烙人手夫四肢者屬脾脾者土也熱伏地中此病多因血虛而得之也又有胃虛過食冷物欎遏陽氣於脾土之中并宜服之羌活升麻葛根白芍藥人參獨活以上各五錢柴胡三錢甘草炙三錢防風二錢半生甘草二錢上件㕮咀如麻豆大每服五錢水三盞煎至一盞去滓溫服忌寒冷之物火欎湯治五心煩熱是火欎於地中四肢者脾土也心火下陷於土之中欎而不得伸故經云欎則發之升麻柴胡葛根白芍藥以上各一兩防風甘草以上各五錢上㕮咀每服五錢水二大盞入連須蔥白三寸煎至一盞去滓稍熱不拘時服
