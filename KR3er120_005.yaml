body:
  text: 卷五頭痛門頭痛論金匱真言論云東風生於春病在肝俞在頸項故春風者病在頭又諸陽會於頭面如足太陽膀胱之脈起於目內眥上額交巔上入絡腦還出別下項病衝頭痛又足少陽膽之脈起於目鋭眥上抵頭角病則頭角額痛夫風從上受之風寒傷上邪從外入客於經絡令人振寒頭痛身重惡寒治在風池風府調其陰陽不足則補有餘則瀉汗之則愈此傷寒頭痛也頭痛耳鳴九竅不利者腸胃之所生乃氣虛頭痛也心煩頭痛者病在膈中過在手巨陽少陰乃濕熱頭痛也如氣上不下頭痛癲疾者下虛上實也過在足少陰巨陽甚則入腎寒濕頭痛也如頭半邊痛者先取手少陽陽明後取足少陽陽明此偏頭痛也有真頭痛者甚則腦盡痛手足寒至節死不治有厥逆頭痛者所犯大寒內至骨髓髓者以腦為主腦逆故令頭痛齒亦痛凡頭痛皆以風藥治之者總其大體而言之也髙巔之上惟風可到故味之薄者陰中之陽乃自地升天者也然亦有三陰三陽之異故太陽頭痛惡風脈浮緊川芎羌活獨活麻黃之類為主少陽經頭痛脈弦細往來寒熱柴胡為主陽明頭痛自汗發熱惡寒脈浮緩長實者升麻葛根石膏白芷為主太陰頭痛必有痰體重或腹痛為痰癖其脈沉緩蒼朮半夏南星為主少陰經頭痛三陰三陽經不流行而足寒氣逆為寒厥其脈沉細麻黃附子細辛為主厥陰頭痛項痛或痰吐涎沫厥冷其脈浮緩吳茱萸湯主之諸血虛頭痛當歸川芎為主諸氣虛頭痛人參黃耆為主為主者主治也兼見何證以佐使藥治之此立方之大法也氣血俱虛頭痛者於調中益氣湯中少加川芎蔓荊子細辛其效如神半夏白朮天麻湯治痰厥頭痛藥也清空膏乃風濕熱頭痛藥也羌活附子湯厥逆頭痛藥也如濕氣在頭者以苦吐之不可執方而治先師壯歲病頭痛每發時兩頰青黃暈眩目不欲開懶於語言身體沉重兀兀欲吐食數日方過潔古老曰此厥陰太陰合而為病名曰風痰以局方內玉壺丸治之少風濕藥二味可加雄黃白朮以治風濕更名水煮金花丸方在潔古家珍更灸俠溪二穴各二七壯不旬日良愈是知方者體也法者用也徒執體而不知用者弊體用不失可謂上工信矣夫丁未十月中范天騋之內素有脾胃之證時顯煩躁胸中不利大便不通因乘寒出外晚歸又為寒氣怫欎悶亂大作火不能伸故也疑其有熱服疏風丸大便行其病不減恐其藥少再服七八丸大便復見兩三行原證不瘳增添吐逆食不能停痰唾稠粘湧出不止眼澀頭旋惡心煩悶氣短促上喘無力以言心神顛倒兀兀不止目不敢開如在風雲中頭苦痛如裂身重如山四肢厥冷不得安臥先師料前證是胃氣已損復下兩次重虛脾胃病名曰痰厥頭痛與半夏白朮天麻湯半夏白朮天麻湯天麻半錢半夏一錢半黃耆半錢人參半錢白朮一錢蒼朮橘皮澤瀉茯苓各半錢炒麴一錢麥蘗𬹃二錢乾薑二分黃蘗二分此頭痛苦甚為足太陰痰厥頭痛非半夏不能療眼黑頭旋風虛內作非天麻不能除其苗謂之定風草獨不為風所動也亦治內風之神藥也內風者虛風是也黃耆甘溫瀉火補元氣實表虛止自汗人參甘溫益氣瀉火補中二術俱苦甘溫除濕補中益氣澤瀉茯苓利小便導濕橘皮苦溫益氣調中升陽麴消食蕩胃中滯氣大麥蘗寬中助胃氣乾薑辛溫以滌中寒黃蘗苦寒酒製以療冬天少火在泉發躁也上件㕮咀每服半兩水二大盞煎至一盞去滓帶熱服之再服而愈清空膏治偏頭痛年深不愈者及療風濕熱頭痛上壅損目及腦痛不止羌活一兩防風去蘆一兩柴胡七錢川芎五錢甘草炙一兩半黃連去須炒一兩細挺子黃芩三兩一半酒製一半炒上件同為細末每服二錢匕熱盞內入茶少許湯調如膏抄在口內少用白湯送下臨臥如苦頭痛每服中加細辛二分如太陰脈緩有痰名曰痰厥頭痛內減羌活防風川芎甘草加半夏一兩半如偏正頭痛服之不愈減羌活防風川芎一半加柴胡一倍如發熱惡熱而渴此陽明頭痛只白虎湯加白芷徹清膏川芎三分蔓荊子一分細辛一分藁本一錢生甘草半錢熟甘草半錢薄荷葉三分上件為細末每服二錢茶清調下食後川芎散治頭目不清利川芎三分羌活防風各一錢柴胡半分升麻藁本各一錢炒黃芩四錢半生甘草一錢熟甘草二錢黃芩四錢半酒製黃連四錢半酒製生地二錢上件為細末每一錢或二三錢食後溫茶清調下忌酒濕𬹃細辛散治偏正頭痛細辛二分川芎七分柴胡二錢黃芩一錢炒黃芩一錢酒製生黃芩半錢瓦粉二分炙甘草一錢半黃連七分芍藥半錢上㕮咀每服三錢水一大盞半煎至一盞去滓取清食後服之羌活湯治風熱壅盛上攻頭目昏眩羌活防風細黃芩酒製黃連酒製各一兩黃蘗半兩酒製柴胡七錢瓜蔞根半兩酒製炙甘草七分白茯苓五分澤瀉三錢上件為粗末每服五錢水二大盞煎至一盞取清食後或臨臥通口熱服日進二服安神湯治頭旋眼黑頭痛羌活一兩防風二錢半柴胡升麻各半兩黃蘗酒製一兩知母酒製半兩生地黃半兩黃耆二兩炙甘草生甘草各二錢上件每服稱半兩水二盞煎至一盞半加蔓荊子半錢川芎三分再煎至一盞去滓臨臥熱服養神湯治精神短不得睡項筋腫急難伸禁甘溫宜苦味黃耆一錢人參三分甘草七分蒼朮半錢白朮三分柴胡一分升麻四分當歸身半錢麥蘗𬹃半錢木香一分川芎三分橘皮一分黃芩酒製二分黃連半錢黃蘗三分半夏七分上㕮咀如麻豆大每服五錢水二大盞煎至一盞去滓稍熱服食後選奇湯治眉骨痛不可忍羌活防風各三錢甘草三錢冬多用黃芩酒製一錢冬月不用如能食熱痛加黃芩上㕮咀每服三錢水二盞煎至一盞去滓稍熱食後時時服之嗅藥欎金散治風熱頭痛石膏二錢薄荷葉三錢芒硝三錢欎金一錢香白芷二錢上為極細末口噙水鼻內嗅之麻黃吳茱萸湯治頭痛胸中痛食減少咽嗌不利右寸脈弦急麻黃半錢吳茱萸三分黃耆二分川芎一分羌活五分蔓荊子一分細辛一分藁本二分柴胡一分黃芩三分蒼朮一錢黃連一分半夏一分黃蘗二分升麻三分紅花少許當歸二分上件㕮咀都作一服水二盞煎至一盞去滓稍熱食後服太陽經嚏藥防風二分紅豆二個上為細末鼻內嗅之紅豆散治頭重如山此濕氣在頭也麻黃根炒五錢苦丁香半錢紅豆十個羌活根炒連翹各三分上五味為細末鼻內嗅之神效羌活附子湯治冬月大寒犯腦令人腦痛齒亦痛名曰腦風奇經論中麻黃三分不去根節黑附子三分羌活半兩蒼朮半錢防風二分黃耆一錢甘草升麻各二分白芷白殭蠶黃蘗各三分有寒嗽加佛耳草三分上件都作一服水二盞煎至一盞去滓溫服食後眼門諸脈者皆屬於目論陰陽應象大論云諸脈者皆屬於目目得血而能視黃帝針經九卷大惑論第八五臟六腑精氣皆上注於目而為之精精之窠為眼骨之精為瞳子筋之精為黑眼血之精為絡其窠氣之精為白眼肌肉之精則為約束裹擷筋骨血氣之精而與脈并為系上屬於腦後出於項中故邪中於項因逢其身之虛其入深則即隨眼系入於腦則腦轉腦轉則引目系急目系急則目眩以轉矣邪中其精其精所中不相比也則精散精散則視歧故見兩物目者五臟六腑之精營衛魂魄之氣常營也神氣之所生也故神勞則魂魄散志意亂是故瞳子黑眼法於陰白眼赤脈法於陽故陰陽合傳而為精明也目者心之使也心者神之舍也故神散亂而不轉卒然見非常之處精神魂魄散不相得故曰惑也夫十二經脈三百六十五絡其血氣皆上走於面而走空竅其精陽氣上散於目而為精其氣走於耳而為聽因心事煩冗飲食失節勞役過度致脾胃虛弱心火大盛則百脈沸騰血脈逆行邪害空竅天明則日月不明矣夫五臟六腑之精氣皆秉受於脾上貫於目脾者諸陰之首也目者血脈之宗也故脾虛則五臟之精氣皆失所司不能歸明於目矣心者君火也主人之神宜靜而安相火代行其令相火者包絡也主百脈皆榮於目既勞役運動勢乃妄行又因邪氣所并而損血脈故諸病生焉凡醫者不理脾胃及養血安神治標不治本是不明正理也戊申六月徐總管患眼疾於上眼皮下出黑白翳二個隱澀難開兩目緊縮無疼痛兩手寸脈細緊按之洪大無力知足太陽膀胱為命門相火煎熬逆行作寒水翳及寒膜遮睛證呵欠善悲健忘嚏噴眵淚時作淚下面赤而白能食不大便小便數而欠氣上而喘以撥雲湯治之撥雲湯方黃耆一分細辛葉半錢柴胡七分生薑五分荊芥穗一錢羌活一錢半防風一錢半藁本一錢生甘草一錢升麻一錢葛根五分川芎半錢知母一錢黃蘗一錢半當歸身一錢上㕮咀都作一服水二大盞煎至一盞去滓稍熱服食後沖和陽胃湯治內障眼得之脾胃元氣衰弱心火與三焦俱盛飲食失節形體勞役心不得休息故上為此疾服之神效柴胡七錢羌活一兩半防風半兩炙甘草一兩半當歸酒製白朮升麻各一兩白芍藥六錢乾薑一錢五味子二錢人參葛根各一兩黃耆一兩半白茯苓三錢上㕮咀每服五六錢水三大盞煎至二盞入黃芩黃連二錢同煎至一盞去滓稍熱服食後瀉熱黃連湯黃芩酒製炒黃連酒製炒草龍膽酒製生地黃酒製各一兩升麻五分柴胡一兩上件㕮咀每服二錢將先煎藥水內入瀉熱黃連湯再煎至一盞去滓於日午飯間熱服之午後服之則陽道不行臨臥休服反助陰故也助陽活血湯治眼發之後猶有上熱白睛紅隱澀難開睡多眵淚防風黃耆炙甘草各半錢蔓荊子二分當歸身酒製半錢白芷三分升麻七分柴胡五分上㕮咀都作一服水一盞半煎至一盞去滓稍熱服臨臥明目細辛湯治兩目發赤微痛羞明畏日怯風寒怕火眼睫成紐眵糊多隱澀難開眉攢腫悶鼻塞涕唾稠粘大便微硬麻黃羌活各三錢防風二錢藁本一錢川芎半錢細辛少許白茯苓一錢蔓荊子六分荊芥穗一錢二分當歸尾一錢生地黃六分酒製椒八個桃仁一十個紅花少許上㕮咀分作四服每服水二盞煎至一盞去滓稍熱服臨臥神效明目湯治眼稜緊急致倒睫拳毛損目及上下瞼皆赤爛睛赤疼痛昏暗晝則冷淚常流夜則眼澀難開而眵淚滿眼葛根一錢半甘草炙二錢防風一錢蔓荊子半錢細辛二分一法加黃耆一錢上㕮咀作二服每服水二盞煎至一盞去滓稍熱服臨臥神效黃耆湯治渾身麻木不仁或右或左身麻木或頭面或隻手臂或只腿腳麻木不仁並皆治之如兩目緊急縮小及羞明畏日或隱澀難開或視物無力睛痛手不得近或目少睛光或目中如火黃耆二兩人參八錢炙甘草一兩蔓荊子一錢白芍藥一兩橘皮半兩上同㕮咀每服五錢水一大盞八分煎至一盞去滓稍熱服臨臥如小便淋澀每服中加澤瀉半錢如有大熱證加黃蘗三分酒製炒如麻木不仁雖有熱不用黃蘗更加上黃耆一兩通三兩也益氣聰明湯治飲食不節勞役形體脾胃不足得內障耳鳴或多年目昏暗視物不能此藥能令目廣大久服無內外障耳鳴耳聾之患又令精神過倍元氣自益身輕體健耳目聰明黃耆甘草各半兩人參半兩升麻葛根各三錢蔓荊子一錢半芍藥一錢黃蘗一錢酒製銼炒黃上㕮咀每服稱三錢水二盞煎至一盞去滓熱服臨臥近五更再煎服之得睡更妙如煩悶或有熱漸加黃蘗春夏加之盛暑夏月倍之若此一味多則不效如脾胃虛去之有熱者少用之如舊有熱麻木或熱上壅頭目三兩服之後其熱皆除治老人腰以下沉重疼痛如神此藥久服令人上重乃有精神兩足輕浮不知高下若如此空心服之或少加黃蘗輕浮自減若治倒睫去黃蘗芍藥及忌煙火酸物補陽湯治陽不勝其陰乃陰盛陽虛則九竅不通今青白翳見於大眥及足太陽少陰藥中欎遏足厥陰肝經氣不得上通於目故青白翳內阻也當於太陽少陰經中九泉之下以益肝中陽氣衝天上行此乃先補其陽後於足太陽少陰標中標者頭也瀉足厥陰肝經火下伏於陽中乃次治也內經云陰盛陽虛當先補其陽後瀉其陰此治法是也每日清晨以腹中無宿食服補陽湯臨臥服益陰丸若天色變大寒大風并勞役預日飲食不調精神不足或氣弱俱不得服候時氣和平天氣如常服之乃先補其陽使陽氣上升通於肝經之末利空竅於目矣羌活獨活甘草人參熟地黃黃耆白朮各一兩澤瀉研為末陳皮各半兩生地黃炒白茯苓去皮知母炒各三錢柴胡去苗三兩防風半兩白芍藥半兩肉桂去皮一錢當歸身去蘆酒製三錢上同為粗末每服半兩水三盞煎至一盞去滓空心宿食消盡服之連蘗益陰丸羌活獨活甘草當歸尾依前製防風去蘆五味子各五錢石決明燒存性三錢草決明細黃芩黃蘗知母黃連酒內先製或酒拌潤炒以上各一兩上件為細末煉蜜為丸如緑豆大每服五十丸漸加至百丸止茶清送下常多服補陽湯少服此藥為不可勝補陽湯恐妨飲食升陽柴胡湯羌活獨活甘草根當歸身熟地黃各一兩人參黃耆白朮各半兩澤瀉三錢白芍藥一兩陳皮白茯苓防風各三錢生地黃五錢酒炒肉桂半錢柴胡去苗一錢半楮實半兩酒拌知母三錢酒製夏月加五錢上㕮咀每服五錢水二盞煎至一盞去滓稍熱服食後另一料煉蜜為丸如桐子大食遠茶清送下五十丸每日與前藥各一服如天氣熱甚加五味子三錢或半兩天門冬去心半兩更加芍藥半兩楮實半兩芎辛湯治兩目晝夜隱澀難開羞明畏日目赤視物昏暗神效芎藭蔓荊子各半錢細辛二分防風一錢半甘草香白芷各一錢㕮咀都作一服水一盞八分煎至一盞去滓稍熱服臨臥人參補胃湯治勞役所傷飲食不節內障昏暗黃耆人參各一兩炙甘草八分蔓荊子一錢白芍藥三錢黃蘗酒拌濕四遍一錢上㕮咀每服三四錢水二盞煎至一盞去滓稍熱服臨臥三五服後兩目廣大視物如童時惟覺兩腳踏地不知髙下蓋冬天多服升陽藥故也病減住服候五七日再服此藥春間服乃時藥也連翹飲子治目中溜火惡日與火隱澀難開小角緊久視昏花迎風有淚蔓荊子生甘草連翹各三分柴胡二分黃芩酒製半錢生地黃當歸紅葵花人參各三分黃耆半錢升麻一錢防風羌活各半錢上件每服五錢水二盞煎至一盞去滓稍熱服食後論瞳子散大并方戊戌初冬李叔和至西京朋友待之以豬肉煎餅同蒜醋食之後復飲酒大醉臥於暖炕翌日病眼兩瞳子散大於黃睛視物無的以小為大以短為長卒然見非常之處行步踏空多求醫療而莫之愈至己亥春求治於先師曰內經有云五臟六腑之精氣皆上注於目而為之精精之窠為眼骨之精為瞳子又云筋骨氣血之精而為脈并為系上屬於腦又瞳子黑眼法於陰今瞳子散大者由食辛熱物太甚故也所謂辛主散熱則助火上乘於腦中其精故散精散則視物亦散大也夫精明者所以視萬物者也今視物不真則精衰矣蓋火之與氣勢不兩立故經曰壯火食氣壯火散氣手少陰足厥陰所主風熱連目系邪之中人各從其類故循此道而來攻頭目腫悶而瞳子散大皆血虛陰弱故也當除風熱涼血益血以收耗散之氣則愈矣滋陰地黃丸熟地黃一兩生地黃一兩半酒製焙乾柴胡八錢天門冬去心焙炙甘草枳殼各三錢人參二錢黃連三錢地骨皮二錢五味子三錢黃芩半兩當歸身五錢水洗淨酒拌焙內經云熱淫所勝平以醎寒佐以苦甘以酸收之以黃連黃芩大苦寒除邪氣之盛為君當歸身辛溫生熟地黃苦甘寒養血涼血為臣五味子酸寒體輕浮上收瞳子之散大人參甘草地骨皮天門冬枳殼苦甘寒瀉熱補氣為佐柴胡引用為使也上件為細末煉蜜為丸如緑豆大每服百丸溫茶清送下食後日進三服制之緩也大忌食辛辣物而助火邪及食寒冷物損胃氣藥不能上行也益陰腎氣丸此壯水之主以鎮陽光熟地黃三兩牡丹皮五錢生地黃四兩酒製炒澤瀉二錢半當歸尾生去土酒製山茱萸各半兩茯苓二錢半柴胡五味子乾山藥各五錢上件為細末煉蜜為丸如桐子大朱砂為衣每服五七十丸鹽湯送下空心羌活退翳丸治內障右眼小眥青白翳大眥微顯白翳腦痛瞳子散大上熱惡熱大便澀時難小便如常遇天熱暖處頭痛睛脹能食日沒後天陰則昏暗此證亦可服滋陰地黃丸熟地黃八錢生地黃酒製當歸身酒製焙黃蘗各半兩酒製川芎三錢芍藥一兩三錢防己二錢酒製知母三錢酒製丹參半兩茺蔚子半兩牡丹皮三錢寒水石一錢生用柴胡半兩羌活三兩黑附子一錢炮上為細末煉蜜為丸如小豆大空心每服五七十丸白湯送下如消食未盡候飢時服之忌語言隨後以食壓之圓明膏治內障生翳及瞳子散大皆勞心過度因飲食失節之所致也柴胡五錢麻黃微搗五錢去節當歸身三錢生地黃半兩黃連五錢甘草二錢訶子皮二錢濕紙裹煨上七味先以水二碗熬麻黃至一碗掠去沫外六味各㕮咀如麻豆大篩去末稱畢入在內同熬滴入水中不散入去沫蜜少許再熬勤如常點之百點膏張濟明眼病翳六年以至遮瞳人視物不明如覺雲氣遮障時值暑熱大作點此藥五七日翳退去一半黃連揀淨二錢銼麻豆大以水一大碗熬至半碗入下項藥當歸身甘草以上各六分防風八分蕤仁去皮尖三分上件各銼如麻豆大蕤仁另研如泥同熬滴水中不散入去沫蜜少許再熬少時為度令病人心靜點之至目微痛為度日點五七次臨臥尤疾效名之曰百點膏但欲多點使藥力相繼也吹雲膏治視物睛困無力隱澀難開睡覺多眵目中淚下及迎風寒泣下羞明畏日常欲閉目喜在暗室塞其戶牖翳膜歲久遮睛此藥多點神效黃連三錢生地黃一錢半生甘草六分青皮四分柴胡五分升麻三分荊芥穗一錢微取濃汁當歸身六分蕤仁三分連翹四分細辛葉一分防風四分以上藥銼如麻豆大陳連翹外用澄淨水二碗先熬餘藥去半碗入連翹同熬至一大盞許去滓入銀盞內以文武火熬至入水滴成珠不散入煉去沫熟蜜少許熬勻點之復明膏治足太陽寒水膜子遮睛白翳在上視物不明椒樹西北根東南根各二分正麻黃去根節三分羌活七分黃連三分當歸身六分防風三分生甘草四分柴胡升麻生地黃各三分蕤仁六個藁本漢防己各二分上用淨水一大碗先煎漢防己黃連生甘草當歸生地黃煎至一半下餘藥外再煎至一盞去滓入銀盞內再熬之有力為度廣大重明湯治兩目瞼赤腫楞生瘡目多眵淚隱澀難開及熱腫痛并稍赤及眼瞼癢極抓之至破爛赤腫痛不可忍草龍膽防風生甘草細辛各一錢上件㕮咀如麻豆大內甘草不銼只作一錠先以水一碗半煎草龍膽一味至一半再入餘三味煎至少半碗濾去滓用清帶熱洗以重湯坐令熱日用五七次但洗畢少合眼須臾許開努肉泛長及癢亦驗防風飲子治倒睫拳毛黃耆炙甘草人參各一錢葛根半錢防風半錢當歸身七分半細辛葉蔓荊子各三分上件銼如麻豆大都作一服水二盞煎至一盞去滓溫服食後避風寒服之夫眼生倒睫拳毛者兩目緊急皮縮之所至也蓋內復熱致陰氣外行當去其內熱并火邪眼皮緩則眼毛立出翳膜亦退用手法攀出內瞼向外速以三稜針出血以左手爪甲迎其針鋒立愈治目眶歲久赤爛俗呼為赤瞎是也當以三稜針刺目框外以瀉濕熱立愈龍膽飲子治疳眼流膿生疳翳濕熱為病神效不治寒濕為病炒黃芩三錢蛇退皮半錢麻黃一錢半青蛤粉羌活草龍膽各三錢穀精草半錢升麻二錢川欎金炙甘草各半錢上為細末每服二錢食後茶調服碧天丸治目疾纍服寒涼藥不愈兩眼蒸熱有如火熏赤而不痛紅絲滿目血脈貫睛瞀悶昏暗羞明畏日或上下瞼赤爛或冒風沙而內外眥皆破洗之大有神效瓦粉炒一兩銅緑七分為末枯礬二分上先研白礬銅緑令細旋旋入粉同研勻熱水和之共為百丸每用一丸熱湯半盞浸一兩時辰洗至覺微澀為度合半時許洗畢瞑目便睡又名一井珠丸一丸可服十日如再用湯內坐令熱此藥治其標為裏熱已去矣若裏實者此藥不宜嗅藥碧雲散青黛一錢半蔓荊子川芎各一錢二分欎金一錢石膏一錢三分細辛一錢薄荷葉二錢芒硝一錢紅豆一個上為細末口噙水鼻內嗅之能遠視不能近視者陽氣不足陰氣有餘也乃氣虛而血盛也血盛者陰火有餘氣虛者氣弱也此老人桑榆之象也能近視不能遠視者陽氣有餘陰氣不足也乃血虛氣盛血虛氣盛者皆火有餘元氣不足火者元氣穀氣真氣之賊也元氣來也徐而和細細如線邪氣來也緊而強如巨川之水不可遏地芝丸治目不能遠視能近視或亦妨近視及大厲風成癩悉皆治之生地黃四兩焙乾稱天門冬四兩去心稱枳殼二兩麩炒去穰稱甘菊花二兩去枝稱同為細末煉蜜為丸如桐子大荼清送下百丸溫酒亦可食後定志丸治眼不能近視反能遠視者方見和劑局方中緑翳瞳腫治驗王峰學士魏邦彥夫人目翳暴生從下而起其色緑腫痛不可忍先師曰翳從下而上病從陽明來也緑非五色之正色殆肺腎合而為病耶乃就畫家以墨調膩粉合成色諦視之曰與翳色同矣肺腎為病者無疑矣乃瀉肺腎之邪而以入陽明之藥為之使既效而他日復病作者三其所從來之經與翳色各異乃以意消息之曰諸脈者皆屬於目脈病則目從之此必經絡不調目病未已也問之果然因如所論者治之疾遂不作鼻門鼻不聞香臭論金匱真言論云西方白色入通於肺開竅於鼻藏精於肺夫十二經脈三百六十五絡其氣血皆上走於面而走空竅其精陽之氣上走於目而為精其彆氣走於耳而為聽其宗氣上出於鼻而為臭難經云肺氣通於鼻則能知香臭矣夫陽氣宗氣者皆胃中生發之氣也其名雖異其理則一若因飢飽勞役損傷脾胃生發之氣即弱其營運之氣不能上升邪害空竅故不利而不聞香臭也宜養胃氣使營運陽氣宗氣上升鼻則通矣又一説難經言心主五臭肺主諸氣鼻者肺之竅反聞香臭何也蓋以竅言之肺也以用言之心也因胃氣失守寒邪客於面鼻亦受之心不能為用而不聞臭故經曰心肺有病鼻為之不利潔古老人云視聽明而清涼香臭辨而溫暖者是也治法宜先散寒邪後補衛氣使心肺之氣交通則鼻利而聞香臭矣麗澤通氣湯治鼻不聞香臭羌活獨活防風升麻葛根各三錢麻黃不去節一錢冬月加之川椒一錢蒼朮三錢炙甘草二錢黃耆四錢香白芷一錢上件㕮咀每服五錢水二大盞生薑三片棗二枚蔥白三寸同煎至一盞去滓稍熱服食遠忌一切冷物及風寒涼處坐臥行立溫肺湯治鼻不聞香臭眼有眵淚升麻二錢葛根一錢黃耆二錢炙甘草一錢麻黃四錢丁香二分羌活防風各一錢上件為粗末分作二服水二盞蔥白二握同煎一盞去滓稍熱食後服溫衛湯治鼻不聞香臭目中溜火氣寒血熱冷淚多臍下陰汗足痿弱黃耆一錢人參炙甘草各半錢陳皮青皮各三分木香三分蒼朮升麻各一錢白芷防風各半錢知母一錢黃連三分黃蘗澤瀉各半錢柴胡羌活各一錢當歸身一錢半上㕮咀都作一服水二盞煎至一盞去滓溫服食前日晴明服之禦寒湯治寒邪傷於皮毛令人鼻塞咳嗽上喘黃蘗二分黃耆一錢人參半錢炙甘草款冬花各三分羌活黃連各二分白芷防風各三分陳皮五分佛耳草三分升麻半錢蒼朮七分上㕮咀如麻豆大都作一服水二大盞煎至一盞去滓稍熱服溫衛補血湯治耳鳴鼻不聞香臭口不知穀味氣不快四肢困倦行步不正髮脫落食不下膝冷陰汗帶下喉中吤吤不得臥口舌嗌乾太息頭不可以回顧項筋緊脊強痛頭旋眼黑頭痛呵欠嚏噴升麻四分柴胡三分生地黃一分蒼朮二分白朮一分當歸身二分半生甘草半錢炙甘草三分王瓜根牡丹皮橘皮吳茱萸各三分人參三分丁香一個藿香一分黃耆一錢二分地骨皮三分黃蘗一分上㕮咀都作一服水二大盞煎至一盞半去滓稍熱服食前一方桃仁三個葵花七朵
