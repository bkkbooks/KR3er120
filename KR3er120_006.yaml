body:
  text: 卷六牙齒門牙齒論論曰夫齒者腎之標口者脾之竅諸經多有會於口者其牙齒是也手足陽明之所過上齦隸於坤土乃足陽明胃之脈貫絡也止而不動下齦嚼物動而不休手陽明大腸之脈所貫絡也手陽明惡寒飲而喜熱足陽明喜寒飲而惡熱其病不一牙者腎之際亦喜寒寒者堅牢為病不同熱甚則齒動齦斷袒脫作痛不已故所治療不同也有惡寒而作痛者有惡熱而作痛者有惡寒又惡熱而作痛者有惡寒飲少熱飲多而作痛者有惡熱飲少寒飲多而作痛者有牙齒動搖而作痛者有齒袒脫而為痛者有齒齦為疳所蝕缺少血出為痛者有齒齦腫起而為痛者有脾胃中有風邪但覺風而作痛者又有牙上多為蟲所蝕其齒缺少而色變為蟲牙痛者有胃中氣少不能於寒袒露其齒作痛者有牙齒疼痛而穢臭之氣不可近者痛既不一豈可一藥而盡之哉羌活散治客寒犯腦風寒濕腦痛項筋急牙齒動搖肉齦袒脫疼痛苦楚麻黃去節根三兩羌活一錢半防風三分半藁本三分細辛少許升麻半錢柴胡半兩當歸身六分蒼朮半錢白芷三分桂枝三分骨灰二錢即羊脛骨也草豆蔻一錢上為細末先用溫水漱口淨擦之其痛立止草豆蔻散治寒多熱少牙疼痛草豆蔻一錢二分不去皮黃連一錢半升麻二錢半細辛葉二分骨灰半錢當歸六分防風二分熟地黃半錢上為細末擦之同前麻黃散治冬時風寒濕頭痛項筋急牙齒動搖疼痛麻黃不去節二錢羌活一錢半防風藁本骨灰各三分細辛少許升麻黃連草豆蔻各一錢當歸六分熟地黃六分生地黃二錢草龍膽二錢酒製上為細末依前擦之麝香散治熱多寒少牙露根肉齦脫血出齒動欲落大作疼痛妨食忤涼少忤熱多麻黃根一分草豆蔻一錢半不去皮益智二分半當歸三分升麻一錢熟地黃二分生地黃三分黃連一錢半人參三分麝香少許漢防己三分酒製骨灰二錢上為細末依前擦之白芷散治大寒犯腦牙齒疼痛麻黃草豆蔻各一錢半不去皮黃耆一錢吳茱萸四分藁本三分當歸半錢羌活八分熟地黃半錢白芷四分升麻一錢桂枝二錢半上為細末先用溫水漱淨以藥擦之治蟲散治大寒犯腦牙齒疼痛及風寒作痛蟲腫作疼麻黃一錢半不去節草豆蔻一錢吳茱萸八分黃連四分藁本三分黃耆一錢羌活五分白芷三分當歸四分骨灰二錢熟地黃二分升麻一錢桂枝一分益智四分上為細末先用溫水漱口淨以藥擦之益智木律散治寒熱牙疼草豆蔻二錢二分木律二分益智半錢升麻一錢半骨灰半錢黃連四分當歸四分熟地黃半錢上為末用依前如寒多痛不用木律蝎梢散治大寒犯腦牙疼麻黃一錢半去節桂枝升麻各三分羌活半錢防風藁本各三分柴胡當歸白芷各二分黃耆三分骨灰二錢半蝎梢少許草豆蔻一錢上為末依前擦之神效白牙散升麻一錢骨灰二錢白芷七分石膏一錢半麝香少許上為末先以溫水漱淨擦之尤妙當歸龍膽散治寒熱停牙痛麻黃一錢升麻一錢白芷半錢骨灰半錢生地黃五分黃連一錢當歸尾半錢草龍膽一錢草豆蔻一錢上件為末擦之如神牢牙地黃散治腦寒痛及牙疼麻黃黃連骨灰各一錢升麻一錢半草豆蔻一錢二分吳茱萸八分益智四分當歸四分藁本二分黃耆半錢熟地黃三分人參三分羌活三分白芷半錢防己三分生地黃三分上件為末擦之神效細辛散治寒邪風邪犯腦疼牙痛麻黃三分桂枝二分半升麻二分羌活一錢半柴胡二分防風二分藁本三分白芷二分當歸四分蒼朮三分細辛少許骨灰一錢半草豆蔻半錢上為末先漱後擦之神妙立效散治牙齒疼不可忍痛及頭腦項背微惡寒飲大惡熱飲其脈上中下三部陽虛陰盛是五臟內盛而六腑陽道微小小便滑數防風一錢升麻七分炙甘草三分細辛葉二分草龍膽四分酒製上㕮咀如麻豆大都作一服水一盞煎至五分去滓以匙抄在口中煠痛處待少時立止如多惡熱飲更加草龍膽一錢此法不定隨寒熱多少臨時加減若更惡風作痛加草豆蔻半錢黃連半錢卻勿加草龍膽牢牙散治牙齦肉綻有根牙疳腫疼牙動搖欲落牙齒不長牙黃口臭升麻四分羌活一兩草龍膽一兩半酒製羊脛骨灰一兩上為末先以溫水漱口每用少許擦之風熱牙疼治驗劉經歷之內年三十餘病齒痛不可忍須騎馬外行口吸涼風則痛止至家則其痛復作家人以為祟神禱於巫師而不能愈遂求治於先師師聞其故曰此病乃濕熱為邪也足陽明貫於上齒手陽明貫於下齒況足陽明多血多氣加以膏粱之味助其濕熱故為此痛今立一方不須騎馬常令風寒之氣生於牙齒間以黃連胡桐淚之苦寒新薄荷葉荊芥穗之辛涼四味相合而作風寒之氣治其風熱為主以新升麻之苦平行陽明經為使牙齒骨之餘以羊脛骨灰補之為佐麝香少許入肉為引用為細末擦之痛乃減半又以調胃承氣湯去芒硝加黃連以治其本服之下三兩行其痛良愈遂不復作清胃散治因服補胃熱藥致使上下牙疼痛不可忍牽引頭腦滿面熱發大痛足陽明之別絡於腦在針經十五絡中喜寒惡熱乃手陽明經中熱盛而作也其齒喜冷水惡熱湯生地黃三分酒製真者升麻一錢牡丹皮半錢當歸三分淨黃連三分如連不好更加二分夏月倍之無定法上為末作一服水盞半煎至一半去滓帶冷服立已神功丸治多食肉人口臭不可近牙齒疳蝕牙齦肉將脫齒落血不止黃連淨半兩酒製縮砂半兩甘草三錢藿香葉一錢生地黃三錢酒製木香一錢升麻二錢當歸身一錢蘭香葉一錢如無藿香代之上為末湯浸蒸餅丸如緑豆大每服百丸至二百丸白湯下食遠兼治血痢及血崩血下不止血下褐色或紫黑色及腸澼下血空心服腰痛門腰痛論六元正紀大論曰太陽所至為腰痛又云巨陽即太陽也虛則腰背頭項痛足太陽膀胱之脈所過還出別下項循肩膊內挾脊抵腰中故為病者項如拔挾脊痛腰似折髀不可以曲是經氣虛則邪客之痛病生矣夫邪者是風熱寒濕燥皆能為病大抵寒濕多而風熱少然有房室勞傷腎虛腰痛者是陽氣虛弱不能運動故也經言腰者腎之府轉搖不能腎將敗矣宜腎氣丸鹿茸茴香丸類以補陽之不足也如膏粱之人久服陽藥醉以入房損其真陰腎氣熱腎氣熱則腰脊痛而不能舉久則髓減骨枯骨枯發為骨痿宜六味地黃丸溫腎丸封髓丹之類以補陰之不足也黃帝針經卷第三雜病第八腰痛上寒取足太陽陽明腰痛上熱取足厥陰足之三陰從足走入腹所經過處皆能為痛治之當審其何經所過分野循其空穴而刺之審其寒熱而藥之假令足太陽令人腰痛引項脊尻背如重狀刺其郤中太陽二經出血餘皆仿此彼執一方治諸腰痛者固不通矣丁未冬曹通甫自河南來有役夫小翟露居臥寒濕地腰痛不能轉側兩脅抽急作痛已經月餘不愈矣腰痛論中説皆為足太陽足少陰血絡中有凝血作痛間有一二證屬少陽膽經外絡脈病皆去血絡之凝乃愈其內經有云冬三月禁不得用針只宜服藥通其經絡破其血絡中敗血以川芎肉桂湯主之川芎肉桂湯羌活一錢半獨活半錢柴胡肉桂桃仁去皮尖研當歸尾蒼朮炙甘草各一錢炒麴半錢防風三分漢防己酒製三分川芎一錢上㕮咀作一服好酒三盞煎至一盞去滓溫服早飯後午飯前數服食愈宜溫暖處服之獨活湯治因勞役腰痛如折重沉如山羌活防風獨活各三錢炙甘草二錢肉桂三錢當歸半兩桃仁三十個連翹半兩防己一兩酒製黃蘗一兩酒製澤瀉三錢煨大黃三錢上㕮咀每服半兩酒半盞水一盞半煎至一盞去滓熱服立愈麻黃復煎散治陰室中汗出懶語四肢困倦無力走注疼痛者乃下焦伏火而不得伸浮為之躁熱汗出也困倦疼痛者風濕相搏一身盡痛也當去風濕脈中邪以升陽發汗漸漸發之火欎乃濕在經者亦宜發汗況正值季春之月脈緩而遲尤宜發汗令風濕去而陽升以此困倦即退氣血俱得生旺也麻黃二錢去節微搗水五大盞先煎令沸去沫至三盞入下項再煎柴胡半錢防風半錢杏仁三個黃耆二錢黃蘗一錢生地黃半錢上件銼如麻豆大都作一服入麻黃湯內煎至一盞臨臥服之勿令食飽取漸次有汗則效蒼朮復煎散治寒濕相合腦戶痛惡寒項筋脊骨強肩背胛眼痛膝臏痛無力行步身沉重蒼朮四兩水二碗煎至二大盞去滓再入下項藥羌活一錢升麻柴胡藁本澤瀉白朮各半錢黃皮三分紅花少許上件銼如麻豆大先煎蒼朮湯二盞復煎下項藥至一大盞去滓熱服空心服之取微汗為效忌酒與濕𬹃類蒼朮湯治濕熱腰腿疼痛蒼朮三錢去濕止痛柴胡二錢行經黃蘗一錢始得之時寒也久不愈寒化為熱除濕止痛防風一錢風能勝濕上件作一服水二盞煎至一盞去滓稍熱服空心食前羌活湯治兩目如火腫痛兩足及伏兔筋骨疼痛膝胻少力身重腰疼夜惡寒痰嗽項筋背急目外眵目系急食不下羌活三分麻黃三分炙甘草二分生甘草二分升麻黃皮酒製草豆蔻當歸黃芩各三分柴胡二分生地黃三分藁本三分蘇木三分蒼朮半錢熟地黃一分獨活二分紅花二分上件㕮咀如麻豆大都作一服水二大盞煎至一蓋去滓稍熱服食遠破血散疼湯治乘馬損傷跌其脊骨惡血流於脅下其痛苦楚不能轉側妨其飲食羌活防風各一錢柴胡連翹當歸各二錢中桂一錢麝香少許別研水蛭炒煙盡三錢研上件分作二服酒二大盞水一盞除水蛭麝香外另研如泥煎餘藥作一大盞去滓上火令稍熱調二味飢服之地龍散治腰脊痛或打撲傷損從髙墜下惡血在太陽經中令人腰脊或脛腨臀股中痛不可忍鼻壅塞不通中桂四分桃仁六個羌活二錢獨活一錢黃蘗一錢麻黃半錢當歸尾一分地龍四分甘草一錢蘇木六分上件㕮咀每服五錢水二盞煎至一盞去滓溫服羌活蒼朮湯治腳膝無力沉重羌活三分防風一錢半柴胡七分半升麻一錢獨活一錢葛根半錢炙甘草半錢黃耆二錢蒼朮一錢橘皮六分砂仁一錢黃皮半錢知母二錢半生甘草半錢草豆蔻半錢上件分作二服每服水三盞煎至一盞去滓熱服健步丸治膝中無力伸而不得屈屈而不得伸腰背腿腳沉重行步艱難羌活半兩柴胡半兩防風三錢川烏頭一錢炒滑石半兩炙甘草半兩防己一兩苦參一錢酒製肉桂半錢瓜蔞根半兩酒製澤瀉三錢上為末酒糊丸如桐子大每服七十丸煎愈風湯送下空心愈風湯出潔古老人方論風門中趁痛丸治打撲閃損腰痛不可忍白萵苣子炒黃白粟米炒黃乳香沒藥各一錢烏梅一個上為末蒸餅為丸如彈子大每服一丸細嚼溫酒下空心食前麻黃蒼朮湯治寒濕所客身體沉重腰痛面色萎黃不澤麻黃一錢桂枝半錢杏仁十個草豆蔻半錢半夏半錢炒麴一錢蒼朮二錢橘皮一錢澤瀉一錢白茯苓一錢豬苓半錢黃耆二分炙甘草二分上件㕮咀如麻豆大作一服水二盞煎至一盞去滓稍熱服食前補益腎肝丸治目中溜火視物昏花耳聾耳鳴困倦乏力寢汗憎風行步不正兩足欹側臥而多驚腳膝無力腰以下消瘦柴胡羌活生地黃炒苦參炒防己炒各半錢附子炮一錢肉桂一錢當歸二錢上件為末熟水丸如雞頭仁大每服五十丸溫水送下食前
