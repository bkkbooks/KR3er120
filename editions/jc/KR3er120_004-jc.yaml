body:
  text: 卷四婦人門經閉不行有三陰陽別論云二陽之病發心脾有不得隱曲女子不月其傳為風消為息賁者死不治婦人脾胃久虛或形羸氣血俱衰而致經水斷絕不行或病中消胃熱善食漸瘦津液不生夫經者血脈津液所化津液既絕為熱所爍肌肉消瘦時見渴燥血液枯竭病名曰血枯經絕宜瀉胃之燥熱補益氣血經自行矣此證或經適行而有子子不安為胎病者有矣或心包脈洪數躁作時見大便秘澀小便雖清不利而經水閉絕不行此乃血海乾枯宜調血脈除包絡中火邪而經自行矣內經所謂小腸移熱於大腸為癥瘕為沉脈澀不利則月事沉滯而不利故云為癥瘕為沉也或因勞心心火上行月事不來安心補血瀉火經自行矣故內經云月事不來者胞脈閉也胞脈者屬心而絡於胞中今氣上迫肺心氣不得下故月事不來也經閉治驗裴澤之之夫人病寒熱而月事不至者數年矣已加喘嗽醫者率以蛤蚧桂附等投之曰不然夫人病陰為陽所搏溫劑太過故無益而反害投以涼血和血之藥則經行矣已而果然經漏不止有三陰陽別論云陰虛陽搏謂之崩婦人脾胃虛損致命門脈沉細而數疾或沉弦而洪大有力寸關脈亦然皆由脾胃有虧下陷於腎與相火相合濕熱下迫經漏不止其色紫黑如夏月腐肉之臭中有白帶者脈必弦細寒熱作於中中有赤帶者其脈洪數疾熱明矣必腰痛或臍下痛臨經欲行先見寒熱往來兩脅縮急兼脾胃證出現或四肢困熱心煩不得眠臥心下急宜大補脾胃而升舉血氣可一服而愈或人故貴脫勢人事疏少或先富後貧心氣不足其火大熾旺於血脈之中又致脾胃飲食失節火乘其中形質肌肉容顏似不病者此心病不行於診故脾胃飲食不調其證顯矣而經水不時而下或適來適斷暴下不止當先說惡死之言勸諭令拒死而心不動以大補氣血之藥舉養脾胃微加鎮墜心火之藥治其心補陰瀉陽經自止矣痿論云悲哀太甚則胞絡絕胞絡絕則陽氣內動發則心下崩數溲血也故本病曰大經空虛發則肌痹傳為脈痿此之謂也崩漏治驗宣德侯經歷之家人病崩漏醫莫能效切脈且以紙疏其證至四十餘種為藥療之明日而二十四證減前後五六日良愈侯厚謝而去凡治設施皆此類也調經升陽除濕湯治女子漏下惡血月事不調或暴崩不止多下水漿之物皆由飲食失節或勞傷形體或素有心氣不足因飲食勞倦致令心火乘脾其人必怠惰嗜臥四肢不收困倦乏力無氣以動氣短上氣逆急上衝其脈緩而弦急按之洪大皆中指下得之脾土受邪也脾主滋榮周身者也心主血血主脈二者受邪病皆在脈脈者血之府也脈者人之神也心不主令包絡代之故曰心之脈主屬心系心系者包絡命門之脈至月事因脾胃虛而心包乘之故漏下月水不調也況脾胃為血氣陰陽根蒂當除濕去熱益風氣上伸以勝其濕又云火欎則發之柴胡羌活各半錢防風一錢蔓荊子七分獨活半錢蒼朮一錢半甘草炙一錢升麻一錢藁本一錢當歸酒製半錢黃耆一錢半上㕮咀如麻豆大勿令作末都作一服以潔淨新汲水五大盞煎至一盞去滓空心腹中無宿食熱服之待少時以早飯壓之可一服而已如灸足太陰脾經中血海穴二七或三七壯立已此藥乃從權之法用風勝濕為胃下陷而氣迫於下以救其血之暴崩也并血惡之物住後必須黃耆人參當歸之類數服以補之於補氣升陽湯中加以和血藥便是也若經血惡物下之不絕尤宜究其根源治其本經只益脾胃退心火之亢乃治其根蒂也若遇夏月白帶下脫漏不止宜用此湯一服立止涼血地黃湯治婦人血崩是腎水陰虛不能鎮守包絡相火故血走而崩也生地黃半錢黃連三分黃蘗二分黃芩一分知母二分羌活三分柴胡三分升麻二分防風三分藁本二分當歸半錢甘草一錢細辛二分荊芥穗一分川芎二分蔓荊子一分紅花少許上㕮咀都作一服水三大盞煎至一盞去渣稍熱服空心食前足太陰脾之經中血海二穴在膝髕上內廉白肉際二寸中治女子漏下惡血月事不調逆氣腹脹其脈緩是也灸三壯足少陰腎之經中陰谷二穴在膝內輔骨後大筋下小筋上按之應手屈膝取之治膝如錐不得屈伸舌縱涎下煩逆溺難小腹急引陰痛股內廉痛婦人漏血不止腹脹滿不得息小便黃如蠱女子如妊娠可灸二壯丁香膠艾湯治崩漏不止蓋心氣不足勞役及飲食不節所得經隔少時其脈二尺倶弦緊時洪按之無力其證自覺臍下如冰求厚衣覆以禦其寒白帶白滑之物多間有屋漏水下時有鮮血右尺脈時洪微也屋漏水暴多下者是急弦脈寒多如洪脈時見乃熱少合而明之急弦者北方寒水多也洪脈時出者是命門包絡之火少也黑物多赤物少合成屋漏水之狀也當歸身一錢二分川芎四分阿膠六分炮熟地黃三分生艾葉一錢白芍藥三分丁香四分上件川芎為末當歸酒洗銼熟地黃亦銼丁香為細末艾銼都作一服用水五大盞先煎五味作一大盞二分去滓入膠艾再上火煎至一大盞空心食前帶熱服之丁未仲冬郭大方說其妻經水暴崩不止先曾損身失血自後一次經縮十日而來今次不止其人心窄性急多驚以予料之必因心氣不足飲食失節得之大方曰無到彼診得掌中寒脈沉細而緩間而沉數九竅微不利四肢無力上喘氣短促口鼻氣皆不調果有心氣不足脾胃虛損之證胃脘當心而痛及左脅下縮急有積當臍有動氣腹中鳴下氣大便難諸虛證極多不能盡錄擬先治其本餘證可以皆去與安心定志鎮墜其驚調和脾胃益元氣補血脈養其神以大熱之劑去其冬寒寒凝在皮膚內少加生地黃去命門相火不令四肢痿弱黃耆當歸人參湯主之黃耆當歸人參湯黃耆一錢當歸身一錢半人參一錢草豆蔻仁六分炒麹半錢黃連一分生地黃三分陳皮半錢麻黃不去節一錢杏仁五個研桂枝半錢上㕮咀分作二服每服水二大盞半煎麻黃令沸去沫煎至二盞入諸藥同煎至一大盞於已午時之間食消盡服之一服立止其胃脘痛乃胃土有客寒與大熱藥草豆蔻丸十五丸白湯送下再與肝之積藥除其積之根則愈當歸芍藥湯治婦人經脈漏下不止其色鮮紅時值七月處暑之間先因勞役脾胃虛損氣短氣逆自汗不止身熱悶亂惡見飲食非惟不入亦不思飲食沉困懶倦四肢無力大便時泄後再因心氣不足經脈再下不止微覺氣下脫其元氣逆上全無惟覺心腹中氣下行氣短少不能言是無力以言非懶語也此藥主之黃耆一錢半白朮蒼朮當歸身白芍藥各一錢熟地黃半錢炙甘草生地黃各三分橘皮五分柴胡二分上十味㕮咀如麻豆大分作二服每服水二盞半煎至一盞去滓稍熱服空心一服之後漸減次日全住諸證悉去頓喜飲食蓋天氣通而聞飲食香得平康故也柴胡調經湯治經水不止鮮紅項筋急腦痛脊骨強痛不思飲食羌活一錢獨活半錢藁本半錢蒼朮一錢柴胡七分升麻半錢葛根三分當歸身三分炙甘草三分紅花少許上銼如麻豆大都作一服水四大盞煎至一盞去滓空心稍熱服取微汗立止一婦人經候黑血凝結成塊左廂有血瘕水泄不止榖有時不化有時化後血塊暴下并水俱作是前後二陰有形之血脫竭於下既久經候猶不調水泄日見三兩行食罷煩心不快飲食減少甚至瘦弱求治乃審而細思之曰夫聖人治病必本四時升降浮沉之理權變之宜必先歲氣勿伐天和無盛盛無虛虛遺人夭殃無致邪無失正絕人長命故仲景云陽盛陰虛下之則愈汗之則死陰盛陽虛汗之即愈下之即死大抵聖人立法且如升陽或發散之劑是助春夏之陽氣令其上升乃瀉秋冬收藏殞殺寒涼之氣此病是也當用此法治之升降浮沉之至理也天地之氣以升降浮沉乃從四時如治病不可逆之故經云順天者昌逆天者亡可不畏哉夫人之身亦有四時天地之氣不可只認在外人亦體同天地也今漏經不止是前陰之氣血已脫下矣水泄又數年是後陰之氣血下陷已脫矣後陰者主有形之物也前陰者精氣之戶下竭是病人周身之氣血常行秋冬之令陰主殺此等收藏之病是也陽生陰長春夏是也在人之身令氣升浮者穀氣上行是也既病人周身氣血皆不生長穀氣又不升其肌肉消少是兩儀之氣俱將絕即下元二陰俱脫血氣消竭假令當是熱證今下焦久脫化為寒矣此病久沉久降寒濕大勝當急救之瀉寒以熱除濕以燥大升大舉以助生長補養氣血不致偏竭聖人立治之法既濕氣大勝以所勝治之助甲風木上升是也故經云風勝濕是以所勝平之也當先調和胃氣次用白朮之類以燥其濕而滋元氣如其不止後用風藥以勝濕此便是大舉大升以助春夏二濕之久陷下之治也益胃升陽湯血脫益氣古聖人之法也先補胃氣以助生發之氣故曰陽生陰長諸甘藥為之先務舉世皆以為補氣殊不知甘能生血此陽生陰長之理也故先理胃氣人之身內榖為寶黃耆二錢人參一錢半有嗽去之炙甘草一錢升麻半錢柴胡半錢白朮三錢當歸身一錢酒浸炒麹一錢半陳皮一錢生黃芩瀉盛暑之伏庚金肺逆每服加少許秋涼去之上件㕮咀每服秤一錢或二錢視食加減之如食少已定二錢內更減之不可令勝食每服水二大盞煎至一盞去滓稍熱服如腹中痛每服加芍藥三分去皮中桂少許如渴或口乾加乾葛二分不計時候升陽舉經湯治經水不止如右尺脈按之空虛是氣血俱脫大寒之證輕手其脈數疾舉指弦緊或澀皆陽脫之證陰火亦亡見熱證於口鼻眼或渴此皆陰躁陽欲先去也當溫之舉之升之浮之燥之此法當大升浮血氣且補命門下脫也柴胡二錢藁本去土二錢白朮三錢黃耆味甘者佳當歸身各三錢紅花少許肉桂去皮盛暑勿用秋冬半錢桃仁湯浸去皮尖十個細研川芎一錢細辛六分地黃人參各一錢白芍藥半錢羌活二錢黑附子炮去皮臍五分獨活一錢半防風二錢甘草一錢半上件㕮咀每服秤三錢若病勢順當漸漸加之至半兩止服水三盞煎至一盞去滓空心稍熱服之每日水泄三兩行米穀有時不化論凡泄痢米穀不化謂飧泄是清氣在下胃氣不上升古之聖人以升浮扶持胃氣一服而愈知病在中焦脾胃也又濕多成五泄濕者胃之別名也病本在胃故真氣弱真氣者穀氣也不能尅化飲食乃濕勝也以此論之只是脾胃弱所得也初病之時奪食或絕不食一二日胃氣日勝泄不作矣今已成大泄又云治濕不利小便非其治也又云下焦如瀆又云在下者引而竭之二陰有所積蓄利於便利去之也唯此二證不宜以此論之其病得之於胃氣下流清氣不升陽道不行宜升宜舉不宜利小便頭有疾取之足為陽病在陰足有疾取之上為陰病在陽也經言陽病在陰陰病在陽此之謂也中有疾傍取之傍者少陽甲膽是也中者脾胃也脾胃有疾取之於足少陽甲膽者甲風是也東方風也胃中之穀氣者便是風化也一體休作兩認故曰胃中濕勝而成泄瀉助甲膽風勝以尅之又是升陽助清氣上行者也泄不止有五經漏亦然此皆清氣不升而作也只合益胃助清氣上行為法又一說中焦元氣不足溲便謂之變腸為之苦鳴亦緣春氣不升故治甲風上升又云風勝濕者是也大抵此證胃氣弱不能食奪食則一二日可止也奪食之理為胃不能尅化食下則為泄如食不下何以作泄當為藥滋養胃氣令和候泄止漸與食胃氣勝則安矣若食不化者升陽風藥內加炒麹同煎兼食入頃心下痞心下者胃之口也必口沃沫或食入反出皆胃上停寒其左手關脈中弦按之緩是風濕相合穀氣不行清氣不升為弦脈之寒所隔故不下也麹之大熱亦能去之若反胃者更加半夏生薑入於風藥內同煎奪食少食欲使胃氣強盛也若藥劑大胃不能勝藥泄亦不止當漸與之今病既久已至瘦弱當以常治法治之不可多服藥餌切囑之人之肉如地土豈可無之消瘦人有必死者八般素問中有七靈樞經中有一若病肌肉去盡勿治天命已矣如肌肉不至消瘦盡當急療之先當食而益胃氣與升陽先助其氣次用風藥以助升騰之氣可以已矣餘皆勿論此治之上也半產妄用寒涼藥有誤論婦人分娩及半產漏下昏冒不省瞑目不知覺蓋因血暴亡有形血去則心神無所養心與包絡者君火與相火也得血則安亡血則危火之上熾故令昏冒火乘其肺瞑目不省人事是陰血暴去不能鎮撫也血已虧損往往用滑石甘草石膏之類乃辛甘大寒之藥能瀉氣中之熱是血虧瀉氣乃陰虧瀉陽使二者倶傷反為不足虛勞之病昏迷不省者上焦心肺之熱也此無形之熱用涼寒之藥驅令下行豈不知上焦之病悉屬於表乃陰證也汗之則愈今反下之幸而不死暴虧氣血生命豈能久活又不知內經有說病氣不足宜補不宜瀉但瞑目之病悉屬於陰宜汗不宜下又知傷寒欎冒得汗則愈是禁用寒涼藥也分娩半產本氣不病是暴去其血亡血補血又何疑焉補其血則神昌常時血下降亡今當補而升舉之心得血而安神不昏矣血若不下是秋冬之令大旺今舉而升之以助其陽則目開神不昏迷矣今立一方補血養血生血益陽以補手足厥陰之不足名曰全生活血湯全生活血湯柴胡二錢當歸身酒製二錢生地黃一錢夏月加之熟地黃一錢川芎一錢半防風二錢諸陽既陷何以知之血下脫也細辛蔓荊子各五分藁本一錢半羌活獨活各二錢升麻三錢葛根二錢白芍藥三錢炙甘草二錢紅花三分上件㕮咀如麻豆大每服五錢水二盞煎至一盞去滓稍熱服食前㿗疝帶下論脈解論云厥陰所謂㿗疝婦人少婦腫者是也厥陰者辰也三月陽中之陰邪在中故曰㿗疝小腹腫也所謂腰脊痛不可以俯仰者三月一振榮華乃物一俯而不仰也所謂㿗癃疝腹脹者陰亦盛而脈脹不通故云㿗癃疝也所謂甚則嗌乾熱中者陰陽相薄則熱故嗌乾也骨空論云任脈者起於中極之下以上毛際循腹裏上關元至咽喉上頤循面入目任脈為病男子內結七疝女子帶下瘕聚又督脈者起於少腹以下骨中央女子繫廷孔其孔溺孔之端也其絡循陰器合纂間繞纂後別繞臀至少陰與巨陽中絡者合少陰上股內後廉貫脊屬腎與太陽起於目內眥上額交巔上入絡腦還出別下項循肩膊內挾脊抵腰中入循膂絡腎其男子循莖下至纂與女子等其少腹直上者貫臍中央上貫心入喉上頤環唇上繫兩目之下中央此生病從少腹上衝心而痛不得前後為衝疝其女子不孕癃痔遺溺嗌乾督脈生病治督脈治在骨上甚者在臍下營黃帝針經六卷五色第四痛下為卵痛腎乘心心先病腎為應色皆如是男子色在於面王為小腹痛下為卵痛其環直為莖痛髙為本下為首狐疝㿉陰之屬也女子色在於面王為膀胱子處之病散為痛搏為聚方圓左右各如其形色其隨而下至胝為淫有潤如膏狀為暴食不潔左為左右為右其色有邪聚空不端面色所指者也色者青黑赤白黃皆端滿有別鄉別鄉赤者其色赤大如榆英在面王為不月其色上銳首空上向下銳下向在左右如法以五色命臟青為肝赤為心白為肺黃為脾黑為腎肝合筋心合脈肺合皮脾合肉腎合骨也夫手足厥陰者生化之源也足厥陰主肝木肝藏血手厥陰命門包絡相火男子藏精施化婦人繫胞有孕生化雖異受病則同女子二七而天癸至任脈通太衝脈盛月事以時下故有子皆主生化如病則㿗疝帶下之病作矣叔和云尺脈第三同斷病者是也酒煮當歸丸治㿗疝白帶下注腳氣腰以下如在冰雪中以火焙乾重重厚綿衣蓋其上猶寒冷不任寒之極也面白如枯魚之像肌肉如刀刮削瘦峻之速也小便不止與白帶常流而不禁固自不知覺面白目青藍如菜色目䀮䀮無所見身重如山行步欹側不能安地腿膝枯細大便難閉口不能言無力之極食不下心下痞煩心懊憹不任其苦面停垢背惡寒此上中下三陽真氣俱虛欲竭噦嘔不止胃虛之極也其脈沉厥緊而澀按之空虛若脈洪大而澀按之無力猶為中寒之證況按之空虛者乎按之不鼓是謂陰寒其空虛乃血氣俱虛之極也當歸一兩茴香半兩良薑七錢黑附子七錢上四味銼如麻豆大以上等好酒一升半同煎至酒盡焙乾炒黃鹽三錢丁香半兩全蝎三錢柴胡二錢升麻木香各一錢苦楝生用炙甘草各半兩玄胡四錢上與前四味藥同為細末酒煮白𬹃糊為丸如梧桐子大每服五七十丸空心宿食消盡淡醋湯送下忌酒濕𬹃油膩物固真丸治白帶久下不止臍腹冷痛陰中亦然目中溜火壅其上視物䀮䀮然無所見牙齒惡熱飲痛須得黃連細末擦之乃止唯喜乾食大惡湯飲此病皆寒濕乘其胞內故喜乾而惡濕肝經陰火上溢走於標故上壅而目中溜火腎水浸肝而上溢致目䀮䀮而無所見齒惡熱飲者是少陽陽明經伏火也白石脂一錢以火燒赤水飛研細日乾乾薑炮四錢黃蘗酒製白芍藥各半錢白龍骨二錢柴胡一錢當歸身酒製二錢前證乃寒濕為之也治法當大瀉寒濕以丸子藥治之故曰寒在下焦治主病宜緩以制大忌湯劑以白石脂白龍骨以枯其濕以炮乾薑大辛熱瀉寒水以黃蘗之大寒為因用又為嚮導故云古者雖有重罪不絕人之後亦為之伏其所主先其所因之意又瀉齒中惡熱飲也以柴胡為本經之使以芍藥半錢導之恐辛熱之藥大甚損其肝經故微瀉之以當歸身辛溫大和其血脈此用藥之法完備矣上件除石脂龍骨水飛研外同為極細末水煮稀𬹃糊為丸如雞頭仁大日乾空心候宿食消盡煎百沸湯令大溫多用送下無令胃中停滯待少時以早膳壓之是不令熱藥犯胃也忌生冷硬物酒與濕𬹃白文舉正室白帶常漏久矣諸藥不效診得心包尺脈微其白帶下流不止叔和云崩中日久為白帶滑下多時骨木枯言崩中者始病血崩久則血少復亡其陽故白滑之物下流不止是本經血海將枯津液復亡枯乾不能滋養筋骨以本部行經藥為引用為使以大辛甘油膩之藥潤其枯燥而滋津液以大辛熱之氣味藥補其陽道生其血脈以苦寒之藥泄其肺而救上熱傷氣以人參補之以微苦溫之藥為佐而益元氣名之曰補經固真湯補經固真湯柴胡炙甘草各一錢乾薑細末二錢橘皮半錢人參二錢郁李仁一錢研如泥白葵花去萼四分生黃芩一錢另入上件除黃芩外以水三盞煎至一盞七分再入生黃芩同煎至一盞去滓空心無宿食滯熱服少時以早膳壓之升麻燥濕湯治白帶下陰戶痛控心急痛身黃皮緩身如山重陰中如冰防風一錢柴胡一錢三分良薑乾薑各一錢橘皮半錢白葵花七朵生黃芩半錢郁李仁甘草各一錢上件銼如麻豆大分作二服每服水二盞煎至一盞去滓稍熱服食前少時以美膳壓之當歸附子湯治臍下冷痛赤白帶下良薑乾薑附子以上各一錢柴胡七分升麻半錢炙甘草六分當歸二分蝎梢半錢炒鹽三分黃蘗少許為引用上為粗末每服五錢水五盞煎至一盞去滓稍熱服或為細末酒糊作丸亦得調經固真湯冬後一月微有地泥冰泮其白帶再來陰戶中寒立此方一服而愈麻黃不去節五分杏仁二個桂枝少許炙甘草五分黃耆七分人參當歸身各五分高良薑一錢白朮五分蒼朮二分澤瀉羌活各一錢防風二分柴胡四分獨活藁本各二分生黃芩五分乾薑炮二分白葵花七朵去萼上件㕮咀如麻豆大除黃芩麻黃各另外都作一服先以水三大盞半煎麻黃一味令沸掠去沫入餘藥同煎至一盞七分再入生黃芩煎至一盞去滓空心宿食消盡日高時熱服之待一時許可食早飯桂附湯治白帶腥臭多悲不樂大寒肉桂一錢附子三錢黃蘗半錢為引用知母半錢上件㕮咀都作一服水二盞煎至一盞去滓稍熱服食遠如不思飲食加五味子二十個如煩惱面上麻如蟲行乃胃中元氣極虛加黃耆一錢半人參七分炙甘草半錢升麻半錢戊甲春一婦人六十歲病振寒戰慄太陽寒水客也呵欠嚏噴足少陽溢也口亡津液足陽明不足也心下急痛而痞手少陰受寒也故急痛足太陰血滯為痞身熱近火熱在皮表寒在骨髄亦有振寒戰慄也臍下惡寒丹田有寒也渾身黃而白睛黃寒濕也以餘證之知其寒也溺黃赤而黑頻數寒濕勝也自病來身重如山便著床枕至陰濕盛也其脈診得左右關并尺命門中得弦而急極細雜之以洪而極緩弦急為寒加之以細細者北方寒水雜以緩甚者濕勝出黃色也又洪大者心火受制也左尺控之至骨舉指來實者壬癸俱旺也六脈按之俱空虛下焦無陽也先以輕劑去其中焦寒濕兼退其洪大脈理中湯加茯苓是也理中茯苓湯白朮乾薑炙甘草人參茯苓除寒濕各三錢上件為細末每服秤二錢水一盞半煎至一盞冰之令寒服之謂之熱因寒用其寒以對足太陽之假熱也以乾薑之辛熱以瀉其真寒也故曰真對真假對假若不愈當以朮附湯冰之令寒以補下焦元氣也玄胡苦楝湯治臍下冷撮痛陰冷大寒帶下肉桂附子各三分熟地黃一錢炙甘草半錢苦楝子玄胡各二分黃蘗一錢為引用上都作一服水四盞煎至一盞稍熱服食前黃耆白朮湯治婦人四肢沉重自汗上至頭劑頸而還惡風頭痛躁熱黃耆一兩白朮半兩黃蘗酒製二錢細辛三分川芎半錢吳茱萸半錢羌活二錢五味子三錢人參半兩炙甘草二錢當歸身一錢半柴胡升麻各一錢上件㕮咀每服半兩水二大盞入生薑五片煎至一盞去滓稍熱服食前如腹中不快加炙甘草一錢汗出不止加黃蘗一錢增損四物湯治婦人血積當歸川芎芍藥熟地黃廣荗京三稜肉桂乾漆炒煙盡以上各等分上件為粗末每服三錢水二大盞煎至一盞去滓稍熱服食前柴胡丁香湯一婦人年三十歲臨經預先腰臍痛甚則腹中亦痛經縮兩三日柴胡一錢半羌活一錢丁香四分全蝎一個防風當歸身各一錢生地黃二分都作一服水四盞煎至一盞去滓稍熱服食前坐藥龍鹽膏丁香一錢半全蝎五個木香一錢半良薑一錢川烏頭一錢半炮枯礬半錢龍骨二錢茴香三分當歸尾一錢玄胡五錢炒鹽二錢漢防己酒製一錢厚朴三錢紅豆肉桂各二錢木通一錢上件為細末煉蜜為丸如彈子大綿裹留絲在外納丸藥陰戶內勝陰丹為上藥力小再取三錢內加行性熱藥下項三柰子川烏頭大椒各半錢柴胡羌活各二分全蝎三個蒜七分甘松二分破故紙與蒜同煮焙乾八分升麻枯白礬各二分麝香少許上為細末煉蜜為丸如彈子大依前用度又方坐藥回陽丹草烏頭三分水蛭三個炒虻蟲三個去足翅炒川烏頭七分大椒半錢柴胡七分羌活全蝎升麻各二分蒜破故紙各一錢三柰子蓽撥各半錢甘松二分枯礬半錢炒黃鹽一錢必用之藥上為極細末煉蜜丸如指尖大用綿裹定留係內陰戶中覺臍下暖為度孕婦有病毒之無損一婦人重身五六月冬至日因祭祀而哭慟口吸風寒忽病心痛而不可忍渾身冷氣欲絕求治於師料之曰此乃客寒犯胃故胃脘當心而痛急與麻黃草豆蔻半夏乾生薑炙甘草益智仁之類治之或曰半夏有小毒重身婦人服之可乎師曰可或曰不可而用之何如師曰乃有故而用也故麻黃半夏生薑之辛熱以散風寒尚不能收全功何暇損胎乎內經云婦人重身毒之何如岐伯曰有故無損故無損也大積大聚其可犯也衰其大半而止過則死矣投之病良愈而胎亦無損小兒門癍疹論夫癍疹始出之證必先見面燥腮赤目胞亦赤呵欠煩悶乍涼乍熱咳嗽嚏噴足稍冷多睡睡驚並瘡疹之證或生膿胞或生小紅癍或生癮疹此三等不同何故俱顯上證而後乃出蓋以上諸證皆太陽寒水起於右腎之下煎熬左腎足太陽膀胱寒水夾脊逆流上頭下額逆手太陽丙火不得傳導逆於面上故顯是證蓋壬癸寒水剋丙丁熱火故也諸癍證皆從寒水逆流而作也醫者當知此理乃敢用藥夫胞者一名赤宮一名丹田一名命門主男子藏精施化婦人繫胞有孕俱為生化之源非五行也非水亦非火此天地之異名也象坤土之生萬物也夫人之始生血海始淨一日二日精勝其血則為男子三日四日五日血脈已旺精不勝血則為女子二物相搏長先身生謂之神又謂之精道釋二門言之本來面目是也其子在腹中十月之間隨母呼吸母呼亦呼母吸亦吸呼吸者陽氣也而生動作滋益精氣神飢則食母血渴則飲母血兒隨日長皮肉筋骨血脈形氣俱足十月降生口中尚有惡血啼聲一發隨吸而下此惡血復歸命門胞中僻于一隅伏而不發直至因內傷乳食濕熱之氣下溜合於腎中二火交攻營氣不從逆於肉理惡血乃發諸癍疹皆出於膀胱壬水其瘍後壞肉理歸於陽明故三番癍始顯之證皆足太陽壬膀胱尅丙小腸其始出皆見面終歸於陽明肉理熱化為膿者也二火熾盛反勝寒水遍身俱出此皆從足太陽傳變中來也當外發寒邪使令消散內瀉二火不令交攻其中令濕氣上歸復其本位可一二服立已乃令小兒以後再無二番癍出之患此內經之法覽者詳之消毒救苦湯治癍證悉具消化便令不出如已稀者再不生癍仲冬立此方隨四時加減通造化明藥性者能此麻黃不去根節羌活防風各五分川芎二分細辛一分藁本柴胡各二分升麻五分葛根一分黃芩二分酒製生地黃二分生黃芩一分黃連三分酒黃蘗五分紅花半分蘇木一分當歸三分吳茱萸半分白朮一分蒼朮二分生甘草一分橘皮一分連翹半錢上銼如麻豆大每服五錢水二盞煎至一盞去滓稍熱服空心食前夫癍疹出者皆因內傷飲食致令營氣逆故也大禁牽牛巴豆食藥宜以半夏枳朮大黃益智仁之類去其泄瀉止其吐若耳尖冷呵欠睡中驚嚏噴眼澀知必出癍也諸大膿胞小紅癍癮疹三者皆營氣逆而寒覆其表宜以四味升麻湯加當歸身連翹此定法也如肺成膿癍先顯喘嗽或氣髙而喘促加人參而補元氣少加黃芩以瀉伏火如心出小紅癍必先見嗌乾驚悸身熱肌肉腫脈弦洪少加黃連如命門出癮疹必先骨痛身熱其疼不敢動搖少加生地黃黃蘗諸癍疹皆為陰證瘡須因內傷乳食脾胃不足營氣逆行雖火勢內熾陰覆其外故錢仲陽製四物升麻湯發之如有傳變證依加減法服之桔梗湯如癍已出只時時與之快咽喉寬利胸膈桔梗二錢生甘草一錢上㕮咀作一服水二盞煎至一盞不拘時時時服之黍粘子湯如癍子已出稠密身表熱急與此藥服之防後青乾黑陷黍粘子炒香地骨皮各二錢柴胡一錢半炙甘草一錢半連翹二錢半當歸身酒洗黃耆各一錢黃芩一錢半上㕮咀每服三錢水一盞半煎至一盞去渣溫服治驚各有所因用藥不同論錢仲陽治急驚以涼瀉之肝風木也主驚心熱火也主動火來木中子能令母實實則瀉其子故立瀉青丸導赤散之類瀉其肝實驚自愈矣內經曰風淫所勝平以辛涼者是也夫慢驚者皆因妄用快利食藥損其脾胃久瀉不止或因乳食不調而成吐瀉亦令脾胃虛損內經云不足而往有餘隨之又云不及則乘其所不勝故風木來乘土位慢驚之病作矣治當詳其溫涼寒熱先實其脾胃後散風邪則愈矣又如外物驚者宜鎮心以黃連安神丸若氣動所驚者宜寒水石安神丸不可便以辛熱之藥散之防風丸之類是也因驚而瀉青色者先鎮肝以朱砂之類治以風邪下陷也不可便用苦寒之劑瀉其土也益黃散辨閻孝忠編集錢氏方以益黃散補土又言風旺必尅脾土當先實其脾昧者不審脾中寒熱一例作補脾藥用之又不審藥中有丁香青橘皮辛熱大瀉肺金豈可脾虛之證反瀉其子蓋為寒水反來侮土中寒嘔吐腹痛瀉痢青白口鼻中氣冷益黃散神治之藥也如因熱藥巴豆之類過劑損其脾胃或因暑天傷熱乳食損其脾胃而成吐瀉口鼻中氣熱而成慢驚者不可服之今立一方治胃中風熱人參安胃散人參安胃散人參一錢黃耆二錢生甘草炙甘草各五分白芍藥七分白茯苓四分陳皮三分黃連二分內經云熱淫於內治以甘寒以甘瀉之以酸收之甘草人參黃耆之甘溫能補元氣甘能瀉火補土白茯苓甘平白芍藥酸寒補肺金之不足陳皮黃連之苦寒為佐以退火邪土金得平風證無由作矣上件為細末每服二錢水一盞半煎至一盞去滓大溫服食前夫益黃散理中丸養脾丸之類治脾胃中寒濕大勝神品藥也若服熱藥巴豆之類虛其胃氣脾胃中伏熱火及大人勞役不足之證或吐瀉不止不宜用之故陶隱居云醫者意也古之所謂良醫蓋以其意量而得其節也治病必察其本不可執方療之或病髣髴合方未對其證不察病機所宜大同小異致令乖舛以取危亡可悲也夫梔子茯苓湯治黃疳土色為熱為濕當小便不利今反利知黃色為燥胃經中大熱髮黃脫落知膀胱與腎俱受其邪乃大濕熱之證鼻下端作瘡者土逆行營氣伏火也能乳者胃中有熱也寒則食不入喜食土者胃不足也面色黑者為寒為痹大便青寒褐色血黑色熱蓄血中間黃色腸胃熱治法當滋營潤燥除寒熱致津液山梔子三分黃蘗炙甘草各二分大蕪荑半錢黃連一分麻黃不去根節羌活各二分柴胡三分防風一分白朮半錢茯苓三分當歸四分上件銼如麻豆大都作一服水一盞半煎至一盞去滓稍熱服食前茯苓滲濕湯治小兒面色萎黃腹䐜脹食不下麻黃桂枝各二分杏仁二個草豆蔻厚朴麹末各二分柴胡半分羌活二分白朮半分吳茱萸二分升麻一分蒼朮澤瀉茯苓豬苓橘紅各二分青皮黃連各半錢黃蘗二分上都作一服水一大盞煎至七分去滓大溫服食前升陽益血湯時仲春一小兒未滿百日病腹脹二日大便一度瘦弱遍身黃色宜升陽氣滋血和血補潤腸胃乾燥也蝎梢二分麹末三分厚朴當歸各一錢桃仁十個升麻三分都作一服水一盞煎至半盞去滓稍熱服食前厚朴丸治小兒失乳以食飼之未有食腸不能剋化或生腹脹四肢瘦弱或痢色無常橘皮三分大麥𬹃半錢半夏三分枳實半錢蒼朮三分青皮二分人參三分厚朴二分麹末半錢上為細末煮𬹃糊為丸如麻子大每服二十丸溫水送下食前忌飽食補陽湯時初冬一小兒二歲大寒證明堂青脈額上青黑腦後青絡髙起舌上白滑喉鳴而喘大便微清耳尖冷眼澀常常淚出仍多眵胸中不利臥而多驚無搐即寒柴胡升麻各二分麻黃三分吳茱萸半錢地龍半錢蝎梢一分生地黃半錢當歸身三分炙甘草一分黃耆二分黃蘗橘皮葛根連翹各一分上件㕮咀都作一服水一大盞半煎至一盞去滓乳食後熱服之服藥之後添喜笑精神出氣和順乳食進中滿分消丸黃連枳實麩炒厚朴薑製各半錢生薑薑黃豬苓各一錢橘皮白朮甘草各一錢半砂仁澤瀉茯苓各三錢半夏四錢黃芩一兩二錢上件為細末湯浸蒸餅為丸如黍米大每服三五十丸溫水送下食前消痞丸黃連半兩枳實二錢黃芩二錢甘草三分人參四分厚朴七分生薑四分橘皮一分薑黃半錢上為細末蒸餅為丸如黍米大每服二三十丸隨乳下麻黃升麻湯治小兒寒欎而喘喉鳴腹中鳴腹滿鼻流清涕脈沉急而數麻黃草豆蔻仁各一錢半益智仁一分半厚朴三分甘草一分當歸尾升麻麹末各半分吳茱萸二分柴胡一分蘇木半分紅花少許生黃芩一分全蝎二個上件㕮咀如麻豆大分作二服每服水一大盞煎至七分去渣稍熱服食遠忌風寒微有汗乃效
