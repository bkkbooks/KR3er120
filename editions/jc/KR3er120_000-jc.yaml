body:
  text: 序一東垣先生受學於易上老人張元素其積力久自得於心其法大概有四曰明經別脈識證處方而已謂不明經則無以知天地造化之蘊不別脈則無以察病邪之所在氣血之虛實不識證則不能必其病之主名以療之不處方則何以剋其必效故先生每治人之疾先診其脈既別脈矣則必斷之曰此某證也則又歷誦其難素諸經之旨以明其證之無差然後執筆處方以命其藥味君臣佐使之制加減炮製之宜或丸或散俾病者餌之以取其效一洗世醫膠柱鼓瑟刻舟覓劍之弊所以為一代名工者以此也今太醫羅君謙父師先生有年得盡傳其平生之學亦為當世聞人今將此方釐為九卷鋟梓以傳不獨使其師之術業表見於世抑亦惠天下後學之士俾獲安全之利也其用心之忠厚誠可嘉尚故樂為序其端噫先生此方特立法之大綱耳不知變者欲以治疾或有不效則尤之曰此制方之不精也則誤矣孟子曰梓匠輪輿能與人規矩不能使人巧又曰大匠不為拙工改廢繩墨羿不為拙射變其彀率引而不發躍如也中道而立能者從之吾於此書亦云先生姓李氏諱杲字明之東垣其自號云至元十七年歲次庚辰清明後二日通議大夫燕南河北道提刑按察使東魯王博文序序二醫之用藥猶將之用兵兵有法良將不拘於法藥有方良醫不拘於方非曰盡廢其舊也昔人因病制方邪之微甚人之虛實莫不詳辨而參酌之然後隨其六氣所侵臟腑所受劑品小大平毒多寡適與病等絲髮不舛故投之無不如意後人不揣其本而執其方但曰此方治此病幸而中者時有之不幸而誤者固多矣諺云看方三年無病不治醫病三年無方可治斯言雖鄙切中世醫之病東垣老人李君明之可謂用藥不拘於方者也凡求治者以脈證別之以語言審之以內經斷之論證設方其應如響間有不合者略增損輒效蓋病之變無常君之方與之無窮所以萬舉萬全也羅謙父受學其門君嘗令以療病所制方錄之甚悉月增歲益浸以成編凡有聞於君者又輯而為論將板行於世以廣君之道抑予聞李君教人講釋經書之暇每令熟讀本草川陸所產治療所主氣味之厚薄補瀉之輕重根莖異用華葉異宜一一精究初不以方示之意蓋有在矣謙父不私所有推以及人善則善矣李君教人之本意殆不然也君所著醫學發明脾胃論內外傷辨藥象論等書皆平日究心將以惠天下後世者必須合數書而觀之庶知君制方之旨免泥而不通之患若持此編謂君之能盡在是非李君所望於後人也至元三年立春後五日邙城硯堅序
