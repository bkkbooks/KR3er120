body:
  text: 卷九雜方門時毒治驗泰和二年先師以進納監濟源稅時四月民多疫癘初覺憎寒體重次傳頭面腫盛目不能開上喘咽喉不利舌乾口燥俗云大頭天行親戚不相訪問如染之多不救張縣承侄亦得此病至五六日醫以承氣加藍根下之稍緩翌日其病如故下之又緩終莫能愈漸至危篤或曰李明之存心於醫可請治之遂命診視具說其由先師曰夫身半以上天之氣也身半以下地之氣也此邪熱客於心肺之間上攻頭目而為腫盛以承氣下之瀉胃中之實熱是誅罰無過殊不知適其所至為故遂處方用黃芩黃連苦寒瀉心肺間熱以為君橘紅苦平玄參苦寒生甘草甘寒瀉火補氣以為臣連翹黍粘子薄荷葉苦辛平板藍根味苦寒馬勃白殭蠶味苦平散腫消毒定喘以為佐新升麻柴胡苦平行少陽陽明二經不得伸桔梗味辛溫為舟楫不令下行共為細末半用湯調時時服之半蜜為丸噙化之服盡良愈因嘆曰往者不可追來者猶可及凡他所有病者皆書方以貼之全活甚衆時人皆曰此方天下所制遂刊於石以傳永久普濟消毒飲子黃芩君黃連各半兩君人參三錢橘紅去白臣玄參臣生甘草各二錢臣連翹黍粘子板藍根馬勃各一錢白殭蠶炒七分升麻七分柴胡二錢桔梗二錢上件為細末服餌如前法或加防風薄荷川芎當歸身㕮咀如麻豆大每服稱五錢水二盞煎至一盞去滓稍熱時時服之食後如大便硬加酒煨大黃一錢或二錢以利之腫勢甚者宜砭刺之燃香病熱戊申春節使趙君年幾七旬病身體熱麻股膝無力飲食有汗妄喜笑善飢痰涎不利舌強難言聲嘎不鳴求治於先師診得左寸脈洪大而有力是邪熱客於經絡之中也兩臂外有數瘢遂問其故對以燃香所致先師曰君之病皆由此也夫人之十二經灌溉通身終而復始蓋手之三陽從手表上行於頭加之以火邪陽併於陽勢甚熾焉故邪熱妄行流散於周身而為熱麻黃帝針經四卷口問第一胃熱則蟲動蟲動則廉泉開故涎下熱傷元氣而為沉重無力飲食入胃慓悍之氣不循常度故多汗心火盛則妄喜笑脾胃熱則消穀善飢肺金衰則聲嘎不鳴仲景云微數之脈慎不可灸焦骨傷筋血難復也君奉養以膏粱之味無故而加之以火焫之毒熱傷經絡而為此病明矣內經云熱淫所勝治以苦寒佐以苦甘以甘瀉之以酸收之當以黃蘗知母之苦寒為君以瀉火邪壯筋骨乃腎欲堅急食苦以堅之黃耆生甘草之甘寒瀉熱實表五味子酸止汗補肺氣之不足以為臣炙甘草當歸之甘辛和血潤燥升麻柴胡之苦平行少陽陽明二經自地升天以苦發之者也以為臣佐㕮咀同煎取清汁服之更繆刺四肢以瀉諸陽之本使十二經相接而瀉火邪不旬日良愈遂名其方清神補氣湯清神補氣湯蒼朮四錢藁本二錢升麻六錢柴胡三錢五味子一錢半黃蘗三錢酒知母二錢陳皮一錢半黃耆三錢生甘草二錢當歸二錢上件銼如麻豆大每服稱五錢水五盞煎至一盞去滓空心候大小便覺飢時服之待少食以美膳壓之人之汗以天地之雨名之陰陽應象論曰人之汗以天地之雨名之又云濕盛則霖霪驟注蓋以真氣已虧胃中火熱汗出不休胃中真氣已竭若陰火亦衰無汗皮燥乃陰中之陽陽中之陽俱衰四時無汗其形不久濕衰燥旺理之常也其形不久者秋氣主殺生氣者胃之穀氣也乃春少陽生化之氣也張耘夫己酉閏二月盡天寒陰雨寒濕相雜因官事飲食失節勞役所傷病解之後汗出不止沾濡數日惡寒重添厚衣心胸間時煩熱頭目昏憒上壅食少減此乃胃中陰火熾盛與外天雨之濕氣峻熱兩氣相合令濕熱大作汗出不休兼見風邪以助東方甲乙風藥去其濕以甘寒瀉其熱羌活勝濕湯主之羌活勝濕湯炙甘草三分黃耆七分生甘草五分生黃芩酒黃芩各三分人參羌活防風藁本獨活細辛蔓荊子川芎各三分升麻柴胡各半錢薄荷一分上件都作一服水二大盞煎一盞半細辛以下入輕清四味再上火煎至一盞去滓熱服之一服而止諸證悉去偏枯二指陝帥郭巨濟病偏枯二指著足底不能伸迎先師於京治之至則以長針刺委中深至骨而不知痛出血一二升其色如墨又且繆刺之如是者六七次服藥三月病良愈陰盛格陽馮內翰叔獻之侄擽童年十六病傷寒目赤而煩渴脈七八至醫以承氣湯下已煮藥而先師適從外來馮告之當用承氣先師切脈大駭曰幾殺此兒彼以諸數為熱諸遲為寒今脈七八至是熱極也殊不知至真要大論云病有脈從而病反者何也岐伯曰脈至而從按之不鼓諸陽皆然此陰盛格陽於外非熱也速持薑附來吾以熱因寒用之法處治藥味就而病者爪甲變青頓服八兩汗尋出而愈朝賢多為作詩紀之澤人王子正云天地生萬物惟人最為貴攝養忽有虧能無觸邪氣盧扁不出世夭枉跡相繼世道交相喪適於此凋敝醫學不師授迷津罔攸濟難素何等物縱有徒充笥字畫尚未知矧肯究其義頃年客京華知醫僅一二鎮陽隴西公翹然出其類折節易水張提耳發其祕竊嘗侍談塵窮理到幽遂吾友叔獻兄有侄破苽戌頭痛肌復熱呻吟聲震地目赤苦煩渴脈息八九至衆以為可下公獨以為未衆皆以為難公獨以為易薑附投半斤駭汗夾人背須臾煩渴止百骸泰其否健羡活人手所見一何異脈理造精微起死特遊戲公難惡其名名焉豈能避喜為知者言善誘不求利我願趨几筵執經請從事齊沐作此詩聊以伸鄙意誤服白虎湯變證西臺掾肖君瑞二月中病傷寒發熱以白虎投之病者面黑如墨本證遂不復見脈沉細小便不禁先師初不知也及診之曰此立夏以前誤服白虎白虎大寒非行經之藥止能寒臟腑不善用之則傷寒本病隱曲於經絡之間或更投以大熱之藥求以去陰邪則他證必起非所以救白虎也可用溫藥之升陽行經者難者云白虎大寒非大熱何以救君之治奈何先師曰病隱於經絡間陽不升則經不行經行而本證見矣本證見又何難焉果如其言脈風成厲戊申歲正月段庫病厲風滿面連須極癢眉毛已脫落須用熱水沃之稍緩每晝夜須數次或砭刺亦緩先師曰風論中夫厲者榮衛熱附其氣不清故使其鼻柱壞而色敗皮膚瘍潰風寒客於脈而不去名曰厲風治之者當刺其腫上已刺以鋭針刺其處按出其惡氣腫盡乃止常食如常食勿食他食如以藥治之當破血去熱升陽去癢瀉榮逆辛溫散之甘溫升之行陽明經瀉心火補肺氣乃治之正也補氣瀉榮湯升麻六分連翹六分蘇木三分當歸全蝎黃連地黃黃耆以上各三分生黃芩四分甘草一錢半人參二分生地黃四分桃仁三個桔梗半錢麝香少許梧桐淚一分虻蟲去翅足微炒二個水蛭炒令煙盡兩個上件銼如麻豆大除連翹另銼梧桐淚研白豆蔻二分為細末二味另放麝香虻蟲水蛭三味為細末另放外都作一服水二大盞酒一匙入連翹煎至一盞六分再入白豆蔻二味并麝香等三味再上火煎一二沸去渣稍熱早飯後午飯前服忌酒濕𬹃生冷硬物生子不病胎瘤李和叔一日問先師曰中年以來得一子至一歲之後身生紅繫瘤不救後三四子至一二歲皆病瘤而死何緣至此疾師曰豫試思之翌日見和叔曰吾得之汝乃腎中伏火精氣中多有紅繫以氣相傳生子子故有此疾遇觸而動發於肌肉之間俗名胎瘤者是也汝試觀之果如其言遂以滋腎丸數服以瀉腎中火邪補真陰之不足忌酒辛熱之物其妻與六味地黃丸以養陰血受胎五月之後以黃芩白朮二味作散啖五七服後生子至三歲前證不復作矣李心中誠服曰先生乃神醫也遂從而學之其子今已年壯風寒傷形靈壽縣董臨軍癸卯年冬十二月間大雪初霽因事至真定忽覺有風氣暴至又二日腦項麻候六脈俱弦甚按之洪實有力其證手攣急大便祕澀面赤熱此風寒始至加於身也四肢者脾也風寒之邪傷之則搐急而攣痹乃風淫末疾而寒在外也內經曰寒則攣急謂此也本人素飲酒內有實熱乘於腸胃之間故大便祕澀而面赤熱內則手陽明經受邪外則足太陰脾經又受風寒之邪用桂枝甘草炙以卻其寒邪而緩其急搐用黃蘗之苦寒滑以瀉實而潤燥急救腎水用升麻葛根以升陽氣行手足陽明之經不令遏絶更以桂枝辛熱入手陽明之經為引用潤燥復以芍藥甘草專補脾氣退木邪專益肺氣也加人參以補元氣為之輔名活血通經湯活血通經湯升麻葛根各一錢桂枝二錢當歸身一錢人參一錢芍藥半錢炙甘草一錢黃蘗酒製二錢上件㕮咀都作一服水二大盞煎至一盞去滓稍熱服令暖房中近火摩搓其手一服而愈暑熱傷氣商人杜彥達五月間兩手指麻木四肢困倦怠惰嗜臥乃熱傷元氣也以人參益氣湯主之人參益氣湯黃耆八錢生甘草半錢甘草炙二錢人參半兩升麻二錢白芍藥三錢五味子一百四十個柴胡二錢半上件㕮咀分作四服每服水二盞煎至一盞去滓稍熱服食遠神效芍藥補氣湯治皮膚間麻木此肺氣不行也潔古老人立此方神效黃耆一兩白芍藥一兩半橘皮不去白一兩澤瀉半兩甘草炙一兩上件㕮咀每服稱半兩水二盞煎至一盞去滓溫服如肌肉麻木必待瀉營而愈如濕熱相合肢體沉重當瀉濕熱導氣湯治兩腿麻木沉重黃耆八錢甘草六錢五味子一百二十個升麻二錢柴胡二錢當歸尾澤瀉各二錢紅花半錢陳皮一錢青皮四錢上件㕮咀分作四服每服水三大盞煎至一盞去滓熱服食前茯苓燥濕湯治六七月間濕令大行濕令行子能令母實熱旺也濕熱大勝必刑庚大腸以天令言之則清燥之氣絶矣古人之法夏月熱以救熱傷天真元氣燥金若受濕熱之邪是絶寒水生化之源源絶則腎虧痿厥之病大作腰以下痿軟癱瘓不能動矣何止行步不正兩足欹側更宿有濕熱之證當急救之黃耆一錢半蒼朮一錢白朮半錢橘皮半錢人參三分五味子九個麥門冬當歸身生地黃麴末各二分澤瀉半錢白茯苓三分豬苓二分酒黃蘗二分柴胡一分升麻三分黃連一分炙甘草一分上件㕮咀每服半兩水二盞半煎至一盞去滓空心服陽盛拒陰中書粘舍公年三十三歲病腳膝痿弱臍下尻臀皆冷陰汗臊臭精滑不固省醫黃道寧主以鹿茸丸十旬不減至戊申春具録前證始求於先師先師遂診其脈沉數而有力乃曰公飲醇酒以膏粱滋火於內逼陰於外醫見其證蓋不知陽強陰不能密以致膚革冷而溢泄以為內實有寒投以熱劑欲瀉其陰而補真陽真所謂實實虛虛也其不增劇者為幸矣復何獲效歟即處以滋腎丸大苦寒之劑制之以急寒因熱用引入下焦適其病所瀉命門相火之勝再服而愈公以厚禮更求前藥先師固辭竟以不受或問曰物不受義也藥既大驗不復與何也曰夫大寒大熱之藥非久服者唯從權可也今公之疾相火熾盛以乘陰位故用此大寒之劑以瀉相火而助真陰陰既復其位皮表之寒自消矣內經云陰平陽祕精神乃治如過用之則故病未已新病復起矣此豫之意也身體麻木丁未年九月間李正臣夫人病診得六脈俱中得弦洪緩相合按之無力弦在其上是風熱下陷入陰中陽道不行是證合目則渾身麻木晝減而夜甚開目則麻木漸退久則絶止常開其目此證不作懼其麻木不敢合眼致不得眠身體皆重有時痰嗽覺胸中常似有痰而不利時有躁作氣短促而時喘肌膚充盛飲食大小便如常唯畏其麻木不敢合眼為最苦觀其色脈形病相應而不逆黃帝針經寒熱病第三陽盛䐜目而動輕陰盛閉目而靜重又云諸脈皆屬於目針經又云開目則陽道行陽氣遍布周身閉目則陽道閉而不行如晝夜之分知陽衰而陰旺也且麻木為風三尺之童皆以為然細校之有區別耳久坐而起亦有麻木謂如繩縛之人釋之覺麻木而不敢動良久則自已以此驗之非有風邪乃氣不行也何可治風惟補其肺中之氣則麻自去矣知經脈中陰火乘其陽分火動於中為麻木也當兼去其陰火時痰嗽者秋涼在外在上而作也當以溫劑實其皮毛身重脈緩者濕氣伏匿而作也時見躁作當升陽助氣益血微瀉陰火與濕通行經脈調其陰陽則已矣非五臟六腑之本有邪也補氣升陽和中湯主之補氣升陽和中湯黃耆五錢人參三錢炙甘草四錢陳皮白朮各二錢白芍藥三錢生甘草一錢去腎熱草豆蔻一錢半益陽道退外寒升麻一錢酒製黃蘗一錢瀉火除濕佛耳草四錢當歸身二錢白茯苓澤瀉柴胡各一錢蒼朮一錢半上件㕮咀每服稱三錢水二大盞煎至一大盞熱服早飯後午飯前分服而愈十月二十日嚴霜作時有一婦人病四肢無力痿厥濕熱在下焦也醋心者濁氣不降欲為滿也合目麻木作者陽道不行也惡風寒者上焦之分皮膚中氣不行也開目不麻者助陽道行故陰寒之氣少退也頭目眩運風氣下陷於血分不得伸越而作也近火則有之沖和補氣湯羌活七分獨活三分柴胡二分人參一錢甘草炙半錢白芍藥三錢黃耆二錢白朮一錢蒼朮二錢橘皮二錢黃蘗三分黃連一分澤瀉一錢豬苓一錢麴二分木香草豆蔻各二分麻黃不去節二分升麻半錢當歸身三分上件分作二服每服水二盞煎至一盞去滓稍熱服食遠神效暴攣癇眩黃帝針經三卷寒熱第三云暴攣癇眩足不任身取天柱穴天柱穴足太陽也又云癲癇瘈瘲不知所苦兩蹻之下男陽女陰潔古老云晝發灸陽蹻夜發灸陰蹻各二七壯陽蹻起於跟中循外踝上行入風池申脈穴是也陰蹻亦起於跟中循內踝上行至咽喉交貫衝脈照海穴是也升陽湯治陽蹻癇疾足太陽寒恐則氣下行宜升陽氣羌活一兩半防風八錢炙甘草半兩麻黃不去根節八錢上件銼如麻豆大每服稱三錢水五盞煎至一盞空心熱服疝瘕同法治驗丁香楝實丸治男子七疝痛不可忍婦人瘕聚帶下皆任脈所主陰經也乃肝腎受病治法同歸於一當歸去蘆銼碎附子炮裂去皮臍銼碎川楝子銼茴香炒上件四味各一兩銼碎以好酒三升同煎酒盡為度焙乾作細末每稱藥末一兩再入下項藥丁香五分木香五分全蝎十三個玄胡五錢上四味同為細末入在前項當歸等藥末稱和勻酒糊為丸如桐子大每服三十丸至百丸溫湯送下空心凡疝氣帶下皆屬於風全蝎治風之聖藥茴香川楝子皆入小腸經當歸玄胡和血止血痛疝氣帶下皆積寒於小腸之間故以附子佐之以丁香木香引導也韓提控病疝氣每發痛甚不可忍則於榻兩末分置其枕往來伏之以受如是者三年不已服此藥三劑良愈
