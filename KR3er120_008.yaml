body:
  text: 卷八小便淋閉門小便淋閉論三難云病有關有格關則不得小便又云關無出之由皆邪熱為病也分在氣在血而治之以渴與不渴而辨之如渴而小便不利者是熱在上焦肺之分故渴而小便不利也夫小便者是足太陽膀胱經所主也長生於申申者西方金也肺合生水若肺中有熱不能生水是絕其水之源經云虛則補其母宜清肺而滋其化源也故當從肺之分助其秋令水自生焉又如雨如露如霜皆從天而降下也乃陽中之陰秋氣自天而降下也且藥有氣之薄者乃陽中之陰是感秋清肅殺之氣而生可以補肺之不足淡味滲泄之藥是也茯苓澤瀉琥珀燈心通草車前子木通瞿麥萹蓄之類以清肺之氣泄其火資水之上源也如不渴而小便不通者熱在下焦血分故不渴而大燥小便不通也熱閉於下焦者腎也膀胱也乃陰中之陰陰受熱邪閉塞其流易上老云寒在胃中遏絕不入熱在下焦填塞不便須用感北方寒水之化氣味俱陰之藥可除其熱泄其閉塞內經云無陽則陰無以生無陰則陽無以化若服淡滲之藥其性乃陽中之陰非純陽之劑陽無以化何能補重陰之不足也須用感地之水運而生大辛之味感天之寒藥而生大寒之氣此氣味俱陰乃陰中之陰也大寒之氣人稟之生膀胱寒水之運人感之生腎此藥能補腎與膀胱受陽中之陽熱火之邪而閉塞其下焦使小便不通也熱在下焦小便不通治驗北京人王善甫為京兆酒官病小便不利目睛突出腹脹如鼓膝以上堅硬皮膚欲裂飲食不下甘淡滲瀉之藥皆不效先師曰疾急矣而非精思不能處我歸而思之夜參半忽攬衣而起曰吾得之矣內經有云膀胱者津液之府又氣化而能出焉渠輩已用滲泄之藥而病益甚是氣不化也啓玄子云無陽則陰無以生無陰則陽無以化甘淡氣薄皆陽藥獨陽無陰欲化得乎明日以群陰之劑投之不再服而愈滋腎丸治不渴而小便閉熱在下焦血分也知母去皮銼酒製黃蘗銼酒製焙乾各二兩肉桂一錢內經云熱者寒之遂用知母黃蘗大苦寒為主治肉桂辛熱與熱同體乃寒因熱用也上件為細末煎熟水為丸如雞頭大每服百餘丸至二百丸煎百沸湯送下空心宿食消盡服之頓兩足令藥易下行故也如小便利前陰中如刀刺痛有惡物下為效驗清肺飲子治渴而小便不利邪熱在上焦氣分也茯苓去皮二錢豬苓去皮三錢澤瀉五分琥珀半錢燈心一分木通七分通草二分車前子二錢炒瞿麥五分萹蓄七分上為細末每服五錢水一盞半煎至一盞稍熱服或局方八正散仲景五苓散亦得用之導氣除燥湯治小便閉塞不通乃血澀致氣不通而竅澀也知母細銼酒製三錢黃蘗酒製四分滑石炒黃色為末二錢澤瀉為末三錢茯苓去皮二錢上件和勻每服秤半兩水三大盞煎至一盞去滓稍熱服空心如急閉不計時候腎疸湯治腎疸目黃甚至渾身黃小便赤澀升麻半錢羌活防風藁本獨活柴胡以上各半錢以上治腎疸目黃渾身黃白朮半錢蒼朮一錢豬苓四分澤瀉三分茯苓二分以上治小便赤澀葛根半錢甘草三分黃蘗二分人參三分麹六分上件銼如麻豆大分作二服每服水三盞煎至一盞去滓稍熱服食前陰痿陰汗及臊臭門陰痿陰汗及臊臭論一富者前陰臊臭又因連日飲酒腹中不和求先師治之曰前陰者足厥陰肝之脈絡陰器出其挺末夫臭者心之所主散入五方為五臭入肝為臊臭此其一也當於肝經中瀉行間是治其本後於心經中瀉少衝乃治其標如惡針當用藥除之夫酒者氣味倶厚能生裏之濕熱是風濕熱合於下焦為邪故經云下焦如瀆又云在下者引而竭之酒是濕熱之水亦宜決前陰以去之是合下焦二法之治龍膽瀉肝湯治陰部時復濕癢及臊臭柴胡澤瀉各一錢車前子木通各半錢生地黃當歸尾草龍膽各三分柴胡入肝為引用澤瀉車前子木通淡滲之味利小便以降臊臭是名在下者引而竭之生地黃草龍膽苦寒瀉酒濕熱更兼車前子之類以撤肝中邪氣肝生血以當歸尾滋肝中血不足上件㕮咀如麻豆大都作一服水三大盞煎至一盞去滓稍熱空心宿食消盡服之更以美膳壓之清震湯治溺黃臊臭淋漓兩丸如冰陰汗浸及兩股陰頭亦冷正值十二月天寒凜冽霜雪交集寒之極矣升麻半錢甘草炙二分柴胡五分酒黃蘗一錢蒼朮半錢藁本二分防風三分當歸身二分紅花一分豬苓三分羌活一錢麻黃根三分黃芩半錢澤瀉四分上件㕮咀如麻豆大都作一服水二大盞煎至一盞去滓臨臥服大忌酒濕𬹃正元湯治兩丸冷前陰痿弱陰汗如水小便後有餘滴尻臀并前陰冷惡寒而喜熱膝亦冷升麻一錢羌活一錢柴胡一錢炙甘草一錢半草龍膽二錢黃蘗二錢澤瀉一錢半知母二錢上件銼如麻豆大都作一服水三盞煎至一盞去滓稍熱服空心服之以早飯壓之柴胡勝濕湯治兩外腎冷兩髀樞陰汗前陰痿陰囊濕癢臊氣生甘草二錢柴胡一錢酒黃蘗二錢當歸尾一錢紅花少許草龍膽麻黃根羌活漢防己各一錢五味子三個升麻一錢半澤瀉一錢半茯苓一錢上件銼如麻豆大都作一服水三大盞煎至一盞去渣溫服食前忌酒濕𬹃房事椒粉丸治前陰兩丸濕癢痛秋冬甚夏月減麻黃一錢黑狗脊半錢斑蝥二個肉桂二分當歸身三分輕粉少許小椒三分蛇床子半錢豬苓三分紅花少許上件為細末乾摻上避風寒濕冷處坐臥補肝湯治前陰如冰冷并陰汗兩腳痿軟無力黃耆七分人參三分葛根三分升麻四分柴胡羌活當歸身連翹炒黃蘗澤瀉蒼朮麹末知母防風各二分炙甘草半錢陳皮二分白茯苓三分豬苓四分上件銼如麻豆大都作一服水二盞煎至一盞去滓稍熱空心食前忌酒濕𬹃溫腎湯治面色萎黃腳萎弱無力陰汗陰莖有夭色麻黃六分防風一錢半白朮一錢澤瀉二錢豬苓一錢白茯苓一錢升麻一錢柴胡六分酒黃蘗一錢蒼朮一錢半上件分作二服水二大盞煎至一盞去滓稍熱服食前天晴明服之候一時辰方食丁香疝氣丸治臍下撮急疼痛并臍以下周身皆急痛小便頻清其五脈急獨腎按之不急皆虛無力名曰腎疝當歸茴香各一錢甘草木香各半錢全蝎三十個羌活三錢防己三分麻黃根節玄胡各一錢丁香半錢肉桂一錢川烏頭半錢上件為細末酒煮𬹃糊為丸如雞頭仁大每服五十丸溫酒送下淡鹽湯亦得空心
