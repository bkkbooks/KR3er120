body:
  text: 卷三嘔吐噦門嘔吐噦論黃帝針經第二經脈第一足太陰脾之脈復從胃別上膈注心中是動則病舌本強食則嘔脈解篇云所謂食則嘔者物盛滿而上溢故也舉痛論云寒氣客於腸胃厥逆上出故痛而嘔厥陰之病少腹堅滿厥心痛嘔吐飲食不入入而復出筋骨掉眩清厥甚則入脾食痹而吐靈樞經云人之噦蓋榖入於胃胃氣上注於肺因有故寒氣與新穀氣俱還入於胃新故相亂真邪相攻氣并相逆復出於胃故為噦補手太陰瀉足少陰又云胃為氣逆為噦夫嘔吐噦者俱屬於胃胃者總司也以其氣血多少為異耳如嘔者陽明也陽明多血多氣故有聲有物血氣俱病也仲景云嘔多雖有陽明證慎不可下孫真人云嘔家多服生薑為嘔家之聖藥也氣逆者必散之故以生薑為主吐者太陽也太陽多血少氣故有物無聲為血病也有入食則吐以橘皮去白主之噦者少陽也少陽多氣少血故有聲無物乃氣病也以薑製半夏為主故朱奉議治嘔吐噦以生薑橘皮半夏者是也究其三者之源皆因脾胃虛弱或因寒氣客胃加之飲食所傷而致之也宜以丁香藿香半夏茯苓陳皮生薑之類主之若但有內傷而有此病宜察其虛實使內消之痰飲者必下之治之當分其經對證用藥而不可亂丁香安胃湯治嘔吐噦胃虛寒所致丁香半錢吳茱萸一錢草豆蔻黃耆各二錢人參一錢炙甘草半錢柴胡半錢升麻七分當歸身一錢五分橘皮半錢黃蘗三分蒼朮一錢上件銼如麻豆大每服半兩水二大盞煎至一盞去渣稍熱服食前茯苓半夏湯治胃氣虛弱身重有痰惡心欲吐是風邪羈絆於脾胃之間當先實其脾胃白朮茯苓半夏大麥𬹃各半兩炒麴二錢陳皮三錢天麻三錢上件㕮咀每服半錢水二大盞生薑五片煎至一盞去滓稍熱服食前柴胡半夏湯治舊有風證不敢見風眼澀頭痛有痰眼黑惡心兀兀欲吐風來覺皮肉緊手足重難舉居暖處有微汗便減再見風其病即便復一名補肝湯半夏二錢炒麴一錢生薑十片柴胡半錢升麻五分蒼朮一錢藁本半錢白茯苓七分上件㕮咀麻豆大都作一服水三盞煎至一盞去渣稍熱服木香利膈丸治寒在膈上噎塞咽膈不通吳茱萸一錢二分草豆蔻一錢二分益智八分橘皮八分白殭蠶四分人參八分黃耆八分升麻八分麥蘗一錢半當歸六分炙甘草六分半夏一錢木香二分澤瀉四分薑黃四分柴胡四分青皮二分上件為細末湯浸蒸餅為丸如緑豆大每服二十丸溫水少許送下勿多飲湯恐速走下細嚼亦得衄吐嘔唾血門衄吐嘔唾血論別論云陽明厥逆喘咳身熱善驚衄吐血又云足陽明胃之脈起於鼻又云溫淫汗出鼽衄又云陽氣者大怒則形氣絶而菀於上使人薄厥又云怒則氣逆甚則嘔血故氣上矣黃帝針經三卷寒熱病第三暴疸內逆肝肺相搏血溢鼻口取天府穴天府乃手太陰也又足少陰腎之脈從腎上貫肝入肺中循喉嚨其病則飢不欲食面黑如地色咳唾則有血夫氣者陽也血者陰也氣者煦之血者濡之今血妄行上出於鼻口者皆氣逆也故經言陽明厥逆怒則氣逆暴疸內逆者是也分之則各有所屬治之則各有所主若浮緊者麻黃湯浮緩者桂枝湯脈已微者二藥俱不可用宜黃芩芍藥湯主之雜病謂見血者多責其熱也如衄血出於肺以犀角升麻梔子黃芩芍藥生地黃紫參丹參阿膠之類主之咯唾血者出於腎以天門冬麥門冬貝母知母桔梗百部黃蘗遠志熟地黃之類主之如有寒者乾薑肉桂之類痰涎血者出於脾葛根黃耆黃連芍藥當歸甘草沉香之類主之嘔血者出於胃也實者犀角地黃湯主之虛者小建中湯加黃連主之血證上行或唾或嘔或吐皆逆也若變而下行於惡痢者順也血上行為逆其治難下行為順其治易故仲景云蓄血證下血者當自愈也與此意同若無病之人忽然下血其病進也今病血證上行而復下行惡痢者其邪欲去是知吉也經云諸見血身熱脈大者難治是火邪勝也身涼脈靜者易治是正氣復也故叔和云鼻衄吐血沉細宜忽然浮大即傾危此之謂也三黃補血湯治六脈俱大按之空虛必面赤善驚上熱乃手少陰心之脈也此氣盛多而亡血以甘寒鎮墜之劑大瀉其氣以墜氣浮以甘辛溫微苦峻補其血熟地黃二錢生地黃三錢當歸一錢半柴胡二錢半升麻一錢白芍藥半兩牡丹皮一錢川芎三錢黃耆一錢上㕮咀如麻豆大每服半兩水二大盞煎至一盞去滓稍熱服食前補之太過以防血溢上竭如兩寸脈芤兩頭則有中間全無而虛曰芤血在上焦或衄或嘔與犀角地黃湯則愈黃耆芍藥湯治衄血多歲面黃眼澀多眵手麻木黃耆三兩炙甘草二兩升麻一兩葛根半兩羌活半兩芍藥一兩上件㕮咀每服三錢水二盞煎至一盞去渣溫服之十五服而愈六脈弦細而澀按之空虛其色必白而夭不澤者脫血也此大寒證以辛溫補血益血以甘溫甘熱滑潤之劑以佐之則愈此亡血亦傷精氣人參飲子治脾胃虛弱氣促氣弱精神短少衄血吐血人參去蘆三分黃耆一錢五味子五個白芍藥一錢甘草一錢當歸身三分麥門冬二分上件為粗散分作二服每服水一盞八分煎至一盞去滓稍熱服一貧者有前證以前藥投之愈繼而時在冬天居大室中臥大熱炕而吐血數次再來求治料此病久虛弱附臍有形而有火熱在內上氣不足陽氣外虛當補表之陽氣瀉其裏之虛熱是其法也冬天居大室衣蓋單薄是重虛其陽表有大寒壅遏裏熱火邪不得舒伸故血出於口仲景傷寒論中一證太陽傷寒當以麻黃湯發汗而不愈遂成衄卻與麻黃湯立愈此法相同遂用麻黃桂枝湯麻黃桂枝湯麻黃一錢去其外寒黃耆一錢實表益衛桂枝半錢補表虛白芍藥一錢益脾甘草一錢補其脾胃之虛人參二分益上焦氣而實表麥門冬三分保脾氣五味子五個安肺氣當歸身半錢和血養血上件都作一服水二盞先煎麻黃令沸去沫至二盞入餘藥同煎至一盞去滓稍熱臨睡一服而愈更不再作人參救肺散治咳血吐血升麻一錢柴胡一錢當歸尾二錢熟地黃二錢白芍藥一錢蘇木半錢黃耆二錢人參二錢甘草半錢蒼朮一錢陳皮半錢上件都作一服水二盞煎至一盞去渣溫服食前麥門冬飲子治吐血久不愈五味子十個麥門冬去心半錢當歸身人參各半錢黃耆一錢生地黃五分上件為粗末都作一服水二盞煎至一盞去渣稍熱服不拘時候以三稜針於氣衝出血立愈治鼻衄不止法鼻衄不止或素有熱而暴作諸藥無驗以白紙一張作八牒或十牒於極冷水內濕紙置頂中熱尉斗尉至一重或二重紙乾立止消渴門消渴論陰陽別論云二陽結謂之消脈要精微論云疸成消中夫二陽者陽明也手陽明大腸主津病消則目黃口乾是津不足也足陽明胃主血熱則消穀善飢血中伏火乃血不足也結者津液不足結而不潤皆燥熱為病也此因數食甘美而多肥故其氣上溢轉為消渴治之以蘭除陳氣也不可服膏粱芳草石藥其氣慓悍能助燥熱也越人云邪在六腑則陽脈不和陽脈不和則氣留之氣留之則陽脈盛矣陽脈大盛則陰氣不得營也故皮膚肌肉消削是也經云凡治消疸仆擊偏枯痿厥氣滿發逆肥貴人則膏粱之疾也岐伯曰脈實病久可治脈弦小病久不可治後分為三消膈消者舌上赤裂大渴引飲逆調論云心移熱於肺傳為膈消者是也以白虎加人參湯治之中消者善飲而瘦自汗大便硬小便數叔和云口乾飲水多食亦飢虛疸成消中者是也以調胃承氣三黃丸治之下消者煩躁引飲耳輪焦乾小便如膏叔和云焦煩水易虧此腎消也以六味地黃丸治之總録所謂末傳能食者必發腦疽背瘡不能食者必得中滿鼓脹皆為不治之證潔古老人分而治之能食而渴者白虎加人參湯不能食而渴者錢氏方白朮散倍加葛根治之上中既平不復傳下消矣前人用藥厥有旨哉或曰末傳瘡疽者何也此火邪勝也其瘡痛甚而不潰或赤水者是也經云有形而不痛陽之類也急攻其陽勿攻其陰治在下焦元氣得強者生失強者死末傳中滿者何也以寒治熱雖方士不能廢其繩墨而更其道也然臟腑有遠近心肺位近宜制小其服腎肝位遠宜制大其服皆適其至所為故如過與不及皆誅伐無過之地也如膈消中消制之太急速過病所久而成中滿之病正謂上熱未除中寒復生者也非藥之罪失其緩急之制也處方之制宜加意焉生津甘露飲子治膈消大渴飲水無度舌上赤澀上下齒皆麻舌根強硬腫痛食不下腹時脹痛渾身色黃目白睛黃甚四肢痿弱無力面塵脫色脅下急痛善嚏善怒健忘臀腰背寒兩丸冷甚石膏一錢二分人參二錢生甘草一錢炙甘草二錢山梔子一錢蓽澄茄一錢白豆蔻一錢白葵花五分黃蘗酒拌炒一錢半香白芷一錢連翹一錢杏仁去皮一錢半麥門冬五分黃連三分木香三分桔梗三錢升麻二錢薑黃一錢知母二錢酒製當歸身五分全蝎二個藿香二分柴胡三分蘭香五分消之為病燥熱之氣勝也內經曰熱淫所勝佐以甘苦以甘瀉之熱則傷氣氣傷則無潤折熱補氣非甘寒之氣不能除故以石膏甘草之甘寒為主啓玄子云滋水之源以鎮陽也故以黃連黃蘗梔子知母之苦寒瀉熱補水為臣以當歸杏仁麥門冬全蝎連翹白芷白葵蘭香甘草甘寒和血潤燥為佐以升麻柴胡苦平行陽明少陽二經白豆蔻木香藿香反佐以取之又為因用桔梗為舟楫使浮而不下也上件為細末如法湯浸蒸餅和勻成劑捻作餅子曬半乾杵碎篩如黃米大食後每服二錢抄於掌中以舌舐之隨津唾下或送以白湯少許亦可此制之緩也不惟不成中滿亦不傳下消矣戊申正月七日葉律千戶服之大效蘭香飲子治渴飲水極甚善飲而瘦自汗大便結燥小便頻數石膏三錢酒知母一錢生甘草一錢炙甘草半錢人參半錢防風一錢半夏二分湯洗蘭香半錢白豆蔻仁連翹桔梗升麻各半錢上同為細末湯浸蒸餅和勻成劑捻作薄片子日中曬半乾碎如米每服二錢食後淡生薑湯送下地黃飲子治口乾舌乾小便數舌上赤脈此藥生津液長肌肉杏仁六個生甘草三分石膏一錢黃連酒製八分桃仁六個生地黃酒製七分黃蘗酒製二錢當歸酒製四分柴胡三分炙甘草三分升麻一錢紅花少許知母酒製五分麻黃根三分漢防己酒製五分羌活五分上件銼如麻豆大都作一服水二盞煎至一盞去渣溫服食後忌濕𬹃房事鹽血戊申仲冬張安撫服此大效當歸潤燥湯治消渴舌上白乾燥唇乾口乾眼澀黑處見浮雲大便祕澀乾燥結硬喜溫飲陰頭短縮升麻一錢半柴胡七分甘草六分半生半熟細辛一分黃蘗一錢知母一錢石膏一錢杏仁六個桃仁泥子一錢麻仁泥子一錢當歸身一錢紅花少許防風一錢荊芥穗一錢熟地黃三分小椒三個上件㕮咀都作一服水二碗煎至一盞去渣食後溫服忌辛熱物清涼飲子治消中能食而瘦口乾舌乾自汗大便結燥小便頻數羌活一錢柴胡一錢升麻四分防風五分當歸身六分生甘草半錢炙甘草一錢石膏一錢半酒知母一錢漢防己半錢草龍膽酒製一錢半黃蘗一錢半紅花少許桃仁五個杏仁十個生地黃酒製半錢黃耆一錢黃芩酒製一錢上件㕮咀麻豆大都作一服水二盞酒一匙煎至一盞去渣稍熱服食後清神補氣湯前消渴證皆愈只有口乾腹不能努起升麻一錢半柴胡七分生甘草五分黃蘗酒製半錢黃連酒製半錢知母酒製半錢石膏四分杏仁六個桃仁一錢當歸身一錢紅花少許防風一錢荊芥穗一錢熟地黃三分小椒二個細辛一分生地黃一分上件銼如麻豆大都作一服水二盞煎至一盞去渣稍熱食後服甘草石膏湯消病全愈再添舌白滑微腫咽喉咽唾覺痛嗌腫時有渴口中白沫如膠飲冷則稍緩升麻一錢半柴胡七分甘草五分黃蘗一錢知母一錢石膏六分杏仁六個桃仁一錢當歸身一錢熟地黃二分小椒一個細辛一分黃連三分紅花少許防風一錢荊芥穗一錢生地黃一分上件銼如麻豆大都作一服水二盞煎至一盞去渣稍熱食後服辨六經渴并治太陽渴脈浮無汗者五苓散滑石之類陽明渴脈長有汗者白虎湯涼膈散之類少陽渴脈弦而嘔者小柴胡加瓜蔞湯主之太陰渴脈細不欲飲縱飲思湯不思水少陰渴脈沉自利者豬苓湯三黃湯之類厥陰渴脈微引飲者少少與之滑石治渴本為竅不利而用之以其燥而能亡津液也天令濕氣太過者當用之無濕用之是為犯禁假小便不利或渴或不渴知內有濕也小便自利而渴者知內有燥也濕宜滲瀉之燥以潤之則可矣雜證汗而渴者以辛潤之無汗而渴者以苦堅之傷寒食少而渴當以和胃之藥不可用涼藥止之恐復損胃氣愈不能食也白朮茯苓是也太陽無汗而渴不宜白虎湯若汗後脈洪大而渴者宜與之陽明有汗而渴不宜五苓散若小便不利汗少脈浮而渴者宜與之病者心肺熱而不渴者知不在太陰少陰之本而只在標也在標則不渴矣渴者是在本也瘡瘍門明瘡瘍之本末生氣通天論云營氣不從逆於肉理乃生癰腫又云膏粱之變足生大疔受如持虛陰陽應象論云地之濕氣感則害人皮肉筋脈是言濕氣外傷則營氣不行榮衛者皆營氣之所經營也營氣者胃氣也運氣也營氣為本本逆不行為濕氣所壞而為瘡瘍也膏粱之變亦是言厚滋味過度而使營氣逆行凝於經絡為瘡瘍也此邪不在表亦不在裏惟在其經中道病也以上內經所説俱言因營氣逆而作也遍看諸瘡瘍論中多言濕熱相搏熱化為膿者有只言熱化為膿者又言濕氣生瘡寒化為熱而為膿者此皆瘡瘍之源也宜於所見部分用引經藥并兼見證藥中分陰證陽證也瀉營氣是其本本逆助火濕熱相合敗壞肌肉而為膿血者此治法也宜遠取諸物以比之一歲之中大熱無過四五月之間當是時諸物皆不壞爛壞爛者六七月之間濕令大行之際也近取諸身熱病在身只顯熱而不敗壞肌肉此理明矣標本不得邪氣不服言一而知百者可以為上工矣營氣不從逆於肉理乃生瘡癰且營氣者胃氣也飲食入於胃先輸於脾而朝於肺肺朝百脈次及皮毛先行陽道下歸五臟六腑而氣口成寸矣今富貴之人不知其節以飲食肥醲之類雜以厚味日久太過其氣味俱厚之物乃陽中之陽不能走空竅先行陽道反行陰道逆於肉理則濕氣大勝則子能令母實火乃大旺熱濕即盛必來尅腎若雜以不順又損其真水腎即受邪積久水乏水乏則從濕熱之化而上行其瘡多出背出腦此為大疔之最重者也若毒氣行於肺或脾胃之部分毒之次也若出於他經又其次也濕熱之毒所止處無不潰爛故經言膏粱之變足生大疔受如持虛如持虛器以受物物無不受治大疔之法必當瀉其營氣以標本言之先受病為本非苦寒之劑為主為君不能除其苦是疼痛也諸瘡瘍有痛往往多以乳香沒藥雜以芳香之藥止之必無少減之理若使經絡流通臟腑中去其壅滯必無痛矣苦寒之劑除其疼痛藥下於咽則痛立止此神品藥也瘡瘍食肉乃自棄也瘡瘍者乃榮氣而作也今反補之而自棄何異雖用藥施治而不能愈地之濕氣自外而入內者瘡癤當先服藥而後用針如瘡癤小不欲飲藥或嬰兒之瘡先當溫衣覆蓋令其凝泣壅滯血脈溫和則出血立已者不如此血脈凝滯便針則邪毒不瀉反傷良肉又益其瘡勢也瘡瘍及諸病面赤雖伏大熱禁不得攻裏為陽氣怫欎邪氣在經宜發表以去之故曰火欎則發之雖大便數日不見宜多攻其表以發散陽氣少加潤燥之藥以潤之如見風脈風證只可用發表風藥便可以通利得大便行也若只乾燥祕澀尤宜潤之慎不可下也諸九竅不利者慎不可下也瘡瘍欎冒俗呼昏迷是也宜汗之則愈驗瘡各色治之當從素問針經聖濟總録易老瘡論及諸家治瘡用藥法度此為緊要臨病之際宜詳審焉瘡瘍治驗戊申歲以飲酒太過脈候沉數九月十七日至真定腦之下項之上出小瘡不痛不癢謂是曰瘡漫不加省是夜宿睡善甫家二日後覺微痛見國醫李公明之不知問凡三見之終不為以為言又二日腦項麻不腫勢外散熱毒焮發且聞此府劉帥者近以腦疽物故便疑之三日間痛大作夜不復得寐二十二日諸鎮之瘍醫遂處五香連翹明日再往又請同門一醫共視之云此疽也然而不可速療十八日得膿俟膿出用藥或砭刺三月乃可平四月如故豫記醫經凡瘡見膿九死一生果如二子言則當有束手待斃之悔矣乃詣姨兄韓參謀彥俊家請明之診視明之見瘡談笑如平時且謂豫言瘡固惡子當恃我無憂恐爾高粱之變不當投五香五番已無及且疽已八日當先用火攻之策然後用藥午後以大艾炷如棗核許者攻之至百壯乃痛覺次為處方云是足太陽膀胱之經其病逆當反治脈中得弦緊按之洪大而數又且有力必當伏其所主而先其所因以其始則同其終則異可使破積可使潰堅可使氣和可使必已必先歲氣勿伐天和以時言之可收不可汗經與病禁下法當結者散之醎以軟之然寒受邪而禁醎諸苦寒為君為用甘寒為佐酒熱為引用為使以辛溫和血大辛以解結為臣三辛三甘益元氣而和血脈淡滲以導酒濕扶持秋冬以益氣瀉火以入本經之藥和血且為引用既以通經以為主用君以黃芩黃連黃蘗生地黃知母酒製之本經羌活獨活防風藁本防己當歸連翹以解結黃耆人參甘草配諸苦寒者三之一多則滋營氣補土也生甘草瀉腎之火補下焦元氣人參橘皮以補胃氣蘇木當歸尾去惡血生地黃當歸身補血酒製漢防己除膀胱留熱澤瀉助秋去酒之濕熱凡此諸藥必得桔梗為舟楫乃不下沉投劑之後疽當不痛不拆精氣大旺飲啖進形體健豫如言服之藥後投床大鼾日出乃寤以手捫瘡腫減七八豫疑瘡透喉遽邀明之視之明之驚喜曰瘡平矣屈指記日不五七日作痂子可出門矣如是三日忽有霄寐之變豫懼其為死候甚憂之而無可告語之者適明之入門戲謂豫曰子服藥後有三驗而不以相告何也乃歷數云子三二日來健啖否乎曰然又問子腳膝舊弱今行步有力否乎曰然又問子昨宵夢有霄寐之變何不自言豫為之一笑終不以此變告之也二十九日瘡痛全失去灸瘢膿出尋作痂初鎮人見劉帥病疽之苦言及者皆為悲慘聞豫復病此瘡親舊相念者皆舉手加額以早安為禱十月十七日明之邀往其家乘馬過市人見之有為之失喜者蓋始於投劑至瘡痂斂卻十四日而已豫往在聊城見明之治梁縣楊飛卿脅癰及郭文之父腦疽楊叔能背疽不十數日皆平復皆不若治豫瘡之神也醫無不難療腦背瘡尤難世醫用技豈無取效者至於治效之外乃能歷數體中不言之祕平生所見惟明之一人而已乙未秋豫自濟南回傷冷太過氣絶欲死明之投劑應手而愈起豫之死并此為二矣他日效劉斯立傳錢乙當補述之同年秋七月二十有五日河東元好問記黃連消毒飲黃連一錢黃芩五分黃蘗五分生地黃四分知母四分羌活一錢獨活四分防風四分藁本五分當歸尾四分桔梗五分黃耆二分人參三分甘草三分連翹四分蘇木二分防己五分澤瀉二分橘皮二分上件銼如麻豆大都作一服水三盞煎至一盞半去渣溫服食後一方加山梔子二分五味子一分麥門冬二分枳殼二分豬苓二分名消毒潰堅湯治八發癰腫瘰癧奶病隨患人虛實藥劑輕重用之無不作效丁未季春二十二日蒲度主老年七十因寒濕地氣得附骨癰於左腿外側足少陽膽經之分微侵足陽明分闊六七寸長一小尺堅硬浸腫不變肉色皮澤深但行步作痛以指按至骨大痛與藥一服立止再日堅硬而腫消內托黃耆酒煎湯柴胡一錢半連翹一錢肉桂一錢黍粘子炒一錢黃耆二錢當歸尾二錢黃蘗半錢升麻七分甘草炙半錢上件㕮咀好糯米酒一盞半水一大盞半同煎至一大盞去滓大溫服空心宿食消盡服之待少時以早膳壓之使不令大熱上攻中上二焦也尹老家寒己酉歲十月初有仲冬之寒形志皆苦於手陽明大腸經分出癰第四日稠膿幼小有㿗疝其臂外皆腫痛甚先腫在陽明左右寸皆短中得之俱弦按之洪緩有力此癰得自八風之變以脈斷之邪氣在表其證大小便如故飲食如常腹中和口知味知不在裏也不惡風寒只熱躁脈不浮知不在表也表裏既和邪氣在經脈之中也故云凝於經絡為瘡癰其癰出身半以上故風從上受之故知是八風之變為瘡只經脈之中也治其寒邪調和經中血氣使無凝滯則已矣白芷升麻湯白芷七分升麻半錢甘草一分黃芩二錢酒製生黃芩一錢半黃耆二錢桔梗半錢紅花少許上㕮咀作一服水酒各一大盞半同煎至一盞去滓大溫服臨臥一服而愈賈德茂男年十歲丁未四月十一日於左大腿近膝股出附骨癰不變肉色漫腫皮澤木硬瘡勢甚大其左腳乃肝之髀上也更在足厥陰肝經之分少侵足太陰脾經之分其脈左三部細而弦按之洪緩微有力內托黃耆柴胡湯黃耆二錢柴胡一錢羌活半錢連翹一錢三分肉桂三分土瓜根一錢酒製生地黃一分黃蘗二分當歸尾七分半上件㕮咀作一服水三盞酒一盞同煎至一盞去滓熱服宿食消盡服一服而愈內托羌活湯治足太陽經中左右尺脈俱緊按之無力尻臀生癰堅硬腫痛大作羌活二錢防風一錢藁本一錢肉桂三分黃蘗二錢酒製連翹半錢甘草炙半錢當歸尾一錢黃耆一錢半蒼朮半錢橘皮半錢上件㕮咀都作一服水二大盞酒一盞煎至一盞半去滓熱服空心以夾衣蓋覆其癰使藥力行罷去衣一服則愈內托升麻湯治婦人兩乳間出黑頭瘡瘡頂陷下作黑眼子其脈弦洪按之細小升麻一錢半葛根一錢半連翹一錢半肉桂三分黃耆一錢當歸身一錢黍粘子半錢黃蘗一分甘草炙一錢上件㕮咀都作一服水二盞酒半盞同煎至一盞去滓食後溫服救苦化堅湯治瘰癧馬刀挾癭從耳下或耳後下頸至肩上或入缺盆中乃手足少陽之經分其瘰癧在於頦下或至頰車乃足陽明之分受心脾之邪而作也今將二證合而治之升麻一錢葛根半錢真漏蘆一錢此三味俱足陽明本經藥也連翹一錢此一味十二經瘡藥中不可無乃結者散之能散諸血結氣聚此瘡之神藥也此半溫涼之氣味中聖藥也牡丹皮三分出腸胃中留血滯血當歸身三分熟地黃三分此三味諸經中和血生血涼血藥也黃耆一錢護皮毛閉腠理虛及活血脈生血亦瘡家聖藥又能補表之元氣消少而弱也白芍藥三分如夏日倍之其味酸其氣寒能補中益肺氣之氣弱治腹中痛必用之如冬寒證不可用之為寒氣故也又治腹中不和此乃散而不收故用芍藥味酸以收散氣肉桂二分大辛熱能散結積陰證瘡瘍須當少用之以寒因熱用又為寒氣侵其瘡以大辛熱以消浮凍之氣如有煩躁者去之陰證瘡必須用柴胡八分功同連翹如瘡不在少陽經則去之黍粘子三分無腫不用羌活一錢獨活半錢防風半錢此三味必關手足太陽證脊痛項強不可回顧腰似折項似拔者是也其防風一味辛溫若瘡在膈以上雖無手足太陽經證亦當用之為能散結去上部風病人身拘急者風也諸痛見此證亦須用昆布二分其味大醎若瘡堅硬者所宜用為醎軟堅廣荗三分煨京三稜二分一煨若瘡堅硬甚者用不甚堅硬勿用之為堅者削之人參三分補肺氣之藥也如氣短氣不調及喘者可加之益智仁二分如唾多者胃不和也或病人吐沫吐食胃土寒者加之無則去之厚朴薑製一錢二分如腹時見脹者加用之無則勿用麥蘗麴一錢治腹中縮急兼能消食補胃麴末炒黃二分為食不能消化故也甘草炙半錢能調中和諸藥瀉火益胃亦能去瘡邪黃連去須二分以治煩悶黃蘗炒三分如有熱或腿腳無力者加之如有躁煩欲去衣者腎中伏火也更宜加之無此證勿用上件同為細末湯浸蒸餅和捻作餅子日乾搗如米粒每服稱二錢或三錢白湯送下量病人虛實臨時斟酌勿令藥多妨其飲食此治之大法也如只在陽明分為瘰癧者去柴胡黍粘子二味餘皆用之如在少陽分為馬刀挾癭者去獨活漏蘆升麻葛根更加瞿麥穗三分若氣不順加橘皮甚者加木香少許若本人素氣弱現患之病其病勢來時氣盛而不短促者不可考其平素宜作氣盛而從病變之權也更宜加黃芩黃連黃蘗知母防己之類視邪氣在上中下三焦假令在於上焦加黃芩一半酒製一半生用在中焦者加黃連一半酒製一半生用在下焦則加酒製知母酒製黃蘗酒製防己之類選而用之若病不大便為大便不通而滋其邪盛也急加酒製大黃以利之如血燥而大便乾燥者加桃仁酒製大黃二味如風結燥不行者加麻子仁大黃如風澀而大便不行加煨皂角仁大黃秦艽以利之如脈澀覺身有氣澀而大便不通者加郁李仁大黃以除氣燥也如陰寒之病為寒結閉而不大便以局方中半硫丸或加煎附子乾薑冰冷與之大抵用藥之法不惟瘡瘍一説諸疾病量人素氣弱者當去苦寒之藥多加人參黃耆甘草之類瀉火而先補元氣餘皆仿此散腫潰堅湯治馬刀瘡結硬塊子堅如石者在耳下至缺盆中或至肩上或入脅下皆手足少陽經中及瘰癧遍於頦或至頰車堅硬如石在足陽明經中所出或二證瘡已破流膿水并皆治之柴胡四錢升麻三分草龍膽半兩酒製炒各四遍黃芩八錢酒製一半生用一半炙甘草二錢桔梗半兩連翹三錢瓜蔞根半兩切碎酒製當歸尾二錢白芍藥二錢黃蘗酒製去皮半兩酒知母先銼酒製半兩葛根二錢黃連一錢京三稜三錢酒製微炒廣荗三錢銼碎酒製微炒昆布去土半兩上件㕮咀每服稱六錢或七錢水二盞八分先浸多半日煎至一盞去渣熱服於臥處身腳在髙處頭低垂每噙一口作十次咽服畢依常安臥取藥在膈上停蓄故也另攢半料作極細末煉蜜為丸如緑豆大每服一百丸或一百五十丸用此湯一口送下食後服之藥多少量病人虛實應服藥皆效此例升麻調經湯治頦下或至頰瘰癧此證出足陽明胃之經中來也若瘡深遠隱曲肉底是足少陰腎中來也乃戊胃傳癸腎是夫傳與妻俱作塊子堅硬大小不等并皆治之或作丸服亦得升麻八錢葛根五錢草龍膽酒製炒半兩黃芩削去皮酒製半兩當歸尾三錢桔梗半錢連翹半兩芍藥三錢黃蘗去皮酒炒二錢知母酒炒一兩黃連去須五錢廣荗酒炒五錢京三稜五錢碎切酒炒炙甘草半兩生黃芩四錢上件另稱一半作末蜜為丸如緑豆大每服百丸或一百五十丸一半多作㕮咀每服稱半兩若能食便硬可旋加之至七八錢止水二盞先浸多半日煎至一盞去渣臨臥熱服腳髙頭下而臥噙一口作十次咽留一口在後送下丸子藥服藥畢臥如常此制之緩也連翹散堅散治耳下至缺盆或至肩上生瘡堅硬如石動之無根名曰馬刀從手足少陽經中來也或生兩脅或已流膿作瘡未破皆治之柴胡一兩二錢連翹半兩當歸尾半兩酒製芍藥三錢土瓜根一兩酒炒炙甘草三錢草龍膽酒製四次一兩生黃芩半兩蒼朮二錢黃芩酒炒二次七兩黃連二錢酒炒二次廣荗半兩京三稜細銼半兩同廣荗酒製一次微炒乾上件稱一半為細末煉蜜為丸如緑豆大每服一百丸或一百五十丸另一半㕮咀每服半兩水一盞八分浸多半日煎至一盞去渣臥時熱服頭下腳髙去枕而臥每口作十次咽留一口送下丸子藥服畢臥如常亦緩治之項上瘰癧馬刀將先出一瘡用四稜鐵環按定不令走後作口子以油藥紙捻紝之勿令合了以絶其瘡之源其效甚速如瘡不破或本人不肯更以龍泉散塗龍泉散方瓦粉龍泉粉各半兩炒半潤濕另研昆布去土三錢或五錢廣荗京三稜各半兩酒製銼碎炒上件同為細末煎熟水調塗之用此去疾尤速一二日一易之柴胡連翹湯治男子婦人馬刀瘡柴胡半兩黍粘子二錢中桂三分連翹五錢瞿麥穗六錢甘草炙三錢生地黃三錢當歸尾一錢半黃蘗三錢酒製知母半兩酒製炒黃芩半兩上件㕮咀如麻豆大每服稱五錢或二錢水二大盞煎至一盞去渣稍熱服食後時時服之黍粘子湯治耳痛生瘡桔梗半兩柴胡三分連翹二分黍粘子二分當歸尾二分黃芩二分生地黃二分黃耆三分炙甘草二分黃連二分草龍膽一分昆布一分蒲黃一分蘇木一分桃仁三個紅花少許生甘草一分上件㕮咀如麻豆大都作一服水二盞煎至一盞去渣稍熱服食後忌寒藥利大便連翹防風湯治皮癢腋下瘡背上瘡耳聾耳鳴麻黃一錢桂枝二分草豆蔻一錢當歸尾七分紅花少許羌活一錢防風一錢柴胡一錢升麻半錢連翹半錢桔梗半錢甘草半錢生地黃半錢酒黃芩一錢蒼朮一錢上件銼如麻豆大都作一服水二大盞煎至一盞去滓稍熱服之消腫湯治馬刀瘡柴胡二錢連翹三錢當歸尾一錢紅花少許甘草一錢生黃芩二錢黃連半錢瓜蔞根一錢半黍粘子半錢炒黃耆一錢半上件每服稱半兩水二大盞煎至一盞去滓稍熱服食後忌酒濕𬹃柴胡通經湯治小兒項側有瘡堅而不潰名曰馬刀柴胡二分連翹二分當歸尾二分紅花少許黃連五分黃芩二分生甘草二分黍粘子二分桔梗二分京三稜二分上件㕮咀麻豆大都作一服水二大盞煎至一盞去滓稍熱服食後忌苦藥泄大便保生救苦散治火燒熱油所損或至脫肌肉及一切犬咬傷損并刀斧所傷及諸瘡血不止如神上此藥時瘡口變黑色勿怪待藥力盡卻變紅和也生寒水石大黃火煨黃蘗油炒以上各等分上為細末小油調塗之若乾上亦得其痛立止與無瘡同不作膿無分毫苦楚日近完復久無破傷風證聖愈湯治諸瘡血出多而心煩不安不得眠睡此亡血故也熟地黃三分生地黃三分當歸身半錢川芎三分黃耆半錢人參三分上件㕮咀都作一服水一大盞半煎至一盞去滓稍熱服不計時候一上散治諸般疥癬必效雄黃通明手可碎五錢熟硫黃半兩斑蝥三個去翅足研碎黑狗脊五錢寒水石五錢蛇床子半兩炒上另研雄黃硫黃寒水石如粉次入斑蝥和勻蛇床子黑狗脊另為細末同研勻凡疥癬令湯透去痂油調手中擦熱鼻中嗅三兩次擦上可一上即愈也如痛甚腫滿髙起者加寒水石一倍如不苦癢只加狗脊如微癢只加蛇床子如瘡孔中有蟲加雄黃如喜火炙湯燙者加硫黃即臭不止亦可愈也柳枝當歸膏貼一切熱瘡當歸尾尖細稍水浸一兩杏仁浸去皮尖一百個黃丹細研水飛六兩肥嫩柳枝三兩半切如一寸水洗淨令乾肥嫩桃枝一兩半洗淨令乾芝麻油一斤上件先令油熱下桃柳枝熬令半焦以綿裹當歸杏仁同熬至桃柳枝黑焦為度去藥渣濾油澄淨抹去銚子中滓穢令淨再上火令沸旋旋入黃丹熬滴水中不散為度或只於紙上攤令不透紙為度桃枝當歸膏貼一切惡瘡當歸身去細梢洗去土乾一兩杏仁湯浸去皮尖一百個肥嫩柳枝三兩半切寸許水洗乾肥嫩桃枝一兩半切寸許水洗乾黃丹水飛六兩芝麻油一斤上件先令油熱下桃枝柳枝令半焦以綿裹當歸杏仁同熬至桃枝柳枝黑焦為度去藥滓濾油澄淨抹出銚子中滓穢令淨再上火令沸旋旋入黃丹熬成滴水中不散為度或只攤紙上不透為度奪命膏專治疔瘡石硬始終皆大寒證當歸尾一兩木鱉子去皮五個巴豆去殼肥者二十三枚桃枝寸許一百一十莖沒藥三錢黃丹五兩萆麻子去殼二十個粉霜半兩白及三錢半乳香三錢藁本半兩杏仁七十個柳枝寸許六十莖芝麻油一斤上件一處先將桃柳枝下在油內煮焦取出不用次下餘藥物熬至焦黑濾去滓卻將油澄清上火令沸旋旋入黃丹熬成膏藥緋絹上攤之立有神效如寒證去其瘡不任此藥作痛換柳枝膏貼大抵膏藥只可護衛皮膚行瘡口上氣血而已使氣血周流而無凝滯乃上法也既經絡行必無疼痛易為痊瘳矣治瘡脈訣身重脈緩濕勝除濕身熱脈大心躁時腫乍來乍去熱諸痛眩運動搖脈弦去風氣澀氣滯乾燥口少津液脈澀瀉氣補血寒勝則浮食不入便溺濁多惡寒脈緊細瀉寒水破毒散治便毒橫痃已成未成隨即消散應效如神滑石末三錢斑蝥炒去頭足翅三個為末上二件和勻分作三服空心食前一日服畢少用茶湯調下毒氣俱從小便中出如小便疼痛濃煎車前子木通燈心澤瀉湯頓服即已
